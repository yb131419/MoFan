<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>莫凡韓式皮膚管理</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:linear-gradient(135deg,#fdf2f8 0%,#fef7fb 50%,#fce8f3 100%);font-family:'Noto Sans TC',sans-serif;color:#444;display:flex;justify-content:center;min-height:100vh;padding:20px 12px 70px}
    main{background:#fff;border-radius:24px;box-shadow:0 15px 50px rgba(255,133,162,0.12);width:100%;max-width:460px;padding:35px 25px;position:relative;overflow:hidden}
    main::before{content:'';position:absolute;top:0;left:0;width:100%;height:6px;background:linear-gradient(90deg,#ff8da1,#ff4d88,#c77dff)}
    h2{text-align:center;margin-bottom:30px;line-height:1.6}
    .main-title{font-size:1.8rem;font-weight:900;background:linear-gradient(90deg,#ff4d88,#ff8da1,#c77dff);-webkit-background-clip:text;color:transparent;display:block}
    .sub-title{font-size:1rem;font-weight:500;color:#999}
    label{display:block;margin-bottom:8px;font-weight:600}
    input,select{width:100%;height:52px;padding:0 18px;border-radius:16px;border:1px solid #f0f0f0;background:#fafbfc;margin-bottom:20px}
    input:focus,select:focus{background:#FDF2F8;border:2px solid #D894A7;outline:none}
    .week-slider{display:flex;gap:8px;overflow-x:auto;padding:4px 0;margin-bottom:20px}
    .week-slider::-webkit-scrollbar{display:none}
    .week-day{min-width:60px;padding:12px 8px;border-radius:14px;background:#fafbfc;border:1px solid #f3f3f3;text-align:center;cursor:pointer}
    .week-day.active{background:linear-gradient(135deg,#FF5D8F,#FF3377);color:#fff;border-color:#ff4d88}
    .time-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
    .time-btn{height:52px;display:flex;align-items:center;justify-content:center;border-radius:14px;border:1px solid #eee;background:#fff;font-weight:600;cursor:pointer}
    .time-btn.active{background:#FDF2F8;border:2px solid #D894A7;font-weight:700}
    button{width:100%;height:56px;background:linear-gradient(135deg,#FF5D8F,#FF3377);border:none;border-radius:18px;color:#fff;font-weight:700;cursor:pointer}
    textarea{width:100%;min-height:120px;padding:18px;border-radius:16px;border:1px solid #f0f0f0;background:#fafbfc;margin-bottom:20px}
  </style>
</head>
<body>
<main>
  <h2>
    <span class="main-title">莫凡<br>線上預約系統</span>
    <span class="sub-title">專業美容師一對一服務</span>
  </h2>
  <form id="reserveForm">
    <input type="hidden" id="lineId">
    <input type="hidden" id="lineName">
    <input type="hidden" id="selectedDate">
    <input type="hidden" id="selectedTime">

    <label>預約日期</label>
    <div class="week-slider" id="weekSlider">載入中...</div>

    <label>服務項目</label>
    <select id="serviceSelect">
      <option value="">請先選擇日期</option>
    </select>

    <label>選擇美容師</label>
    <select id="staffSelect">
      <option value="">請先選擇服務</option>
    </select>

    <label>預約時段（先選先贏）</label>
    <div class="time-grid" id="timeGrid">
      <div style="text-align:center;grid-column:1/3;">請先選擇美容師</div>
    </div>

    <label>姓名</label>
    <input type="text" id="name" placeholder="請輸入姓名">
    <label>聯絡電話</label>
    <input type="tel" id="phone" placeholder="0912-345-678">
    <label>電子信箱（選填）</label>
    <input type="email" id="email" placeholder="請輸入信箱">
    <label>備註（選填）</label>
    <textarea id="extraInfo" placeholder="肌膚狀況、特殊需求"></textarea>

    <button type="button" id="submitBtn">確認預約</button>
  </form>
</main>

<script>
  // ⚠️ 部署後 替換成你的GAS網址
  const CONFIG = {
    SCRIPT_URL: "https://script.google.com/macros/s/AKfycbwgKFHvVz6ZrPN4gkFGP4DMJ6Gwi8DFpLZ5JlMlC-TgL0NnSClqLZvHgtgvlKr1FljcoA/exec",
    LIFF_ID: "2009598216-MmBS77sp"
  };

  let LINE_USER_ID = "guest_" + Date.now();
  let LINE_USER_NAME = "訪客";
  let weekDays = ['日', '一', '二', '三', '四', '五', '六'];

  // 加載失敗全局捕獲
  window.onerror = function(){alert("載入失敗，請刷新頁面！");};

  function loadAllData(){const s=document.createElement('script');s.src=CONFIG.SCRIPT_URL+"?action=getAllData&callback=initAllData";document.body.appendChild(s);}
  function loadServicesByDate(d){if(!d)return;const s=document.createElement('script');s.src=CONFIG.SCRIPT_URL+"?action=getServicesByDate&date="+d+"&callback=renderServices";document.body.appendChild(s);}
  function loadStaffByService(d,s){if(!d||!s)return;const sc=document.createElement('script');sc.src=CONFIG.SCRIPT_URL+"?action=getStaffByService&date="+d+"&service="+encodeURIComponent(s)+"&callback=renderStaff";document.body.appendChild(sc);}
  function loadAvailableSlots(){const d=document.getElementById('selectedDate').value;const s=document.getElementById('staffSelect').value;const sv=document.getElementById('serviceSelect').value;if(!d||!s||!sv)return;document.getElementById('timeGrid').innerHTML='<div>載入時段中...</div>';const sc=document.createElement('script');sc.src=CONFIG.SCRIPT_URL+"?action=getAvailableSlots&date="+d+"&staff="+encodeURIComponent(s)+"&service="+encodeURIComponent(sv)+"&callback=renderSlots";document.body.appendChild(sc);}
  
  function submitReservation(){
    const data={action:"submit",lineId:LINE_USER_ID,lineName:LINE_USER_NAME,date:document.getElementById('selectedDate').value,service:document.getElementById('serviceSelect').value,staff:document.getElementById('staffSelect').value,appointTime:document.getElementById('selectedTime').value,name:document.getElementById('name').value.trim(),phone:document.getElementById('phone').value.trim(),email:document.getElementById('email').value.trim(),extraInfo:document.getElementById('extraInfo').value.trim()};
    if(!data.appointTime){alert("請選擇預約時段");return;}
    if(!data.name||!data.phone){alert("請填寫姓名/電話");return;}
    const p=new URLSearchParams(data);const s=document.createElement('script');s.src=CONFIG.SCRIPT_URL+"?"+p.toString()+"&callback=submitCallback";document.body.appendChild(s);
  }

  window.initAllData=function(res){if(res.status!=="success"){alert("載入失敗："+res.message);return;}renderWeekSlider();};
  window.renderServices=function(res){const s=document.getElementById('serviceSelect');s.innerHTML='<option value="">請選擇服務</option>';if(!res.services.length){s.innerHTML='<option value="">當日無服務</option>';return;}res.services.forEach(item=>s.add(new Option(item.name+" ("+item.duration+"分鐘)",item.name)));};
  window.renderStaff=function(res){const s=document.getElementById('staffSelect');s.innerHTML='<option value="">請選擇美容師</option>';if(!res.staff.length){s.innerHTML='<option value="">無美容師可服務</option>';return;}res.staff.forEach(x=>s.add(new Option(x.name+" ("+x.start+"-"+x.end+")",x.name)));};
  window.renderSlots=function(res){const g=document.getElementById('timeGrid');g.innerHTML='';document.getElementById('selectedTime').value='';if(!res.slots.length){g.innerHTML='<div>當日已滿單</div>';return;}res.slots.forEach(t=>{const btn=document.createElement('div');btn.className='time-btn';btn.textContent=t;btn.onclick=function(){document.querySelectorAll('.time-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('selectedTime').value=t;};g.appendChild(btn);});};
  window.submitCallback=function(res){alert(res.message);if(res.status==="success")document.getElementById('reserveForm').reset();loadAvailableSlots();};

  function renderWeekSlider(){
    const slider=document.getElementById('weekSlider');slider.innerHTML='';const today=new Date();
    for(let i=0;i<7;i++){const dd=new Date(today);dd.setDate(today.getDate()+i);const dateStr=`${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`;const el=document.createElement('div');el.className='week-day'+(i===0?' active':'');el.innerHTML=`<div>${dd.getMonth()+1}/${dd.getDate()}</div><div>週${weekDays[dd.getDay()]}</div>`;el.onclick=function(){document.querySelectorAll('.week-day').forEach(e=>e.classList.remove('active'));el.classList.add('active');document.getElementById('selectedDate').value=dateStr;loadServicesByDate(dateStr);document.getElementById('staffSelect').innerHTML='<option>請先選擇服務</option>';document.getElementById('timeGrid').innerHTML='<div>請先選擇美容師</div>';};slider.appendChild(el);}
    const first=document.querySelector('.week-day.active').dataset.date;document.getElementById('selectedDate').value=first;loadServicesByDate(first);
  }

  async function initLiff(){try{await liff.init({liffId:CONFIG.LIFF_ID});if(liff.isLoggedIn()){const p=await liff.getProfile();LINE_USER_ID=p.userId;LINE_USER_NAME=p.displayName;}}catch(e){}}

  document.addEventListener('DOMContentLoaded',function(){initLiff();loadAllData();document.getElementById('serviceSelect').addEventListener('change',function(){loadStaffByService(document.getElementById('selectedDate').value,this.value);});document.getElementById('staffSelect').addEventListener('change',loadAvailableSlots);document.getElementById('submitBtn').addEventListener('click',submitReservation);});
</script>
</body>
</html>
