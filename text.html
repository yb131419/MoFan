<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title> 莫凡韓式皮膚管理 </title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, #fdf2f8 0%, #fef7fb 50%, #fce8f3 100%);
      font-family: 'Noto Sans TC', sans-serif;
      color: #444;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px 12px;
      padding-bottom: 70px;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 Q100,20 100,100 L0,100 Z" fill="rgba(255,179,217,0.05)"/></svg>');
      background-size: cover;
      opacity: 0.3;
      z-index: -1;
    }

    .top-bar {
      position: fixed;
      top: 12px;
      right: 15px;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .page-switch {
      display: none;
    }
    .switch-btn {
      padding: 10px 18px;
      border-radius: 50px;
      background: #fff;
      border: 1px solid rgba(255, 77, 136, 0.2);
      color: #ff4d88;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,77,136,0.1);
      transition: all 0.35s;
    }
    .switch-btn:hover {
      transform: translateY(-2px);
      background: #fff5f8;
    }

    main {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 15px 50px rgba(255, 133, 162, 0.12);
      width: 100%;
      max-width: 460px;
      padding: 35px 25px;
      margin-top: 20px;
      position: relative;
      overflow: hidden;
    }

    main::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, #ff8da1, #ff4d88, #c77dff);
    }

    @media (min-width: 768px) {
      main { max-width: 720px; padding: 60px 45px; }
    }

    .header-time {
      text-align: center;
      font-size: 14px;
      color: #ff4d88;
      font-weight: 600;
      margin-bottom: 12px;
    }

    h2 {
      font-weight: 900;
      margin-bottom: 35px;
      text-align: center;
      line-height: 1.6;
    }

    h2 .main-title {
      font-size: 1.8rem;
      display: block;
      background: linear-gradient(90deg, #ff4d88, #ff8da1, #c77dff);
      -webkit-background-clip: text;
      color: transparent;
    }

    h2 .sub-title {
      font-size: 1rem;
      font-weight: 500;
      color: #999;
    }

    form label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      color: #555;
    }

    .date-nav-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 25px;
    }
    .date-nav-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid #eee;
      font-weight: 700;
      color: #ff4d88;
      cursor: pointer;
    }
    .week-box {
      width: 70px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid #f3f3f3;
      background: #fafbfc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: #666;
    }

    input, select, textarea {
      width: 100%;
      height: 52px;
      padding: 0 18px;
      border-radius: 16px;
      border: 1px solid #f0f0f0;
      background: #fafbfc;
      margin-bottom: 25px;
      transition: all 0.3s;
    }
    textarea { min-height: 120px; padding: 18px; }
    input:focus, select:focus, textarea:focus {
      background: #FDF2F8;
      border: 2px solid #D894A7;
      outline: none;
    }

    .time-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 25px;
    }
    .time-btn {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      border: 1px solid #eee;
      background: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    .time-btn.active {
      background: #FDF2F8;
      border: 2px solid #D894A7;
      font-weight: 700;
    }
    .time-btn.expired {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button {
      width: 100%;
      height: 56px;
      background: linear-gradient(135deg, #FF5D8F, #FF3377);
      border: none;
      border-radius: 18px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover { transform: translateY(-3px); }
    button:disabled { opacity: 0.7; }

    .admin-section { display: none; margin-top: 25px; }
    .admin-title { font-size: 1.5rem; color: #ff4d88; text-align: center; margin-bottom: 15px; }
    .tip-text { text-align: center; color: #888; margin-bottom: 20px; }
    .admin-card {
      background: #fff;
      border-radius: 24px;
      padding: 28px;
      margin-bottom: 25px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.06);
    }
    .admin-btn { height: 52px; border-radius: 16px; margin-bottom: 15px; }
    .reservation-item { padding: 16px; background: #fafbfc; border-radius: 14px; margin-bottom: 12px; }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: #fff;
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-shadow: 0 -2px 15px rgba(0,0,0,0.08);
    }
    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 12px;
      color: #888;
      cursor: pointer;
    }
    .bottom-nav-item.active { color: #ff4d88; font-weight: 700; }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="page-switch" id="switchContainer">
    <button class="switch-btn" id="switchBtn">切換管理介面</button>
  </div>
</div>

<main>
  <div id="userPage">
    <div class="header-time" id="headerTime">載入時間中...</div>
    <h2>
      <span class="main-title">莫凡<br>線上預約系統</span>
      <span class="sub-title">專業美容師一對一服務</span>
    </h2>

    <form id="infoForm">
      <input type="hidden" id="pageId" value="美容預約系統">
      <input type="hidden" id="lineId">
      <input type="hidden" id="lineName">
      <input type="hidden" id="appointTime" name="appointTime">

      <!-- 🔥 新增：美容師選擇 -->
      <label>選擇美容師</label>
      <select id="staffName" required>
        <option value="">請選擇美容師</option>
      </select>

      <label>服務項目</label>
      <select id="serviceType" required>
        <option value="">請先選擇美容師</option>
      </select>

      <label>預約日期</label>
      <div class="date-nav-row">
        <button type="button" class="date-nav-btn" id="prevDateBtn">&lt;</button>
        <input type="date" id="appointDate" required>
        <button type="button" class="date-nav-btn" id="nextDateBtn">&gt;</button>
        <div class="week-box" id="weekText">星期幾</div>
      </div>

      <label>預約時段</label>
      <div class="time-grid" id="timeGrid">
        <div style="text-align:center;grid-column:1/3;">請先選擇日期</div>
      </div>

      <label>姓名</label>
      <input type="text" id="name" required placeholder="請輸入您的姓名">
      <label>聯絡電話</label>
      <input type="tel" id="phone" required placeholder="0912-345-678">
      <label>電子信箱（選填）</label>
      <input type="email" id="email" placeholder="請輸入電子信箱">
      <label>備註說明（選填）</label>
      <textarea id="extraInfo" placeholder="肌膚狀況、特殊需求"></textarea>

      <button type="submit" id="submitBtn">確認預約</button>
    </form>
  </div>

  <!-- 管理後台（已自動适配美容師） -->
  <div id="adminPage" class="admin-section" style="display:none;">
    <div class="admin-title">📊 預約管理後台</div>
    <p class="tip-text">雙美容師獨立排程｜自動衝突檢測｜一週自動清理</p>
    <div id="adminAccessDenied" style="text-align:center;color:red;display:none;">❌ 無管理員權限</div>
    <div id="adminContent" style="display:none;">
      <div class="admin-card">
        <h3>📋 預約記錄</h3>
        <button class="admin-btn" id="loadReservationsBtn">載入全部預約</button>
        <div id="reservationsList"></div>
      </div>

      <div class="admin-card">
        <h3>⏰ 美容師時段設定</h3>
        <label>選擇美容師</label>
        <select id="manageStaff">
          <option value="">請選擇美容師</option>
        </select>
        <div class="date-nav-row">
          <button class="date-nav-btn" id="prevManageDateBtn">&lt;</button>
          <input type="date" id="manageDate">
          <button class="date-nav-btn" id="nextManageDateBtn">&gt;</button>
        </div>
        <button class="admin-btn" id="loadTimeBtn">載入時段</button>
        <div id="manageTimeList"></div>
      </div>
    </div>
  </div>
</main>

<div class="bottom-nav">
  <div class="bottom-nav-item active" id="navReserve"><i class="fa fa-calendar-check-o"></i><span>預約</span></div>
  <div class="bottom-nav-item" id="navAddress"><i class="fa fa-map-marker"></i><span>地址</span></div>
  <div class="bottom-nav-item" id="navShare"><i class="fa fa-share-alt"></i><span>分享</span></div>
</div>

<script>
  const CONFIG = {
    SCRIPT_URL: "https://script.google.com/macros/s/AKfycbwC7AlQo-uGGebkgelOzPHKiwm7tC1CVczEBPw2po5UZaCaItgTCxsNndJ0ETRh__tzgA/exec",
    LIFF_ID: "2009598216-ZsS47DM8"
  };

  let STAFF_LIST = [];
  let SERVICE_CONFIG = {};
  let timeDataMap = {};
  let LINE_USER_ID = "guest_" + Date.now();
  let LINE_USER_NAME = "LINE使用者";
  let isAdmin = false;

  // 初始化
  document.addEventListener('DOMContentLoaded', async () => {
    await loadStaffAndService();
    initElements();
    initDate();
    bindEvents();
    initLiff();
  });

  // 🔥 加載美容師+項目配置
  async function loadStaffAndService() {
    const res = await fetch(`${CONFIG.SCRIPT_URL}?action=getStaffAndService&callback=callback`);
    const data = await res.json();
    STAFF_LIST = data.staff;
    SERVICE_CONFIG = data.serviceConfig;
    renderStaffSelect();
  }

  // 渲染美容師下拉選單
  function renderStaffSelect() {
    const staffSelect = document.getElementById('staffName');
    const manageStaff = document.getElementById('manageStaff');
    STAFF_LIST.forEach(staff => {
      staffSelect.add(new Option(staff, staff));
      manageStaff.add(new Option(staff, staff));
    });
  }

  // 🔥 根據美容師篩選項目
  function filterServiceByStaff() {
    const staff = document.getElementById('staffName').value;
    const serviceSelect = document.getElementById('serviceType');
    serviceSelect.innerHTML = '<option value="">請選擇服務項目</option>';
    
    if (!staff) return;
    SERVICE_CONFIG[staff].forEach(item => {
      serviceSelect.add(new Option(`${item.name} (${item.duration}分鐘)`, item.name));
    });
  }

  // 初始化DOM
  function initElements() {
    window.submitBtn = document.getElementById('submitBtn');
    window.staffSelect = document.getElementById('staffName');
    window.serviceSelect = document.getElementById('serviceType');
    window.appointDate = document.getElementById('appointDate');
    window.timeGrid = document.getElementById('timeGrid');
  }

  // 初始化日期
  function initDate() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('appointDate').min = today;
    document.getElementById('appointDate').value = today;
    document.getElementById('manageDate').min = today;
  }

  // 綁定事件
  function bindEvents() {
    // 美容師切換
    document.getElementById('staffName').addEventListener('change', () => {
      filterServiceByStaff();
      loadTimeData();
    });
    // 日期切換
    document.getElementById('appointDate').addEventListener('change', loadTimeData);
    // 表單提交
    document.getElementById('infoForm').addEventListener('submit', submitForm);
  }

  // 加載可預約時段
  function loadTimeData() {
    const staff = document.getElementById('staffName').value;
    if (!staff) return;
    const script = document.createElement('script');
    script.src = `${CONFIG.SCRIPT_URL}?action=getDates&staffName=${staff}&pageId=美容預約系統&callback=callback`;
    document.body.appendChild(script);
  }

  // 回調函數
  window.callback = (response) => {
    if (response.status === "init") {
      timeDataMap = response.timeMap || {};
      renderTimeList();
    }
    if (response.status === "success") {
      alert("✅ 預約成功！");
      document.getElementById('infoForm').reset();
    }
    if (response.status === "error") {
      alert("❌ " + response.message);
    }
  };

  // 渲染時段
  function renderTimeList() {
    const date = document.getElementById('appointDate').value;
    const grid = document.getElementById('timeGrid');
    grid.innerHTML = "";

    const times = timeDataMap[date] || [];
    if (!times.length) {
      grid.innerHTML = `<div style="grid-column:1/3;text-align:center;">當日無可預約時段</div>`;
      return;
    }

    times.forEach(time => {
      const btn = document.createElement('div');
      btn.className = "time-btn";
      btn.textContent = time.value;
      btn.onclick = () => {
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('appointTime').value = time.value;
      };
      grid.appendChild(btn);
    });
  }

  // 提交預約
  function submitForm(e) {
    e.preventDefault();
    const data = {
      pageId: "美容預約系統",
      lineId: LINE_USER_ID,
      lineName: LINE_USER_NAME,
      staffName: document.getElementById('staffName').value,
      serviceType: document.getElementById('serviceType').value,
      appointDate: document.getElementById('appointDate').value,
      appointTime: document.getElementById('appointTime').value,
      name: document.getElementById('name').value,
      phone: document.getElementById('phone').value,
      email: document.getElementById('email').value,
      extraInfo: document.getElementById('extraInfo').value
    };
    const params = new URLSearchParams(data);
    const script = document.createElement('script');
    script.src = `${CONFIG.SCRIPT_URL}?${params}&callback=callback`;
    document.body.appendChild(script);
  }

  // LIFF登入
  async function initLiff() {
    try {
      await liff.init({ liffId: CONFIG.LIFF_ID });
      if (liff.isLoggedIn()) {
        const p = await liff.getProfile();
        LINE_USER_ID = p.userId;
        LINE_USER_NAME = p.displayName;
      }
    } catch (e) {}
  }
</script>
</body>
</html>
