<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>莫凡韓式皮膚管理 | 線上預約</title>
  <link rel="icon" href="data:,">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400,500,700,900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:linear-gradient(135deg,#fdf2f8 0%,#fef7fb 50%,#fce8f3 100%);
      font-family:'Noto Sans TC',sans-serif;color:#444;
      display:flex;justify-content:center;min-height:100vh;
      padding:15px 10px 60px;
    }
    main{
      background:#fff;border-radius:28px;
      box-shadow:0 20px 60px rgba(255,133,162,0.15);
      width:100%;max-width:480px;padding:40px 28px;
      position:relative;overflow:hidden;
    }
    main::before{
      content:'';position:absolute;top:0;left:0;
      width:100%;height:8px;
      background:linear-gradient(90deg,#ff8da1,#ff4d88,#c77dff);
    }
    .header{text-align:center;margin-bottom:35px}
    .main-title{
      font-size:2rem;font-weight:900;
      background:linear-gradient(90deg,#ff4d88,#ff8da1,#c77dff);
      -webkit-background-clip:text;color:transparent;
      margin-bottom:8px;
    }
    .sub-title{font-size:1rem;color:#888;font-weight:500}
    
    .step-bar{
      display:flex;justify-content:space-between;
      margin-bottom:30px;position:relative;
    }
    .step-bar::before{
      content:'';position:absolute;top:12px;left:10%;right:10%;
      height:3px;background:#f0f0f0;z-index:1;
    }
    .step{
      display:flex;flex-direction:column;align-items:center;
      position:relative;z-index:2;width:33%;
    }
    .step-num{
      width:28px;height:28px;border-radius:50%;
      background:#f0f0f0;color:#999;
      display:flex;align-items:center;justify-content:center;
      font-weight:700;margin-bottom:8px;
      transition:0.3s;
    }
    .step-text{font-size:12px;color:#999;font-weight:500}
    .step.active .step-num{background:#ff4d88;color:#fff}
    .step.active .step-text{color:#ff4d88;font-weight:700}

    .section{margin-bottom:28px;display:none}
    .section.active{display:block}
    .section-title{
      font-size:1.1rem;font-weight:700;
      color:#333;margin-bottom:15px;
      display:flex;align-items:center;gap:8px;
    }
    .section-title::before{
      content:'';width:4px;height:20px;
      background:#ff4d88;border-radius:2px;
    }

    .search-wrapper {
      position: relative;
      margin-bottom: 20px;
    }
    .search-container {
      display: flex;
      align-items: center;
      padding: 0 18px;
      background: #ffffff;
      border-radius: 22px;
      box-shadow:0 6px 18px rgba(255,77,136,0.1);
      border:1px solid #f8e5eb;
      transition: all 0.3s ease;
    }
    .search-container:focus-within {
      border-color: #ff8da1;
      box-shadow:0 0 15px rgba(255,77,136,0.18);
    }
    .search-icon {
      font-size:16px;color:#ff4d88;margin-right:12px;
    }
    .search-input {
      flex:1;height:52px;border:none;outline:none;
      background:transparent;font-size:15px;color:#444;
      padding:0 5px;
    }
    .search-input::placeholder {
      color:#c0c0c0;font-weight:500;
    }
    .search-clear {
      width:24px;height:24px;display:flex;
      align-items:center;justify-content:center;
      font-size:12px;color:#999;background:#f8f9fa;
      border-radius:50%;cursor:pointer;transition:0.3s;
      opacity:0;pointer-events:none;
    }
    .search-clear.show {
      opacity:1;pointer-events:all;
    }
    .search-clear:hover {
      background:#ff4d88;color:#fff;
    }

    .category-tabs{
      display:flex;gap:10px;overflow-x:auto;
      padding-bottom:10px;margin-bottom:15px;
      justify-content: center;
      align-items: center;
    }
    .category-tabs::-webkit-scrollbar{height:0}
    .tab{
      padding:8px 16px;border-radius:20px;
      background:#f8f9fa;border:1px solid #eee;
      font-size:14px;font-weight:500;cursor:pointer;
      white-space:nowrap;transition:0.3s;
    }
    .tab.active{background:#ff4d88;color:#fff;border-color:#ff4d88}

    .service-grid{
      display:grid;grid-template-columns:1fr 1fr;
      gap:10px;max-height:320px;overflow-y:auto;
      padding-right:5px;
      min-height: 280px;
    }
    .service-card{
      padding:12px 10px;border-radius:16px;
      background:#fafbfc;border:1px solid #eee;
      text-align:center;font-size:13px;font-weight:500;
      cursor:pointer;transition:0.3s;
      min-height:60px;display:flex;
      flex-direction:column;justify-content:center;
    }
    .service-card:hover{border-color:#ff8da1;background:#fdf2f8}
    .service-card.active{background:#ff4d88;color:#fff;border-color:#ff4d88}
    .service-duration{font-size:11px;margin-top:3px;opacity:0.8}

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 15px 0;
      padding: 10px
    }
    .page-btn {
      width:36px;height:36px;border-radius:12px;border:none;
      background:#f8f9fa;
      color:#666;font-size:14px;font-weight:600;
      cursor:pointer;
    }
    .page-btn:hover:not(:disabled) {
      background:#ff4d88;color:#fff;
    }
    .page-btn:disabled {
      background:#e9ecef;color:#ccc;
    }
    .page-text {
      min-width:40px;text-align:center;font-size:14px;
      font-weight:600;color:#333;
    }

    .week-slider{
      display:flex;gap:10px;overflow-x:auto;
      padding:5px 0;margin-bottom:10px;
    }
    .week-day{
      min-width:85px;padding:15px 10px;
      border-radius:18px;background:#fafbfc;
      border:1px solid #eee;text-align:center;
      cursor:pointer;
    }
    .week-day.active{background:#ff4d88;color:#fff;}
    .week-day-date{font-weight:700;margin-bottom:4px;}
    .week-day-week{font-size:12px;}

    .staff-list{
      display:flex;flex-direction:column;gap:10px;
    }
    .staff-item{
      padding:15px 20px;border-radius:16px;
      background:#fafbfc;border:1px solid #eee;
      cursor:pointer;
    }
    .staff-item.active{background:#fdf2f8;border-color:#ff8da1}
    .staff-name{font-weight:700;margin-bottom:4px;}
    .staff-time{font-size:12px;color:#666;}

    .time-grid{
      display:grid;grid-template-columns:1fr 1fr 1fr;
      gap:8px;max-height:280px;overflow-y:auto;
    }
    .time-btn{
      padding:12px 5px;border-radius:14px;
      background:#fafbfc;border:1px solid #eee;
      text-align:center;font-weight:500;cursor:pointer;
    }
    .time-btn.active{background:#ff4d88;color:#fff;}

    .form-group{margin-bottom:20px}
    label{font-weight:600;color:#333;}
    input,textarea{
      width:100%;height:54px;
      padding:0 20px;border-radius:16px;
      border:1px solid #eee;background:#fafbfc;
      font-size:15px;
    }
    input:focus,textarea:focus{
      outline:none;border-color:#ff8da1;
      background:#fdf2f8;
    }
    textarea{min-height:120px;resize:none;}

    .btn-next{
      width:100%;height:58px;
      background:linear-gradient(135deg,#FF5D8F,#FF3377);
      border:none;border-radius:20px;
      color:#fff;font-size:16px;font-weight:700;
      cursor:pointer;
    }
    .btn-next:disabled{opacity:0.6}
    .loading{text-align:center;color:#999;padding:20px}

    #loadingOverlay{
      position:fixed;inset:0;
      background:rgba(255,255,255,0.95);
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      z-index:9999;
    }
    .loading-spinner{
      width:60px;height:60px;
      border:5px solid #fce8f3;
      border-top:5px solid #ff4d88;
      border-radius:50%;
      animation:spin 1s linear infinite;
    }
    @keyframes spin{100%{transform:rotate(360deg)}}

    .modal-overlay {
      position: fixed;inset:0;background:#0006;
      display:flex;align-items:center;justify-content:center;
      z-index:99999;opacity:0;pointer-events:none;
    }
    .modal-overlay.active {opacity:1;pointer-events:all;}
    .modal-box {
      background:#fff;border-radius:20px;padding:30px 25px;
      width:90%;max-width:380px;text-align:center;
    }
    .modal-icon{font-size:40px;margin-bottom:15px}
    .modal-title{font-size:18px;font-weight:700;margin-bottom:10px}
    .modal-desc{margin-bottom:25px}
    .modal-btn{
      width:100%;height:50px;
      border-radius:12px;border:none;
      background:#ff4d88;color:#fff;
      font-size:15px;font-weight:600;
    }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div style="color:#ff4d88">🌸 系統初始化中，請稍候...</div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-icon">✅</div>
    <h3 class="modal-title">預約成功</h3>
    <p class="modal-desc">您的預約已提交</p>
    <button class="modal-btn" id="modalBtn">確認</button>
  </div>
</div>

<main>
  <div class="header">
    <h1 class="main-title">莫凡韓式皮膚管理</h1>
    <p>專業美容 · 一對一精緻服務</p>
  </div>

  <div class="step-bar">
    <div class="step active" data-step="1"><div class="step-num">1</div><div class="step-text">選擇服務</div></div>
    <div class="step" data-step="2"><div class="step-num">2</div><div class="step-text">選擇日期</div></div>
    <div class="step" data-step="3"><div class="step-num">3</div><div class="step-text">預約資訊</div></div>
  </div>

  <div class="section active" id="step1">
    <div class="section-title">服務項目分類</div>
    <div class="search-wrapper">
      <div class="search-container">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="serviceSearch" placeholder="搜尋服務項目">
        <span class="search-clear" id="searchClear">✕</span>
      </div>
    </div>
    <div class="category-tabs">
      <div class="tab active" data-cate="面部">面部管理</div>
      <div class="tab" data-cate="美甲">美甲手足</div>
      <div class="tab" data-cate="眉眼">眉眼唇</div>
      <div class="tab" data-cate="身體">身體護理</div>
    </div>
    <div class="service-grid" id="serviceGrid"><div class="loading">載入服務中...</div></div>
    <div class="pagination" id="pagination"></div>
    <button class="btn-next" id="nextToDate" disabled>下一步：選擇預約日期</button>
  </div>

  <div class="section" id="step2">
    <div class="section-title">選擇預約日期</div>
    <div class="week-slider" id="weekSlider"><div class="loading">載入排班中...</div></div>
    <div class="section-title">選擇美容師</div>
    <div class="staff-list" id="staffList"><div class="loading">請先選擇日期</div></div>
    <div class="section-title">選擇預約時段</div>
    <div class="time-grid" id="timeGrid"><div class="loading">請先選擇美容師</div></div>
    <button class="btn-next" id="nextToInfo" disabled>下一步：填寫預約資訊</button>
  </div>

  <div class="section" id="step3">
    <div class="form-group"><label>姓名 *</label><input type="text" id="name" required></div>
    <div class="form-group"><label>聯絡電話 *</label><input type="tel" id="phone" required></div>
    <div class="form-group"><label>生日</label><input type="date" id="birthday"></div>
    <div class="form-group"><label>備註</label><textarea id="extraInfo"></textarea></div>
    <button class="btn-next" id="submitBtn">確認提交預約</button>
  </div>

  <input type="hidden" id="selectedService">
  <input type="hidden" id="selectedDate">
  <input type="hidden" id="selectedStaff">
  <input type="hidden" id="selectedTime">
  <input type="hidden" id="lineId">
  <input type="hidden" id="lineName">
</main>

<script>
const CONFIG = {
  SCRIPT_URL: "https://script.google.com/macros/s/AKfycbwgKFHvVz6ZrPN4gkFGP4DMJ6Gwi8DFpLZ5JlMlC-TgL0NnSClqLZvHgtgvlKr1FljcoA/exec",
  LIFF_ID: "2009598216-MmBS77sp"
};

let userId = "guest_"+Date.now();
let userName = "訪客";
const weekDays = ['日','一','二','三','四','五','六'];
const PAGE_SIZE = 8;
let currentPage=1, totalPage=1, currentServiceList=[], searchKeyword="";
const GLOBAL_DATA = {dateList:[], allServices:[], staffData:{}};

const CATEGORIES = {
  "面部":["液態飛梭","無痛清粉刺","無痛清粉刺+修護敏感項目","無痛清粉刺+靚白水光肌項目","進化黑矽晶重返年輕課程","黑臉娃娃","除疣","除斑","臉部深層保濕課程","臉部皮秒課程","臉部白藻針課程","臉部清粉刺","高階保養"],
  "美甲":["光療美甲","卸甲","光療美甲加卸甲","剪手腳指甲","手部保養","足部保養"],
  "眉眼":["霧眉","霧唇","洗眉","角蛋白","接睫毛"],
  "身體":["無痛粉嫩乳暈術","外泌體育髪","除私密毛","腋下私毛"]
};

function gasRequest(action, params, callback) {
  let url = CONFIG.SCRIPT_URL + "?action=" + encodeURIComponent(action);
  for(let k in params) url += "&"+encodeURIComponent(k)+"="+encodeURIComponent(params[k]||"");
  
  const xhr = new XMLHttpRequest();
  xhr.open("GET", url, true);
  xhr.onload = function(){
    try{ callback(JSON.parse(xhr.responseText)); }
    catch(e){ callback({status:"error",message:"系統異常"}); }
  };
  xhr.onerror = function(){ callback({status:"error",message:"網路異常"}) };
  xhr.send();
}

function showModal(type,title,desc){
  const m = document.getElementById('modal');
  m.querySelector('.modal-icon').textContent = type==='success'?'✅':'❌';
  m.querySelector('.modal-title').textContent = title;
  m.querySelector('.modal-desc').textContent = desc;
  m.classList.add('active');
}
function closeModal(){document.getElementById('modal').classList.remove('active');}

function goStep(s){
  document.querySelectorAll('.section').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.step').forEach(e=>e.classList.remove('active'));
  document.getElementById('step'+s).classList.add('active');
  document.querySelector(`[data-step="${s}"]`).classList.add('active');
}

function renderPagination(){
  const p = document.getElementById('pagination');
  if(totalPage<=1){p.innerHTML='';return;}
  p.innerHTML = `
    <button ${currentPage===1?'disabled':''} onclick="currentPage=1;renderCurrentPage()">首頁</button>
    <button ${currentPage===1?'disabled':''} onclick="currentPage--;renderCurrentPage()">上一頁</button>
    <span>${currentPage}/${totalPage}</span>
    <button ${currentPage===totalPage?'disabled':''} onclick="currentPage++;renderCurrentPage()">下一頁</button>
    <button ${currentPage===totalPage?'disabled':''} onclick="currentPage=totalPage;renderCurrentPage()">末頁</button>
  `;
}

function renderCurrentPage(){
  const g = document.getElementById('serviceGrid');
  g.innerHTML = '';
  if(!currentServiceList.length){g.innerHTML='<div class="loading">暫無服務</div>';renderPagination();return;}
  const list = currentServiceList.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
  list.forEach(item=>{
    const c = document.createElement('div');
    c.className='service-card';
    c.innerHTML = `${item.name}<span class="service-duration">${item.duration}分</span>`;
    c.onclick = ()=>{
      document.querySelectorAll('.service-card').forEach(x=>x.classList.remove('active'));
      c.classList.add('active');
      document.getElementById('selectedService').value = item.name || "";
      document.getElementById('nextToDate').disabled = false;
    };
    g.appendChild(c);
  });
  renderPagination();
}

function renderServices(cate){
  currentPage=1;
  currentServiceList = (GLOBAL_DATA.allServices||[]).filter(s=>
    CATEGORIES[cate]?.includes(s.name) && (searchKeyword===''||s.name.includes(searchKeyword))
  );
  totalPage = Math.ceil(currentServiceList.length/PAGE_SIZE);
  renderCurrentPage();
}

function renderDates(){
  const w = document.getElementById('weekSlider');
  w.innerHTML = '';
  const dateList = (GLOBAL_DATA.dateList || []).filter(d => d && typeof d === 'string');
  if(!dateList.length){w.innerHTML='<div class="loading">暫無排班</div>';return;}
  
  dateList.forEach((d,i)=>{
    const el = document.createElement('div');
    el.className = `week-day ${i===0?'active':''}`;
    
    // ✅ 關鍵修復：確保 d 是字串才 split
    let month = "", day = "";
    if (d && typeof d === 'string') {
      const arr = d.split('-');
      if (arr.length >=3) {
        month = arr[1];
        day = arr[2];
      }
    }

    el.innerHTML = `<div>${month}/${day}</div><div>週${weekDays[new Date(d).getDay()] || '一'}</div>`;
    el.onclick = ()=>{
      document.querySelectorAll('.week-day').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('selectedDate').value = d || "";
      renderStaff(d);
    };
    w.appendChild(el);
  });
  const firstDate = dateList[0] || "";
  document.getElementById('selectedDate').value = firstDate;
  renderStaff(firstDate);
}

function renderStaff(date){
  const s = document.getElementById('staffList');
  s.innerHTML = '<div class="loading">載入美容師中...</div>';
  document.getElementById('selectedStaff').value = '';
  document.getElementById('timeGrid').innerHTML = '<div class="loading">請先選擇美容師</div>';
  document.getElementById('nextToInfo').disabled = true;
  
  const list = (date && GLOBAL_DATA.staffData && GLOBAL_DATA.staffData[date]) || [];
  if(!list.length){s.innerHTML='<div class="loading">當日無美容師</div>';return;}
  
  s.innerHTML = '';
  list.forEach(st=>{
    const el = document.createElement('div');
    el.className='staff-item';
    const name = st?.name || "";
    const start = st?.start || "";
    const end = st?.end || "";
    el.innerHTML = `<div class="staff-name">${name}</div><div>營業時間：${start}~${end}</div>`;
    el.onclick = ()=>{
      document.querySelectorAll('.staff-item').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('selectedStaff').value = name;
      renderSlots();
    };
    s.appendChild(el);
  });
}

function renderSlots(){
  const date = (document.getElementById('selectedDate').value || "").trim();
  const staff = (document.getElementById('selectedStaff').value || "").trim();
  const service = (document.getElementById('selectedService').value || "").trim();
  const g = document.getElementById('timeGrid');

  if(!service){g.innerHTML='❌ 請選擇服務';return;}
  if(!date||!staff){g.innerHTML='❌ 請選擇日期/美容師';return;}

  g.innerHTML = '🔍 載入可用時段中...';
  document.getElementById('selectedTime').value = '';
  document.getElementById('nextToInfo').disabled = true;

  gasRequest("getSlots", { date, staff, service }, res=>{
    if(res.status==="success"){
      const slots = res.slots||[];
      g.innerHTML = slots.length===0?'✅ 當日已滿單':'';
      slots.forEach(t=>{
        const b = document.createElement('div');
        b.className='time-btn';
        b.textContent = t || "";
        b.onclick = ()=>{
          document.querySelectorAll('.time-btn').forEach(x=>x.classList.remove('active'));
          b.classList.add('active');
          document.getElementById('selectedTime').value = t || "";
          document.getElementById('nextToInfo').disabled = false;
        };
        g.appendChild(b);
      });
    }else{
      showModal('error','載入失敗',res.message||'網路異常');
    }
  });
}

function loadAllData(){
  gasRequest("getAllData",{},res=>{
    document.getElementById('loadingOverlay').style.display='none';
    if(res.status==="success"){
      GLOBAL_DATA.dateList = res.dateList||[];
      GLOBAL_DATA.allServices = res.services||[];
      GLOBAL_DATA.staffData = res.staffData||{};
      renderServices('面部');
      renderDates();
    }else{
      showModal('error','載入失敗','系統初始化失敗');
    }
  });
}

function submit(){
  const data = {
    lineId: userId,
    lineName: userName,
    date: document.getElementById('selectedDate').value || "",
    service: document.getElementById('selectedService').value || "",
    staff: document.getElementById('selectedStaff').value || "",
    appointTime: document.getElementById('selectedTime').value || "",
    name: (document.getElementById('name').value || "").trim(),
    phone: (document.getElementById('phone').value || "").trim(),
    birthday: (document.getElementById('birthday').value || "").trim(),
    extraInfo: (document.getElementById('extraInfo').value || "").trim()
  };
  if(!data.name||!data.phone){showModal('error','填寫錯誤','請填寫姓名與電話');return;}
  document.getElementById('submitBtn').disabled=true;
  gasRequest("submit",data,res=>{
    document.getElementById('submitBtn').disabled=false;
    if(res.status==="success"){
      showModal('success','預約成功','您的預約已提交！');
      setTimeout(()=>location.reload(),2000);
    }else{
      showModal('error','預約失敗',res.message);
    }
  });
}

async function initLiff(){
  try{
    await liff.init({liffId:CONFIG.LIFF_ID});
    if(liff.isLoggedIn()){
      const p = await liff.getProfile();
      userId = p.userId || "guest";
      userName = p.displayName || "訪客";
    }
  }catch(e){}
  finally{
    document.getElementById('lineId').value = userId;
    document.getElementById('lineName').value = userName;
  }
}

document.addEventListener('DOMContentLoaded',async()=>{
  await initLiff();
  loadAllData();
  document.getElementById('modalBtn').onclick=closeModal;
  const s = document.getElementById('serviceSearch');
  const c = document.getElementById('searchClear');
  s.oninput = e=>{searchKeyword=e.target.value.trim();c.classList.toggle('show',searchKeyword!=='');renderServices(document.querySelector('.tab.active').dataset.cate);};
  c.onclick = ()=>{s.value='';searchKeyword='';c.classList.remove('show');renderServices(document.querySelector('.tab.active').dataset.cate);};
  document.querySelectorAll('.tab').forEach(t=>{t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');renderServices(t.dataset.cate);};});
  document.getElementById('nextToDate').onclick=()=>goStep(2);
  document.getElementById('nextToInfo').onclick=()=>goStep(3);
  document.getElementById('submitBtn').onclick=submit;
});
</script>
</body>
</html>
