<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>莫凡韩式皮肤管理 | 线上预约</title>
  <link rel="icon" href="data:,">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:linear-gradient(135deg,#fdf2f8 0%,#fef7fb 50%,#fce8f3 100%);
      font-family:'Noto Sans TC',sans-serif;color:#444;
      display:flex;justify-content:center;min-height:100vh;
      padding:15px 10px 60px;
    }
    main{
      background:#fff;border-radius:28px;
      box-shadow:0 20px 60px rgba(255,133,162,0.15);
      width:100%;max-width:480px;padding:40px 28px;
      position:relative;overflow:hidden;
      border: 1px solid #333;
    }
    main::before{
      content:'';position:absolute;top:0;left:0;
      width:100%;height:8px;
      background:linear-gradient(90deg,#ff8da1,#ff4d88,#c77dff);
    }
    .header{text-align:center;margin-bottom:35px}
    .main-title{
      font-size:2rem;font-weight:900;
      background:linear-gradient(90deg,#ff4d88,#ff8da1,#c77dff);
      -webkit-background-clip:text;color:transparent;
      margin-bottom:8px;
    }
    .sub-title{font-size:1rem;color:#888;font-weight:500}
    
    .step-bar{
      display:flex;justify-content:space-between;
      margin-bottom:30px;position:relative;
    }
    .step-bar::before{
      content:'';position:absolute;top:12px;left:10%;right:10%;
      height:3px;background:#f0f0f0;z-index:1;
    }
    .step{
      display:flex;flex-direction:column;align-items:center;
      position:relative;z-index:2;width:33%;
    }
    .step-num{
      width:28px;height:28px;border-radius:50%;
      background:#f0f0f0;color:#999;
      display:flex;align-items:center;justify-content:center;
      font-weight:700;margin-bottom:8px;
      border: 1px solid #333;
      transition:0.3s;
    }
    .step-text{font-size:12px;color:#999;font-weight:500}
    .step.active .step-num{background:#ff4d88;color:#fff}
    .step.active .step-text{color:#ff4d88;font-weight:700}

    .section{margin-bottom:28px;display:none}
    .section.active{display:block}
    .section-title{
      font-size:1.1rem;font-weight:700;
      color:#333;margin-bottom:15px;
      display:flex;align-items:center;gap:8px;
    }
    .section-title::before{
      content:'';width:4px;height:20px;
      background:#ff4d88;border-radius:2px;
    }

    .search-wrapper {
      position: relative;
      margin-bottom: 20px;
    }
    .search-container {
      display: flex;
      align-items: center;
      padding: 0 18px;
      background: #ffffff;
      border-radius:22px;
      box-shadow:0 6px 18px rgba(255,77,136,0.1);
      border:1px solid #333;
      transition: all 0.3s ease;
    }
    .search-container:focus-within {
      border-color: #ff8da1;
    }
    .search-icon {
      font-size:16px;color:#ff4d88;margin-right:12px;
    }
    .search-input {
      flex:1;height:52px;border:none;outline:none;
      background:transparent;font-size:15px;color:#444;
      padding:0 5px;
    }
    .search-input::placeholder {
      color:#c0c0c0;font-weight:500;
    }
    .search-clear {
      width:24px;height:24px;display:flex;
      align-items:center;justify-content:center;
      font-size:12px;color:#999;background:#f8f9fa;
      border-radius:50%;cursor:pointer;transition:0.3s;
      border: 1px solid #333;
      opacity:0;pointer-events:none;
    }
    .search-clear.show {
      opacity:1;pointer-events:all;
    }
    .search-clear:hover {
      background:#ff4d88;color:#fff;
    }

    .category-tabs{
      display:flex;gap:8px;overflow-x:auto;
      padding:10px 0;margin-bottom:15px;
      justify-content: center;
      align-items: center;
      flex-wrap: nowrap;
    }
    .category-tabs::-webkit-scrollbar{height:0}
    .tab{
      padding:8px 14px;border-radius:20px;
      background:#f8f9fa;border:1px solid #333;
      font-size:14px;font-weight:500;cursor:pointer;
      white-space:nowrap;transition:0.3s;
      text-align: center;
      line-height: 1.2;
    }
    .tab.active{background:#ff4d88;color:#fff;border-color:#ff4d88}

    .service-grid{
      display:grid;grid-template-columns:1fr 1fr;
      gap:10px;max-height:320px;overflow-y:auto;
      padding-right:5px;
      min-height: 280px;
    }
    .service-card{
      padding:12px 10px;border-radius:16px;
      background:#fafbfc;border:1px solid #333;
      text-align:center;font-size:13px;font-weight:500;
      cursor:pointer;transition:0.3s;
      min-height:60px;display:flex;
      flex-direction:column;justify-content:center;
    }
    .service-card:hover{border-color:#ff8da1;background:#fdf2f8}
    .service-card.active{background:#ff4d88;color:#fff;border-color:#ff4d88}
    .service-duration{font-size:11px;margin-top:3px;opacity:0.8}

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 15px 0;
      padding: 10px;
      flex-wrap: nowrap;
      overflow-x: auto;
    }
    .pagination::-webkit-scrollbar {display: none;}
    .page-btn {
      width:36px;height:36px;border-radius:12px;
      border:1px solid #333;
      background:#f8f9fa;
      color:#666;font-size:14px;font-weight:600;
      cursor:pointer;
      flex-shrink: 0;
    }
    .page-btn:hover:not(:disabled) {
      background:#ff4d88;color:#fff;
    }
    .page-btn:disabled {
      background:#e9ecef;color:#ccc;
    }
    .page-text {
      min-width:40px;text-align:center;font-size:14px;
      font-weight:600;color:#333;
      flex-shrink: 0;
    }

    .week-slider{
      display:flex;gap:10px;overflow-x:auto;
      padding:5px 0;margin-bottom:10px;
    }
    .week-day{
      min-width:85px;padding:15px 10px;
      border-radius:18px;background:#fafbfc;
      border:1px solid #333;
      text-align:center;
      cursor:pointer;
    }
    .week-day.active{background:#ff4d88;color:#fff;}
    .week-day-date{font-weight:700;margin-bottom:4px;font-size:16px;}
    .week-day-week{font-size:12px;}

    .staff-list{
      display:flex;flex-direction:column;gap:10px;
    }
    .staff-item{
      padding:15px 20px;border-radius:16px;
      background:#fafbfc;border:1px solid #333;
      cursor:pointer;
    }
    .staff-item.active{background:#fdf2f8;border-color:#ff8da1}
    .staff-name{font-weight:700;margin-bottom:4px;font-size:16px;}
    .staff-time{font-size:12px;color:#666;}

    .time-grid{
      display:grid;grid-template-columns:1fr 1fr 1fr;
      gap:8px;max-height:320px;overflow-y:auto;
      padding-right:5px;
    }
    .time-btn{
      padding:15px 5px;border-radius:14px;
      background:#fafbfc;border:1px solid #333;
      text-align:center;font-weight:500;cursor:pointer;
      transition: 0.3s;
      font-size:14px;
    }
    .time-btn.active{background:#ff4d88;color:#fff;}
    .time-btn:hover:not(.active){border-color:#ff8da1;background:#fdf2f8;}

    .form-group{margin-bottom:20px}
    label{font-weight:600;color:#333;display:block;margin-bottom:8px;}
    input,textarea{
      width:100%;height:54px;
      padding:0 20px;border-radius:16px;
      border:1px solid #333;
      background:#fafbfc;
      font-size:15px;
      font-family:'Noto Sans TC',sans-serif;
    }
    input:focus,textarea:focus{
      outline:none;border-color:#ff8da1;
      background:#fdf2f8;
    }
    textarea{min-height:120px;resize:none;padding:15px 20px;}

    .btn-next{
      width:100%;height:58px;
      background:linear-gradient(135deg,#FF5D8F,#FF3377);
      border:1px solid #333;
      border-radius:20px;
      color:#fff;font-size:16px;font-weight:700;
      cursor:pointer;
      font-family:'Noto Sans TC',sans-serif;
      margin-top:10px;
    }
    .btn-next:disabled{opacity:0.6;cursor:not-allowed;}
    .loading{text-align:center;color:#999;padding:20px;font-size:14px;}

    #loadingOverlay{
      position:fixed;inset:0;
      background:rgba(255,255,255,0.95);
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      z-index:9999;
    }
    .loading-spinner{
      width:60px;height:60px;
      border:5px solid #fce8f3;
      border-top:5px solid #ff4d88;
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin-bottom:15px;
    }
    @keyframes spin{100%{transform:rotate(360deg)}}

    .modal-overlay {
      position: fixed;inset:0;background:rgba(0,0,0,0.6);
      display:flex;align-items:center;justify-content:center;
      z-index:99999;opacity:0;pointer-events:none;
      transition:opacity 0.3s ease;
    }
    .modal-overlay.active {opacity:1;pointer-events:all;}
    .modal-box {
      background:#fff;border-radius:20px;padding:30px 25px;
      width:90%;max-width:380px;text-align:center;
      border: 1px solid #333;
      transform:scale(0.9);
      transition:transform 0.3s ease;
    }
    .modal-overlay.active .modal-box{transform:scale(1);}
    .modal-icon{font-size:40px;margin-bottom:15px;color:#ff4d88;}
    .modal-title{font-size:18px;font-weight:700;margin-bottom:10px;color:#333;}
    .modal-desc{margin-bottom:25px;color:#666;font-size:14px;}
    .modal-btn{
      width:100%;height:50px;
      border-radius:12px;border:1px solid #333;
      background:#ff4d88;color:#fff;
      font-size:15px;font-weight:600;
      cursor:pointer;
      font-family:'Noto Sans TC',sans-serif;
    }
    .modal-btn:hover{background:#ff3377;}
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div style="color:#ff4d88;font-size:16px;font-weight:500;">🌸 系统初始化中，请稍候...</div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-icon">✅</div>
    <h3 class="modal-title">预约成功</h3>
    <p class="modal-desc">您的预约已提交，我们会尽快与您确认</p>
    <button class="modal-btn" id="modalBtn">确认</button>
  </div>
</div>

<main>
  <div class="header">
    <h1 class="main-title">莫凡韩式皮肤管理</h1>
    <p class="sub-title">专业美容 · 一对一精致服务</p>
  </div>

  <div class="step-bar">
    <div class="step active" data-step="1"><div class="step-num">1</div><div class="step-text">选择服务</div></div>
    <div class="step active" data-step="2"><div class="step-num">2</div><div class="step-text">选择日期</div></div>
    <div class="step" data-step="3"><div class="step-num">3</div><div class="step-text">预约信息</div></div>
  </div>

  <div class="section active" id="step1">
    <div class="section-title">服务项目分类</div>
    <div class="search-wrapper">
      <div class="search-container">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="serviceSearch" placeholder="搜寻服务项目">
        <span class="search-clear" id="searchClear">✕</span>
      </div>
    </div>
    <div class="category-tabs">
      <div class="tab active" data-cate="面部">面部<br>管理</div>
      <div class="tab" data-cate="美甲">美甲<br>手足</div>
      <div class="tab" data-cate="眉眼">眉眼唇</div>
      <div class="tab" data-cate="身体">身体<br>护理</div>
    </div>
    <div class="service-grid" id="serviceGrid"><div class="loading">载入服务中...</div></div>
    <div class="pagination" id="pagination"></div>
    <button class="btn-next" id="nextToDate" disabled>下一步：选择预约日期</button>
  </div>

  <div class="section" id="step2">
    <div class="section-title">选择预约日期</div>
    <div class="week-slider" id="weekSlider"><div class="loading">载入排班中...</div></div>
    <div class="section-title">选择美容师</div>
    <div class="staff-list" id="staffList"><div class="loading">请先选择日期</div></div>
    <div class="section-title">选择预约时段</div>
    <div class="time-grid" id="timeGrid"><div class="loading">请先选择美容师</div></div>
    <button class="btn-next" id="nextToInfo" disabled>下一步：填写预约信息</button>
  </div>

  <div class="section" id="step3">
    <div class="form-group"><label>姓名 *</label><input type="text" id="name" required placeholder="请输入您的姓名"></div>
    <div class="form-group"><label>联络电话 *</label><input type="tel" id="phone" required placeholder="请输入您的联络电话"></div>
    <div class="form-group"><label>生日</label><input type="date" id="birthday"></div>
    <div class="form-group"><label>备注</label><textarea id="extraInfo" placeholder="请输入其他需要说明的事项（选填）"></textarea></div>
    <button class="btn-next" id="submitBtn">确认提交预约</button>
  </div>

  <input type="hidden" id="selectedService">
  <input type="hidden" id="selectedDate">
  <input type="hidden" id="selectedStaff">
  <input type="hidden" id="selectedTime">
  <input type="hidden" id="lineId">
  <input type="hidden" id="lineName">
</main>

<script>
const CONFIG = {
  SCRIPT_URL: "https://script.google.com/macros/s/AKfycbwgKFHvVz6ZrPN4gkFGP4DMJ6Gwi8DFpLZ5JlMlC-TgL0NnSClqLZvHgtgvlKr1FljcoA/exec",
  LIFF_ID: "2009598216-MmBS77sp"
};

let userId = "guest_"+Date.now();
let userName = "访客";
const weekDays = ['日','一','二','三','四','五','六'];
const PAGE_SIZE = 8;
let currentPage=1, totalPage=1, currentServiceList=[], searchKeyword="";
const GLOBAL_DATA = {dateList:[], allServices:[], staffData:{}};

const CATEGORIES = {
  "面部":["液态飞梭","无痛清粉刺","无痛清粉刺+修护敏感项目","无痛清粉刺+靓白水光肌项目","进化黑矽晶重返年轻课程","黑脸娃娃","除疣","除斑","脸部深层保湿课程","脸部皮秒课程","脸部白藻针课程","脸部清粉刺","高阶保养"],
  "美甲":["光疗美甲","卸甲","光疗美甲加卸甲","剪手脚指甲","手部保养","足部保养"],
  "眉眼":["雾眉","雾唇","洗眉","角蛋白","接睫毛"],
  "身体":["无痛粉嫩乳晕术","外泌体育发","除私密毛","腋下私毛"]
};

// 强制台北时区（GMT+8），彻底解决时间错误
function getTaipeiDateString(date) {
  const options = { timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit' };
  return new Date(date).toLocaleDateString('zh-CN', options).replace(/\//g, '-');
}
function getTodayTaipei() {
  return getTaipeiDateString(new Date());
}

function gasRequest(action, params, callback) {
  const safeParams = params || {};
  let url = CONFIG.SCRIPT_URL + "?action=" + encodeURIComponent(action);
  for(let k in safeParams) {
    const val = safeParams[k] || "";
    url += "&"+encodeURIComponent(k)+"="+encodeURIComponent(val);
  }
  
  const xhr = new XMLHttpRequest();
  xhr.open("GET", url, true);
  xhr.timeout = 15000;
  xhr.ontimeout = function() {
    callback({status:"error",message:"请求超时，请稍后再试"});
  };
  xhr.onload = function(){
    try{ 
      const resData = JSON.parse(xhr.responseText || "{}");
      callback(resData || {status:"error",message:"数据格式异常"}); 
    }
    catch(e){ 
      callback({status:"error",message:"系统异常："+e.message}); 
    }
  };
  xhr.onerror = function(){ 
    callback({status:"error",message:"网络异常，请检查网络连接"}) 
  };
  xhr.send();
}

function showModal(type,title,desc){
  const m = document.getElementById('modal');
  const iconEl = m.querySelector('.modal-icon');
  const titleEl = m.querySelector('.modal-title');
  const descEl = m.querySelector('.modal-desc');
  
  iconEl.textContent = type==='success'?'✅':'❌';
  iconEl.style.color = type==='success'?'#ff4d88':'#e74c3c';
  titleEl.textContent = title;
  descEl.textContent = desc;
  
  m.classList.add('active');
}

function closeModal(){
  document.getElementById('modal').classList.remove('active');
}

function goStep(s){
  document.querySelectorAll('.section').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.step').forEach(e=>e.classList.remove('active'));
  document.getElementById('step'+s).classList.add('active');
  document.querySelector(`.step[data-step="${s}"]`).classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderPagination(){
  const p = document.getElementById('pagination');
  if(totalPage<=1){ p.innerHTML=''; return; }
  p.innerHTML = `
    <button class="page-btn" ${currentPage===1?'disabled':''} onclick="currentPage=1;renderCurrentPage()">首页</button>
    <button class="page-btn" ${currentPage===1?'disabled':''} onclick="currentPage--;renderCurrentPage()">上一页</button>
    <span class="page-text">${currentPage}/${totalPage}</span>
    <button class="page-btn" ${currentPage===totalPage?'disabled':''} onclick="currentPage++;renderCurrentPage()">下一页</button>
    <button class="page-btn" ${currentPage===totalPage?'disabled':''} onclick="currentPage=totalPage;renderCurrentPage()">末页</button>
  `;
}

function renderCurrentPage(){
  const g = document.getElementById('serviceGrid');
  g.innerHTML = '';
  if(!currentServiceList.length){ g.innerHTML='<div class="loading">暂无符合条件的服务</div>'; renderPagination(); return; }
  
  const startIdx = (currentPage-1)*PAGE_SIZE;
  const list = currentServiceList.slice(startIdx, startIdx+PAGE_SIZE);
  
  list.forEach(item=>{
    if(!item?.name) return;
    const c = document.createElement('div');
    c.className='service-card';
    c.innerHTML = `${item.name}<span class="service-duration">${item.duration || 0}分</span>`;
    c.onclick = ()=>{
      document.querySelectorAll('.service-card').forEach(x=>x.classList.remove('active'));
      c.classList.add('active');
      document.getElementById('selectedService').value = item.name;
      document.getElementById('nextToDate').disabled = false;
    };
    g.appendChild(c);
  });
  renderPagination();
}

function renderServices(cate){
  currentPage=1;
  const allServices = GLOBAL_DATA.allServices || [];
  const cateList = CATEGORIES[cate] || [];
  currentServiceList = allServices.filter(s=> s?.name && cateList.includes(s.name) && (searchKeyword==='' || s.name.includes(searchKeyword)));
  totalPage = Math.ceil(currentServiceList.length/PAGE_SIZE);
  renderCurrentPage();
}

function renderDates(){
  const w = document.getElementById('weekSlider');
  w.innerHTML = '';
  const today = getTodayTaipei();
  const dateList = (GLOBAL_DATA.dateList || []).filter(d => d && d >= today);
  
  if(!dateList.length){ w.innerHTML='<div class="loading">暂无可预约的日期</div>'; return; }
  
  dateList.forEach(d=>{
    const el = document.createElement('div');
    el.className = 'week-day';
    const [,month,day] = d.split('-');
    const week = weekDays[new Date(d).getDay()];
    el.innerHTML = `<div class="week-day-date">${month}/${day}</div><div class="week-day-week">週${week}</div>`;
    el.onclick = ()=>{
      document.querySelectorAll('.week-day').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('selectedDate').value = d;
      renderStaff(d);
    };
    w.appendChild(el);
  });
  
  // 默认选中第一个日期
  document.querySelectorAll('.week-day')[0]?.click();
}

function renderStaff(date){
  const s = document.getElementById('staffList');
  s.innerHTML = '<div class="loading">载入美容师中...</div>';
  document.getElementById('selectedStaff').value = '';
  document.getElementById('timeGrid').innerHTML = '<div class="loading">请先选择美容师</div>';
  document.getElementById('nextToInfo').disabled = true;
  
  if(!date || !GLOBAL_DATA.staffData){ s.innerHTML='<div class="loading">请选择有效日期</div>'; return; }
  const list = GLOBAL_DATA.staffData[date] || [];
  if(!list.length){ s.innerHTML='<div class="loading">当日无美容师值班</div>'; return; }
  
  s.innerHTML = '';
  list.forEach(st=>{
    if(!st) return;
    const el = document.createElement('div');
    el.className='staff-item';
    el.innerHTML = `<div class="staff-name">${st.name}</div><div class="staff-time">营业时间：${st.start}~${st.end}</div>`;
    el.onclick = ()=>{
      document.querySelectorAll('.staff-item').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('selectedStaff').value = st.name;
      renderSlots();
    };
    s.appendChild(el);
  });
  // 默认选中第一个美容师
  document.querySelectorAll('.staff-item')[0]?.click();
}

// ✅ 核心修复：预约时间渲染、选择、赋值（彻底解决时间错误）
function renderSlots(){
  const date = document.getElementById('selectedDate').value.trim();
  const staff = document.getElementById('selectedStaff').value.trim();
  const service = document.getElementById('selectedService').value.trim();
  const g = document.getElementById('timeGrid');

  // 前置校验
  if(!service){ g.innerHTML='<div class="loading">❌ 请先选择服务项目</div>'; return; }
  if(!date || !staff){ g.innerHTML='<div class="loading">❌ 请先选择日期和美容师</div>'; return; }

  // 重置状态
  g.innerHTML = '<div class="loading">🔍 载入可用时段中...</div>';
  document.getElementById('selectedTime').value = '';
  document.getElementById('nextToInfo').disabled = true;

  // 获取可用时段
  gasRequest("getSlots", { date, staff, service }, res=>{
    if(res?.status !== "success"){
      showModal('error','载入失败',res?.message||'网络异常，无法载入时段');
      g.innerHTML = '<div class="loading">❌ 载入时段失败，请重新选择</div>';
      return;
    }

    const slots = res.slots || [];
    g.innerHTML = '';

    if(slots.length === 0){
      g.innerHTML = '<div class="loading">😥 该美容师当日已无可用时段</div>';
      return;
    }

    // 渲染时间按钮 + 强制赋值
    slots.forEach((item, idx)=>{
      if(!item?.time) return;
      const timeText = item.time.trim();
      const b = document.createElement('div');
      b.className = 'time-btn';
      b.textContent = timeText;
      
      // 点击事件：正确赋值时间
      b.onclick = ()=>{
        document.querySelectorAll('.time-btn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        document.getElementById('selectedTime').value = timeText; // ✅ 强制赋值
        document.getElementById('nextToInfo').disabled = false;
      };
      g.appendChild(b);
    });

    // ✅ 默认选中第一个时间，自动赋值
    const firstTimeBtn = document.querySelectorAll('.time-btn')[0];
    if(firstTimeBtn){
      firstTimeBtn.click();
    }
  });
}

function loadAllData(){
  gasRequest("getAllData",{},res=>{
    document.getElementById('loadingOverlay').style.display='none';
    if(res?.status==="success"){
      GLOBAL_DATA.dateList = res.dateList || [];
      GLOBAL_DATA.allServices = res.services || [];
      GLOBAL_DATA.staffData = res.staffData || {};
      renderServices('面部');
      renderDates();
    }else{
      showModal('error','初始化失败',res?.message||'系统初始化失败，请刷新页面重试');
    }
  });
}

// ✅ 修复：提交前强校验时间，防止空值
function submit(){
  const data = {
    lineId: userId,
    lineName: userName,
    date: document.getElementById('selectedDate').value,
    service: document.getElementById('selectedService').value,
    staff: document.getElementById('selectedStaff').value,
    appointTime: document.getElementById('selectedTime').value,
    name: document.getElementById('name').value.trim(),
    phone: document.getElementById('phone').value.trim(),
    birthday: document.getElementById('birthday').value.trim(),
    extraInfo: document.getElementById('extraInfo').value.trim()
  };
  
  // 强制校验所有必填项（包含时间）
  if(!data.service){ showModal('error','填写错误','请选择服务项目'); return; }
  if(!data.date){ showModal('error','填写错误','请选择预约日期'); return; }
  if(!data.staff){ showModal('error','填写错误','请选择美容师'); return; }
  if(!data.appointTime){ showModal('error','填写错误','请选择预约时间'); return; }
  if(!data.name){ showModal('error','填写错误','请输入您的姓名'); return; }
  if(!data.phone || !/^[\d\-\+\(\) ]{8,}$/.test(data.phone)){ showModal('error','填写错误','请输入有效的联络电话'); return; }
  
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = true;
  submitBtn.textContent = '提交中...';
  
  gasRequest("submit",data,res=>{
    submitBtn.disabled = false;
    submitBtn.textContent = '确认提交预约';
    if(res?.status==="success"){
      showModal('success','预约成功','您的预约已提交，我们会尽快与您确认！');
      setTimeout(()=>window.location.reload(),2000);
    }else{
      showModal('error','预约失败',res?.message||'提交失败，请稍后重试');
    }
  });
}

async function initLiff(){
  try{
    await liff.init({liffId:CONFIG.LIFF_ID});
    if(liff.isLoggedIn()){
      const p = await liff.getProfile();
      userId = p?.userId || "guest";
      userName = p?.displayName || "访客";
    }
  }catch(e){
    console.error('LIFF初始化失败:', e);
  }finally{
    document.getElementById('lineId').value = userId;
    document.getElementById('lineName').value = userName;
    loadAllData();
  }
}

document.addEventListener('DOMContentLoaded',async()=>{
  document.getElementById('modalBtn').onclick = closeModal;
  
  const searchInput = document.getElementById('serviceSearch');
  const searchClear = document.getElementById('searchClear');
  searchInput.addEventListener('input', e=>{
    searchKeyword = e.target.value.trim();
    searchClear.classList.toggle('show', searchKeyword!=='');
    renderServices(document.querySelector('.tab.active').dataset.cate);
  });
  searchClear.addEventListener('click', ()=>{
    searchInput.value = '';
    searchKeyword = '';
    searchClear.classList.remove('show');
    renderServices(document.querySelector('.tab.active').dataset.cate);
  });
  
  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      tab.classList.add('active');
      renderServices(tab.dataset.cate);
    });
  });
  
  document.getElementById('nextToDate').addEventListener('click',()=>goStep(2));
  document.getElementById('nextToInfo').addEventListener('click',()=>goStep(3));
  document.getElementById('submitBtn').addEventListener('click',submit);
  
  await initLiff();
});
</script>
