<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>莫凡韓式皮膚管理</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:linear-gradient(135deg,#fdf2f8 0%,#fef7fb 50%,#fce8f3 100%);font-family:'Noto Sans TC',sans-serif;color:#444;display:flex;justify-content:center;min-height:100vh;padding:20px 12px 70px}
    main{background:#fff;border-radius:24px;box-shadow:0 15px 50px rgba(255,133,162,0.12);width:100%;max-width:460px;padding:35px 25px;position:relative;overflow:hidden}
    main::before{content:'';position:absolute;top:0;left:0;width:100%;height:6px;background:linear-gradient(90deg,#ff8da1,#ff4d88,#c77dff)}
    h2{text-align:center;margin-bottom:30px;line-height:1.6}
    .main-title{font-size:1.8rem;font-weight:900;background:linear-gradient(90deg,#ff4d88,#ff8da1,#c77dff);-webkit-background-clip:text;color:transparent;display:block}
    .sub-title{font-size:1rem;font-weight:500;color:#999}
    label{display:block;margin-bottom:8px;font-weight:600}
    input,select{width:100%;height:52px;padding:0 18px;border-radius:16px;border:1px solid #f0f0f0;background:#fafbfc;margin-bottom:20px}
    input:focus,select:focus{background:#FDF2F8;border:2px solid #D894A7;outline:none}
    .week-slider{display:flex;gap:8px;overflow-x:auto;padding:4px 0;margin-bottom:20px}
    .week-slider::-webkit-scrollbar{display:none}
    .week-day{min-width:80px;padding:12px 8px;border-radius:14px;background:#fafbfc;border:1px solid #f3f3f3;text-align:center;cursor:pointer}
    .week-day.active{background:linear-gradient(135deg,#FF5D8F,#FF3377);color:#fff;border-color:#ff4d88}
    .time-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
    .time-btn{height:52px;display:flex;align-items:center;justify-content:center;border-radius:14px;border:1px solid #eee;background:#fff;font-weight:600;cursor:pointer}
    .time-btn.active{background:#FDF2F8;border:2px solid #D894A7;font-weight:700}
    button{width:100%;height:56px;background:linear-gradient(135deg,#FF5D8F,#FF3377);border:none;border-radius:18px;color:#fff;font-weight:700;cursor:pointer}
    textarea{width:100%;min-height:120px;padding:18px;border-radius:16px;border:1px solid #f0f0f0;background:#fafbfc;margin-bottom:20px}
    .loading{text-align:center;color:#999;padding:10px}
    .disabled{pointer-events:none;opacity:0.6}
  </style>
</head>
<body>
<main>
  <h2>
    <span class="main-title">莫凡<br>線上預約系統</span>
    <span class="sub-title">專業美容師一對一服務</span>
  </h2>
  <form id="reserveForm">
    <!-- 修復：LIFF登錄信息隱藏域 -->
    <input type="hidden" id="lineId" value="">
    <input type="hidden" id="lineName" value="">
    <input type="hidden" id="selectedDate" value="">
    <input type="hidden" id="selectedTime" value="">

    <label>預約日期</label>
    <div class="week-slider" id="weekSlider">載入排班中...</div>

    <label>服務項目</label>
    <select id="serviceSelect">
      <option value="">載入中...</option>
    </select>

    <label>選擇美容師</label>
    <select id="staffSelect">
      <option value="">請先選擇服務</option>
    </select>

    <label>預約時段</label>
    <div class="time-grid" id="timeGrid">
      <div class="loading">請先選擇美容師</div>
    </div>

    <label>姓名</label>
    <input type="text" id="name" placeholder="請輸入姓名" required>
    <label>聯絡電話</label>
    <input type="tel" id="phone" placeholder="0912-345-678" required>
    <label>電子信箱（選填）</label>
    <input type="email" id="email" placeholder="請輸入信箱">
    <label>備註（選填）</label>
    <textarea id="extraInfo" placeholder="肌膚狀況、特殊需求"></textarea>

    <button type="button" id="submitBtn">確認預約</button>
  </form>
</main>

<script>
  // ⚠️ 請替換成你的 GAS 部署網址 + LIFF_ID
  const CONFIG = {
    SCRIPT_URL: "https://script.google.com/macros/s/AKfycbwgKFHvVz6ZrPN4gkFGP4DMJ6Gwi8DFpLZ5JlMlC-TgL0NnSClqLZvHgtgvlKr1FljcoA/exec",
    LIFF_ID: "https://liff.line.me/2009598216-MmBS77sp"
  };

  // 全局變量
  let userId = "guest_" + Date.now();
  let userName = "訪客";
  const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
  let scriptLoading = false;

  // 修復：JSONP請求（防重複、防報錯）
  function request(url) {
    if (scriptLoading) return;
    scriptLoading = true;
    const s = document.createElement('script');
    s.src = `${url}&_=${new Date().getTime()}`;
    s.onload = () => { scriptLoading = false; s.remove(); };
    s.onerror = () => { scriptLoading = false; s.remove(); alert("網路異常，請重試"); };
    document.body.appendChild(s);
    setTimeout(() => { scriptLoading = false; }, 5000);
  }

  // 加載排班日期（修復日期選擇失敗）
  function loadDates() {
    request(`${CONFIG.SCRIPT_URL}?action=getAllData&callback=cbDates`);
  }

  // 加載服務項目
  function loadServices(date) {
    if (!date) return;
    document.getElementById('serviceSelect').innerHTML = '<option value="">載入中...</option>';
    request(`${CONFIG.SCRIPT_URL}?action=getServices&date=${date}&callback=cbServices`);
  }

  // 加載美容師
  function loadStaff(date, service) {
    if (!date || !service) return;
    document.getElementById('staffSelect').innerHTML = '<option value="">載入中...</option>';
    document.getElementById('timeGrid').innerHTML = '<div class="loading">請先選擇美容師</div>';
    request(`${CONFIG.SCRIPT_URL}?action=getStaff&date=${date}&service=${encodeURIComponent(service)}&callback=cbStaff`);
  }

  // 加載可用時段
  function loadSlots() {
    const d = document.getElementById('selectedDate').value;
    const s = document.getElementById('staffSelect').value;
    const sv = document.getElementById('serviceSelect').value;
    if (!d || !s || !sv) return;
    document.getElementById('timeGrid').innerHTML = '<div class="loading">載入時段中...</div>';
    document.getElementById('selectedTime').value = '';
    request(`${CONFIG.SCRIPT_URL}?action=getSlots&date=${d}&staff=${encodeURIComponent(s)}&service=${encodeURIComponent(sv)}&callback=cbSlots`);
  }

  // 提交預約（修復：參數完整傳遞）
  function submit() {
    const data = {
      action: "submit",
      lineId: document.getElementById('lineId').value,
      lineName: document.getElementById('lineName').value,
      date: document.getElementById('selectedDate').value,
      service: document.getElementById('serviceSelect').value,
      staff: document.getElementById('staffSelect').value,
      appointTime: document.getElementById('selectedTime').value,
      name: document.getElementById('name').value.trim(),
      phone: document.getElementById('phone').value.trim(),
      email: document.getElementById('email').value.trim(),
      extraInfo: document.getElementById('extraInfo').value.trim()
    };

    // 表單驗證
    if (!data.date) return alert("請選擇預約日期");
    if (!data.service) return alert("請選擇服務項目");
    if (!data.staff) return alert("請選擇美容師");
    if (!data.appointTime) return alert("請選擇預約時段");
    if (!data.name || !data.phone) return alert("請填寫姓名與聯絡電話");

    document.getElementById('submitBtn').classList.add('disabled');
    request(`${CONFIG.SCRIPT_URL}?${new URLSearchParams(data)}&callback=cbSubmit`);
  }

  // ==================== 回調函數 ====================
  // 日期回調
  window.cbDates = (res) => {
    const wrap = document.getElementById('weekSlider');
    wrap.innerHTML = '';
    if (res.status !== "success") {
      wrap.innerHTML = `<div class="loading">${res.message}</div>`;
      return;
    }
    if (!res.dateList.length) {
      wrap.innerHTML = '<div class="loading">暫無排班</div>';
      return;
    }

    const firstDate = res.dateList[0];
    document.getElementById('selectedDate').value = firstDate;

    // 渲染日期
    res.dateList.forEach((str, i) => {
      const [y, m, d] = str.split('-');
      const w = weekDays[new Date(str).getDay()];
      const el = document.createElement('div');
      el.className = `week-day ${i === 0 ? 'active' : ''}`;
      el.dataset.date = str;
      el.innerHTML = `<div>${m}/${d}</div><div>週${w}</div>`;
      el.onclick = () => {
        document.querySelectorAll('.week-day').forEach(e => e.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('selectedDate').value = str;
        // 修復：切換日期重置表單
        document.getElementById('serviceSelect').innerHTML = '<option value="">載入中...</option>';
        document.getElementById('staffSelect').innerHTML = '<option value="">請先選擇服務</option>';
        document.getElementById('timeGrid').innerHTML = '<div class="loading">請先選擇美容師</div>';
        loadServices(str);
      };
      wrap.appendChild(el);
    });
    loadServices(firstDate);
  };

  // 服務回調
  window.cbServices = (res) => {
    const sel = document.getElementById('serviceSelect');
    sel.innerHTML = '<option value="">請選擇服務</option>';
    if (res.status !== "success" || !res.services.length) {
      sel.innerHTML = '<option value="">當日無服務</option>';
      return;
    }
    res.services.forEach(item => sel.add(new Option(`${item.name} (${item.duration}分)`, item.name)));
  };

  // 美容師回調
  window.cbStaff = (res) => {
    const sel = document.getElementById('staffSelect');
    sel.innerHTML = '<option value="">請選擇美容師</option>';
    if (res.status !== "success" || !res.staff.length) {
      sel.innerHTML = '<option value="">當日無美容師</option>';
      return;
    }
    res.staff.forEach(x => sel.add(new Option(`${x.name} (${x.start}~${x.end})`, x.name)));
  };

  // 時段回調
  window.cbSlots = (res) => {
    const grid = document.getElementById('timeGrid');
    grid.innerHTML = '';
    document.getElementById('selectedTime').value = '';
    if (res.status !== "success" || !res.slots.length) {
      grid.innerHTML = '<div class="loading">當日已滿單</div>';
      return;
    }
    res.slots.forEach(time => {
      const btn = document.createElement('div');
      btn.className = 'time-btn';
      btn.textContent = time;
      btn.onclick = () => {
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('selectedTime').value = time;
      };
      grid.appendChild(btn);
    });
  };

  // 預約結果回調
  window.cbSubmit = (res) => {
    document.getElementById('submitBtn').classList.remove('disabled');
    alert(res.message);
    if (res.status === "success") {
      document.getElementById('reserveForm').reset();
      document.getElementById('selectedTime').value = '';
      loadSlots();
    }
  };

  // ==================== LIFF 登錄（修復信息寫入） ====================
  async function initLiff() {
    try {
      await liff.init({ liffId: CONFIG.LIFF_ID });
      if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        userId = profile.userId;
        userName = profile.displayName;
        // 賦值到隱藏域，提交時寫入工作表
        document.getElementById('lineId').value = userId;
        document.getElementById('lineName').value = userName;
      } else {
        liff.login();
      }
    } catch (e) {
      console.log("LIFF未登錄，使用訪客模式");
      document.getElementById('lineId').value = userId;
      document.getElementById('lineName').value = userName;
    }
  }

  // 初始化
  document.addEventListener('DOMContentLoaded', () => {
    initLiff();
    loadDates();

    // 綁定事件
    document.getElementById('serviceSelect').addEventListener('change', () => {
      const date = document.getElementById('selectedDate').value;
      const service = document.getElementById('serviceSelect').value;
      loadStaff(date, service);
    });

    document.getElementById('staffSelect').addEventListener('change', loadSlots);
    document.getElementById('submitBtn').addEventListener('click', submit);
  });
</script>
</body>
</html>
