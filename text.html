<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>莫凡韓式皮膚管理</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, #fdf2f8 0%, #fef7fb 50%, #fce8f3 100%);
      font-family: 'Noto Sans TC', sans-serif;
      color: #444;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px 12px;
      padding-bottom: 70px;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 Q100,20 100,100 L0,100 Z" fill="rgba(255,179,217,0.05)"/></svg>');
      background-size: cover;
      opacity: 0.3;
      z-index: -1;
    }

    .top-bar {
      position: fixed;
      top: 12px;
      right: 15px;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .page-switch {
      display: none;
    }
    .switch-btn {
      padding: 10px 18px;
      border-radius: 50px;
      background: #fff;
      border: 1px solid rgba(255, 77, 136, 0.2);
      color: #ff4d88;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,77,136,0.1);
      transition: all 0.35s;
    }
    .switch-btn:hover {
      transform: translateY(-2px);
      background: #fff5f8;
    }

    main {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 15px 50px rgba(255, 133, 162, 0.12);
      width: 100%;
      max-width: 460px;
      padding: 35px 25px;
      margin-top: 20px;
      position: relative;
      overflow: hidden;
    }

    main::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, #ff8da1, #ff4d88, #c77dff);
    }

    @media (min-width: 768px) {
      main { max-width: 720px; padding: 60px 45px; }
    }

    .header-time {
      text-align: center;
      font-size: 14px;
      color: #ff4d88;
      font-weight: 600;
      margin-bottom: 12px;
    }

    h2 {
      font-weight: 900;
      margin-bottom: 35px;
      text-align: center;
      line-height: 1.6;
    }

    h2 .main-title {
      font-size: 1.8rem;
      display: block;
      background: linear-gradient(90deg, #ff4d88, #ff8da1, #c77dff);
      -webkit-background-clip: text;
      color: transparent;
    }

    h2 .sub-title {
      font-size: 1rem;
      font-weight: 500;
      color: #999;
    }

    /* 參考瑜伽預約：日期周選擇器 */
    .week-slider {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0;
      margin-bottom: 25px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .week-slider::-webkit-scrollbar {
      display: none;
    }
    .week-day {
      min-width: 60px;
      padding: 12px 8px;
      border-radius: 14px;
      background: #fafbfc;
      border: 1px solid #f3f3f3;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 13px;
    }
    .week-day .date {
      font-weight: 700;
      margin-bottom: 4px;
      color: #333;
    }
    .week-day .week {
      color: #888;
      font-size: 12px;
    }
    .week-day.active {
      background: linear-gradient(135deg, #FF5D8F, #FF3377);
      border-color: #ff4d88;
      color: #fff !important;
    }
    .week-day.active .date,
    .week-day.active .week {
      color: #fff;
    }

    /* 參考瑜伽預約：當日美容師卡片 */
    .staff-card {
      background: #fafbfc;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 20px;
      border: 1px solid #f0f0f0;
    }
    .staff-card-title {
      font-weight: 700;
      margin-bottom: 12px;
      color: #ff4d88;
    }

    input, select, textarea {
      width: 100%;
      height: 52px;
      padding: 0 18px;
      border-radius: 16px;
      border: 1px solid #f0f0f0;
      background: #fafbfc;
      margin-bottom: 25px;
      transition: all 0.3s;
    }
    textarea { min-height: 120px; padding: 18px; }
    input:focus, select:focus, textarea:focus {
      background: #FDF2F8;
      border: 2px solid #D894A7;
      outline: none;
    }

    /* 參考瑜伽預約：時段網格 */
    .time-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 25px;
    }
    .time-btn {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      border: 1px solid #eee;
      background: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    .time-btn.active {
      background: #FDF2F8;
      border: 2px solid #D894A7;
      font-weight: 700;
    }

    button {
      width: 100%;
      height: 56px;
      background: linear-gradient(135deg, #FF5D8F, #FF3377);
      border: none;
      border-radius: 18px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover { transform: translateY(-3px); }
    button:disabled { opacity: 0.7; }

    .admin-section { display: none; margin-top: 25px; }
    .admin-title { font-size: 1.5rem; color: #ff4d88; text-align: center; margin-bottom: 15px; }
    .tip-text { text-align: center; color: #888; margin-bottom: 20px; }
    .admin-card {
      background: #fff;
      border-radius: 24px;
      padding: 28px;
      margin-bottom: 25px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.06);
    }
    .admin-btn { height: 52px; border-radius: 16px; margin-bottom: 15px; }
    .reservation-item { padding: 16px; background: #fafbfc; border-radius: 14px; margin-bottom: 12px; }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: #fff;
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-shadow: 0 -2px 15px rgba(0,0,0,0.08);
    }
    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 12px;
      color: #888;
      cursor: pointer;
    }
    .bottom-nav-item.active { color: #ff4d88; font-weight: 700; }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="page-switch" id="switchContainer">
    <button class="switch-btn" id="switchBtn">切換管理介面</button>
  </div>
</div>

<main>
  <div id="userPage">
    <div class="header-time" id="headerTime">載入時間中...</div>
    <h2>
      <span class="main-title">莫凡<br>線上預約系統</span>
      <span class="sub-title">專業美容師一對一服務</span>
    </h2>

    <form id="infoForm">
      <input type="hidden" id="pageId" value="美容預約系統">
      <input type="hidden" id="lineId">
      <input type="hidden" id="lineName">
      <input type="hidden" id="appointTime" name="appointTime">
      <input type="hidden" id="selectedDate">

      <!-- 1. 第一步：選擇日期（優先級最高｜參考瑜伽預約） -->
      <label>預約日期</label>
      <div class="week-slider" id="weekSlider"></div>

      <!-- 2. 第二步：日期選完才載入當日美容師 -->
      <label>選擇美容師</label>
      <select id="staffName" required>
        <option value="">請先選擇預約日期</option>
      </select>

      <!-- 3. 第三步：選完美容師載入服務項目 -->
      <label>服務項目</label>
      <select id="serviceType" required>
        <option value="">請先選擇美容師</option>
      </select>

      <!-- 4. 第四步：載入動態可預約時段 -->
      <label>預約時段</label>
      <div class="time-grid" id="timeGrid">
        <div style="text-align:center;grid-column:1/3;">請先選擇美容師</div>
      </div>

      <label>姓名</label>
      <input type="text" id="name" required placeholder="請輸入您的姓名">
      <label>聯絡電話</label>
      <input type="tel" id="phone" required placeholder="0912-345-678">
      <label>電子信箱（選填）</label>
      <input type="email" id="email" placeholder="請輸入電子信箱">
      <label>備註說明（選填）</label>
      <textarea id="extraInfo" placeholder="肌膚狀況、特殊需求"></textarea>

      <button type="submit" id="submitBtn">確認預約</button>
    </form>
  </div>

  <div id="adminPage" class="admin-section" style="display:none;">
    <div class="admin-title">📊 預約管理後台</div>
    <p class="tip-text">雙美容師獨立排程｜自動衝突檢測｜一週自動清理</p>
    <div id="adminAccessDenied" style="text-align:center;color:red;display:none;">❌ 無管理員權限</div>
    <div id="adminContent" style="display:none;">
      <div class="admin-card">
        <h3>📋 預約記錄</h3>
        <button class="admin-btn" id="loadReservationsBtn">載入全部預約</button>
        <div id="reservationsList"></div>
      </div>

      <div class="admin-card">
        <h3>⏰ 美容師班表設定</h3>
        <label>選擇美容師</label>
        <select id="manageStaff">
          <option value="">請先選擇美容師</option>
        </select>
        <input type="date" id="manageDate">
        <input type="time" id="workStart" placeholder="上班開始">
        <input type="time" id="workEnd" placeholder="上班結束">
        <button class="admin-btn" id="addScheduleBtn">新增班表</button>
      </div>
    </div>
  </div>
</main>

<div class="bottom-nav">
  <div class="bottom-nav-item active" id="navReserve"><i class="fa fa-calendar-check-o"></i><span>預約</span></div>
  <div class="bottom-nav-item" id="navAddress"><i class="fa fa-map-marker"></i><span>地址</span></div>
  <div class="bottom-nav-item" id="navShare"><i class="fa fa-share-alt"></i><span>分享</span></div>
</div>

<script>
  const CONFIG = {
    SCRIPT_URL: "https://script.google.com/macros/s/AKfycbwgKFHvVz6ZrPN4gkFGP4DMJ6Gwi8DFpLZ5JlMlC-TgL0NnSClqLZvHgtgvlKr1FljcoA/exec",
    LIFF_ID: "2009598216-MmBS77sp"
  };

  let STAFF_LIST = [];
  let SERVICE_CONFIG = {};
  let LINE_USER_ID = "guest_" + Date.now();
  let LINE_USER_NAME = "LINE使用者";
  let weekDays = ['日', '一', '二', '三', '四', '五', '六'];

  // 全局JSONP回調（所有接口共用）
  window.callback = (response) => {
    console.log("JSONP回調：", response);
    // 1. 載入美容師+服務配置
    if (response.status === "success" && response.staff && response.serviceConfig) {
      STAFF_LIST = response.staff;
      SERVICE_CONFIG = response.serviceConfig;
      renderManageStaffSelect();
      return;
    }
    // 2. 載入當日上班美容師（日期選擇後）
    if (response.status === "success" && response.workStaff) {
      renderWorkStaffSelect(response.workStaff);
      return;
    }
    // 3. 載入可預約時段（美容師選擇後）
    if (response.status === "success" && response.slots) {
      renderTimeList(response.slots);
      return;
    }
    // 4. 預約提交成功
    if (response.status === "success" && response.message) {
      alert(response.message);
      document.getElementById('infoForm').reset();
      renderWeekSlider();
      return;
    }
    // 5. 錯誤提示
    if (response.status === "error") {
      alert("❌ " + response.message);
    }
  };

  // ✅ 純JSONP：載入美容師與服務配置
  function loadStaffService() {
    const script = document.createElement('script');
    script.src = `${CONFIG.SCRIPT_URL}?action=getStaffAndService&callback=callback`;
    document.body.appendChild(script);
  }

  // ✅ 純JSONP：根據日期載入當日上班美容師
  function loadWorkStaffByDate(dateStr) {
    const script = document.createElement('script');
    script.src = `${CONFIG.SCRIPT_URL}?action=getStaffByDate&date=${dateStr}&callback=callback`;
    document.body.appendChild(script);
  }

  // ✅ 純JSONP：載入美容師可預約時段
  function loadAvailableSlots(dateStr, staffName) {
    const script = document.createElement('script');
    script.src = `${CONFIG.SCRIPT_URL}?action=getAvailableSlots&date=${dateStr}&staffName=${staffName}&callback=callback`;
    document.body.appendChild(script);
  }

  // ✅ 純JSONP：提交預約
  function submitForm(e) {
    e.preventDefault();
    const data = {
      pageId: "美容預約系統",
      lineId: LINE_USER_ID,
      lineName: LINE_USER_NAME,
      staffName: document.getElementById('staffName').value,
      serviceType: document.getElementById('serviceType').value,
      appointDate: document.getElementById('selectedDate').value,
      appointTime: document.getElementById('appointTime').value,
      name: document.getElementById('name').value,
      phone: document.getElementById('phone').value,
      email: document.getElementById('email').value,
      extraInfo: document.getElementById('extraInfo').value
    };
    const params = new URLSearchParams(data);
    const script = document.createElement('script');
    script.src = `${CONFIG.SCRIPT_URL}?${params}&callback=callback`;
    document.body.appendChild(script);
  }

  // 渲染一週日期選擇器（參考瑜伽預約）
  function renderWeekSlider() {
    const slider = document.getElementById('weekSlider');
    slider.innerHTML = '';
    const today = new Date();

    for (let i = 0; i < 7; i++) {
      const date = new Date(today);
      date.setDate(today.getDate() + i);
      
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      const dateStr = `${y}-${m}-${d}`;
      const week = weekDays[date.getDay()];

      const dayEl = document.createElement('div');
      dayEl.className = 'week-day';
      if (i === 0) dayEl.classList.add('active');
      dayEl.innerHTML = `
        <div class="date">${m}/${d}</div>
        <div class="week">週${week}</div>
      `;
      dayEl.dataset.date = dateStr;

      // 日期點擊：載入當日美容師
      dayEl.onclick = () => {
        document.querySelectorAll('.week-day').forEach(el => el.classList.remove('active'));
        dayEl.classList.add('active');
        document.getElementById('selectedDate').value = dateStr;
        // 重置後續選擇
        document.getElementById('staffName').innerHTML = '<option value="">載入美容師中...</option>';
        document.getElementById('serviceType').innerHTML = '<option value="">請先選擇美容師</option>';
        document.getElementById('timeGrid').innerHTML = '<div style="text-align:center;grid-column:1/3;">請先選擇美容師</div>';
        // 載入當日上班美容師
        loadWorkStaffByDate(dateStr);
      };

      slider.appendChild(dayEl);
    }
    document.getElementById('selectedDate').value = document.querySelector('.week-day').dataset.date;
    // 預載今日美容師
    loadWorkStaffByDate(document.getElementById('selectedDate').value);
  }

  // 渲染當日上班美容師下拉選單
  function renderWorkStaffSelect(workStaffList) {
    const staffSelect = document.getElementById('staffName');
    staffSelect.innerHTML = '<option value="">請選擇美容師</option>';
    if(workStaffList.length === 0){
      staffSelect.innerHTML = '<option value="">該日無美容師排班</option>';
      return;
    }
    workStaffList.forEach(staff => {
      staffSelect.add(new Option(`${staff.name} (${staff.start}-${staff.end})`, staff.name));
    });
  }

  // 渲染管理後台美容師選單
  function renderManageStaffSelect() {
    const manageStaff = document.getElementById('manageStaff');
    manageStaff.innerHTML = '<option value="">請選擇美容師</option>';
    STAFF_LIST.forEach(staff => {
      manageStaff.add(new Option(staff, staff));
    });
  }

  // 根據美容師篩選服務項目
  function filterServiceByStaff() {
    const staff = document.getElementById('staffName').value;
    const date = document.getElementById('selectedDate').value;
    const serviceSelect = document.getElementById('serviceType');
    serviceSelect.innerHTML = '<option value="">請選擇服務項目</option>';
    
    if (!staff || !SERVICE_CONFIG[staff]) return;
    
    SERVICE_CONFIG[staff].forEach(item => {
      serviceSelect.add(new Option(`${item.name} (${item.duration}分鐘)`, item.name));
    });

    // 載入可預約時段
    loadAvailableSlots(date, staff);
  }

  // 渲染可預約時段
  function renderTimeList(slots) {
    const grid = document.getElementById('timeGrid');
    grid.innerHTML = "";

    if (!slots.length) {
      grid.innerHTML = `<div style="grid-column:1/3;text-align:center;">當日無可預約時段</div>`;
      return;
    }

    slots.forEach(time => {
      const btn = document.createElement('div');
      btn.className = "time-btn";
      btn.textContent = time;
      btn.onclick = () => {
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('appointTime').value = time;
      };
      grid.appendChild(btn);
    });
  }

  // 綁定事件
  function bindEvents() {
    // 美容師切換 → 刷新服務項目+時段
    document.getElementById('staffName').addEventListener('change', filterServiceByStaff);
    // 表單提交
    document.getElementById('infoForm').addEventListener('submit', submitForm);
  }

  // LIFF登入
  async function initLiff() {
    try {
      await liff.init({ liffId: CONFIG.LIFF_ID });
      if (liff.isLoggedIn()) {
        const p = await liff.getProfile();
        LINE_USER_ID = p.userId;
        LINE_USER_NAME = p.displayName;
      }
    } catch (e) { console.log("LIFF初始化失敗", e); }
  }

  // 頁面初始化
  document.addEventListener('DOMContentLoaded', async () => {
    renderWeekSlider();
    bindEvents();
    initLiff();
    loadStaffService();
  });
</script>
</body>
</html>
