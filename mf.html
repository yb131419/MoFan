<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美業作品集</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <style>
    .progress{height:4px;background:#ec4899;transition:0.3s;position:fixed;top:0;left-0;z-50;}
  </style>
</head>
<body class="bg-gray-50">

<div id="progress" class="progress w-0"></div>

<div class="py-6 text-center">
  <h1 class="text-xl font-bold text-pink-600">莫凡美業 作品集</h1>
</div>

<div class="flex justify-center gap-2 px-4 mb-4">
  <button onclick="load('all')" class="px-3 py-1 bg-pink-500 text-white rounded">全部</button>
  <button onclick="load('美甲')" class="px-3 py-1 bg-pink-500 text-white rounded">美甲</button>
  <button onclick="load('美容')" class="px-3 py-1 bg-pink-500 text-white rounded">美容</button>
  <button onclick="load('美睫')" class="px-3 py-1 bg-pink-500 text-white rounded">美睫</button>
</div>

<div class="px-4 mb-6">
  <select id="tag" class="border p-2 w-full rounded">
    <option value="美甲">美甲</option>
    <option value="美容">美容</option>
    <option value="美睫">美睫</option>
  </select>
  <button onclick="document.getElementById('file').click()" class="bg-pink-500 text-white p-2 w-full mt-2 rounded">
    上傳圖片/影片
  </button>
  <input type="file" id="file" accept="image/*,video/*" hidden>
</div>

<div id="list" class="px-4 grid grid-cols-2 gap-3"></div>

<script>
// ========== 我已經幫你全部設定好了 ==========
const GAS_URL = "https://script.google.com/macros/s/AKfycbxQl92tgurrQmQO137YtukSt18bfiY3OXNNBA-tTFOrEXXfUbxRDXmDc4qfiTXTeRk1bg/exec";
const WORKER_URL = "https://testupload.100000000000000000000000000000000000.workers.dev";

let currentTag = "all";
const progress = document.getElementById("progress");

document.getElementById("file").onchange = async function(e){
  const file = e.target.files[0];
  if(!file) return;
  const tag = document.getElementById("tag").value;

  try {
    progress.style.width = "30%";
    const fd = new FormData();
    fd.append("file", file);

    const resR2 = await fetch(WORKER_URL, {
      method: "POST",
      body: fd
    });

    const { url } = await resR2.json();
    progress.style.width = "70%";

    await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({ action: "upload", type: tag, url: url })
    });

    progress.style.width = "100%";
    alert("✅ 上傳成功！");
    load(currentTag);
  } catch(e) {
    console.error(e);
    alert("❌ 上傳失敗：" + e.message);
  }
  setTimeout(()=>progress.style.width=0,600);
};

async function load(tag){
  currentTag = tag;
  progress.style.width = "40%";
  const res = await fetch(GAS_URL + "?action=load");
  const data = await res.json();
  progress.style.width = "100%";

  const mapType = { 美甲: "photos", 美容: "beautys", 美睫: "eyelashes" };
  let list = [];

  if (tag === "all") {
    list = [
      ...(data.photos ? JSON.parse(data.photos) : []),
      ...(data.beautys ? JSON.parse(data.beautys) : []),
      ...(data.eyelashes ? JSON.parse(data.eyelashes) : [])
    ];
  } else {
    const key = mapType[tag];
    list = data[key] ? JSON.parse(data[key]) : [];
  }

  document.getElementById("list").innerHTML = list.map(i=>{
    const isImage = i.url.match(/\.(jpg|jpeg|png|gif|webp)$/i);
    return `
      <div class="bg-white rounded-lg overflow-hidden shadow">
        ${isImage
          ?`<img src="${i.url}" class="w-full aspect-square object-cover">`
          :`<video src="${i.url}" class="w-full aspect-square object-cover" muted></video>`
        }
        <div class="p-2 text-center text-sm">${i.title}</div>
        <button onclick="del('${i.type}','${i.id}')" class="bg-red-500 text-white text-xs p-1 w-full">刪除</button>
      </div>
    `;
  }).join("");
  setTimeout(()=>progress.style.width=0,300);
}

async function del(type,id){
  if(!confirm("確定刪除？"))return;
  await fetch(GAS_URL + `?action=delete&type=${type}&id=${id}`);
  load(currentTag);
}

load('all');
</script>
</body>
</html>
