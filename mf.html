<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品集網站</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#A67C72',
            secondary: '#E8D4CE',
            sub: '#D1B8AF',
            bg: '#F7F3F1',
            card: '#ffffff',
            textMain: '#4A423F',
            textLight: '#948884',
            border: '#EAE2DF'
          },
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto { content-visibility: auto; }
      .glassmorphism { @apply bg-white/80 backdrop-blur-md border border-white/50 shadow-sm; }
      .btn-active { @apply bg-primary text-white shadow-md; }
      .btn-default { @apply bg-white text-textMain hover:bg-secondary transition-all duration-300; }
    }
    body { background: #F7F3F1; color: #4A423F; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
  </style>
</head>

<body class="flex h-screen overflow-hidden">
  <!-- 左側選單 -->
  <aside class="w-[70px] h-full bg-white border-r border-border flex flex-col items-center py-6 gap-6">
    <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
      <i class="fa fa-heart"></i>
    </div>
    <nav class="flex flex-col gap-5 items-center">
      <a class="w-10 h-10 rounded-lg btn-active flex items-center justify-center"><i class="fa fa-home"></i></a>
      <a class="w-10 h-10 rounded-lg btn-default flex items-center justify-center"><i class="fa fa-images"></i></a>
      <a class="w-10 h-10 rounded-lg btn-default flex items-center justify-center"><i class="fa fa-calendar"></i></a>
      <a class="w-10 h-10 rounded-lg btn-default flex items-center justify-center"><i class="fa fa-user"></i></a>
    </nav>
  </aside>

  <!-- 中間分類 -->
  <aside class="w-[220px] h-full bg-white border-r border-border px-5 py-6 flex flex-col gap-5 overflow-y-auto scrollbar-hide">
    <div class="flex gap-2">
      <button id="grid" class="w-[100px] h-11 rounded-lg btn-default"><i class="fa fa-th-large"></i></button>
      <button id="list" class="w-[100px] h-11 rounded-lg btn-active"><i class="fa fa-list"></i></button>
    </div>
    <div class="flex flex-col gap-2">
      <h3 class="text-sm text-textLight px-1 mb-1">作品分類</h3>
      <button class="h-10 rounded-lg btn-active px-4 text-left">全部</button>
      <button class="h-10 rounded-lg btn-default px-4 text-left">設計類</button>
      <button class="h-10 rounded-lg btn-default px-4 text-left">攝影類</button>
      <button class="h-10 rounded-lg btn-default px-4 text-left">手作類</button>
    </div>
  </aside>

  <!-- 右側內容 -->
  <main class="flex-1 h-full overflow-y-auto px-8 py-6">
    <div class="flex flex-wrap gap-3 mb-6">
      <button class="px-5 py-2 rounded-full btn-active">全部作品</button>
      <button class="px-5 py-2 rounded-full btn-default">最新上架</button>
      <button class="px-5 py-2 rounded-full btn-default">精選案例</button>
    </div>

    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
      <div class="grid grid-cols-[160px_1fr_160px_180px] px-6 py-4 bg-bg border-b border-border">
        <div class="text-textLight">作品圖</div>
        <div class="text-textLight">標題 / 標籤</div>
        <div class="text-textLight">尺寸</div>
        <div class="text-textLight">建立時間</div>
      </div>
      <div id="listArea" class="divide-y divide-border"></div>
    </div>
  </main>

<script>
document.addEventListener('DOMContentLoaded', async function(){
  const listArea = document.getElementById('listArea');
  const gridBtn = document.getElementById('grid');
  const listBtn = document.getElementById('list');

  // ==========================
  // 請填入你的 GAS Web App 網址
  // ==========================
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxQl92tgurrQmQO137YtukSt18bfiY3OXNNBA-tTFOrEXXfUbxRDXmDc4qfiTXTeRk1bg/exec";

  // 讀取作品
  async function load() {
    try {
      let res = await fetch(GAS_URL);
      let json = await res.json();
      render(json.list);
    } catch(e) {
      listArea.innerHTML = `<div class="p-5 text-red-500">載入失敗</div>`;
    }
  }

  // 渲染列表
  function render(list) {
    listArea.innerHTML = '';
    list.forEach(item => {
      let dom = document.createElement('div');
      dom.className = 'grid grid-cols-[160px_1fr_160px_180px] px-6 py-4 items-center hover:bg-bg/50';
      dom.innerHTML = `
        <div class="w-[120px] h-[80px] rounded overflow-hidden border">
          <img src="${item.url}" class="w-full h-full object-cover">
        </div>
        <div>${item.name}</div>
        <div class="text-textLight">${item.size}</div>
        <div class="text-textLight">${item.time}</div>
      `;
      listArea.appendChild(dom);
    });
  }

  // 切換模式
  gridBtn.onclick = () => {
    gridBtn.classList.add('btn-active');
    listBtn.classList.remove('btn-active');
    listArea.classList.add('grid','grid-cols-3','gap-4','p-4');
    listArea.classList.remove('divide-y');
  }
  listBtn.onclick = () => {
    listBtn.classList.add('btn-active');
    gridBtn.classList.remove('btn-active');
    listArea.classList.remove('grid','grid-cols-3','gap-4');
    listArea.classList.add('divide-y');
  }

  load();
})
</script>
</body>
</html>
