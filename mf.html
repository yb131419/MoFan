<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>莫凡美業 - 作品集</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#d98880',
            light: '#fff5f5'
          }
        }
      }
    }
  </script>
  <style>
    .progress {
      height: 4px;
      transition: width 0.3s;
    }
    .card {
      border-radius: 16px;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-light">

<!-- 進度條 -->
<div id="progress" class="progress bg-primary w-0 fixed top-0 left-0 z-50"></div>

<!-- 標題 -->
<div class="pt-8 pb-4 text-center">
  <h1 class="text-2xl font-bold text-gray-700">莫凡美業 作品集</h1>
  <p class="text-gray-400 text-sm">美甲 · 美容 · 美睫</p>
</div>

<!-- 分類 -->
<div class="flex justify-center gap-2 px-4 mb-6">
  <button onclick="show('all')" class="px-4 py-2 rounded-full bg-primary text-white text-sm">全部</button>
  <button onclick="show('美甲')" class="px-4 py-2 rounded-full bg-white text-sm">美甲</button>
  <button onclick="show('美容')" class="px-4 py-2 rounded-full bg-white text-sm">美容</button>
  <button onclick="show('美睫')" class="px-4 py-2 rounded-full bg-white text-sm">美睫</button>
</div>

<!-- 上傳 -->
<div class="mx-4 mb-8 bg-white p-5 rounded-2xl shadow-sm">
  <h3 class="font-medium mb-2">上傳新作品</h3>
  <select id="cate" class="w-full border p-3 rounded-xl mb-2">
    <option value="美甲">💅 美甲</option>
    <option value="美容">💆 美容</option>
    <option value="美睫">👁️ 美睫</option>
  </select>
  <button onclick="document.getElementById('file').click()" class="w-full bg-primary text-white p-3 rounded-xl">
    <i class="fa fa-upload"></i> 選擇圖片/影片
  </button>
  <input type="file" id="file" accept="image/*,video/*" hidden>
</div>

<!-- 列表 -->
<div id="list" class="px-4 grid grid-cols-2 gap-4 pb-20"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxQl92tgurrQmQO137YtukSt18bfiY3OXNNBA-tTFOrEXXfUbxRDXmDc4qfiTXTeRk1bg/exec";
let items = [];
let currentTag = "all";
const fileInput = document.getElementById("file");
const progress = document.getElementById("progress");

// 進度
function setProgress(w) {
  progress.style.width = w + "%";
}

// 讀取
async function load() {
  const res = await fetch(API);
  const data = await res.json();
  items = data.list || [];
  render();
}

// 畫面
function render() {
  const list = document.getElementById("list");
  const data = currentTag === "all" ? items : items.filter(i => i.tag === currentTag);
  
  if (data.length === 0) {
    list.innerHTML = '<div class="col-span-2 text-center py-10 text-gray-400">暫無作品</div>';
    return;
  }

  list.innerHTML = data.map(item => `
    <div class="card bg-white shadow">
      <div class="aspect-square">
        ${item.type === "image"
          ? `<img src="${item.url}" class="w-full h-full object-cover">`
          : `<video src="${item.url}" class="w-full h-full object-cover"></video>`
        }
      </div>
      <div class="p-2 text-center text-sm">${item.tag}</div>
      <div class="flex justify-center gap-2 pb-2">
        <button onclick="prev('${item.url}','${item.type}')" class="text-xs px-2 py-1 bg-gray-100 rounded">預覽</button>
        <button onclick="del('${item.id}')" class="text-xs px-2 py-1 bg-red-500 text-white rounded">刪除</button>
      </div>
    </div>
  `).join("");
}

// 預覽
function prev(url, type) {
  const div = document.createElement("div");
  div.className = "fixed inset-0 bg-black z-50 flex items-center justify-center";
  div.innerHTML = `
    <div class="w-full max-w-md relative">
      <button onclick="this.parentElement.remove()" class="absolute -top-10 right-4 text-white text-3xl">&times;</button>
      ${type === "image" ? `<img src="${url}" class="w-full">` : `<video src="${url}" controls class="w-full"></video>`}
    </div>
  `;
  document.body.appendChild(div);
}

// 刪除
async function del(id) {
  if (!confirm("確定刪除？")) return;
  await fetch(API + "?id=" + id, { method: "DELETE" });
  load();
}

// 篩選
function show(tag) {
  currentTag = tag;
  render();
}

// ✅ 上傳圖片/影片 正確寫法
fileInput.onchange = async () => {
  const file = fileInput.files[0];
  if (!file) return;

  const cate = document.getElementById("cate").value;
  const newName = cate + "_" + file.name;
  setProgress(30);

  const fd = new FormData();
  fd.append("file", file);
  fd.append("filename", newName);

  try {
    await fetch(API, { method: "POST", body: fd });
  } catch (e) {}

  setProgress(100);
  alert("✅ 上傳成功");
  fileInput.value = "";
  load();
  setTimeout(() => setProgress(0), 500);
};

load();
</script>
</body>
</html>
