<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>莫凡韓式皮膚管理 | 作品集</title>
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0; 
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }
    body {
      background: #fdfbfc;
      font-family: 'PingFang SC', 'Helvetica Neue', 'Noto Sans TC', sans-serif;
      padding-bottom: 120px;
      color: #2a2a2a;
    }
    .progress {
      height: 3px;
      background: linear-gradient(90deg, #e8c8d0, #d4b2b8);
      transition: width 0.2s ease;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999;
      width: 0;
    }
    .page-header {
      padding: 60px 20px 40px;
      text-align: center;
      position: relative;
    }
    .page-header::before,
    .page-header::after {
      content: "";
      display: block;
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, #d4b2b8, #e8c8d0);
      margin: 0 auto 12px;
      opacity: 0.8;
    }
    .page-title {
      font-size: 32px;
      font-weight: 600;
      background: linear-gradient(135deg, #b8929a, #d4b2b8, #a88890);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      letter-spacing: 3px;
      box-shadow: 0 2px 4px rgba(212,178,184,0.1);
    }
    .page-subtitle {
      font-size: 13px;
      color: #b0b0b0;
      letter-spacing: 2px;
      font-weight: 300;
      position: relative;
      padding: 0 15px;
    }
    .page-subtitle::before,
    .page-subtitle::after {
      content: "·";
      position: absolute;
      top: 0;
      color: #d4b2b8;
    }
    .page-subtitle::before { left: 0; }
    .page-subtitle::after { right: 0; }

    .filter-nav {
      padding: 0 20px 30px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .tab-group {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 4px;
    }
    .tab-group::-webkit-scrollbar { display: none; }
    .filter-tab {
      padding: 12px 24px;
      border-radius: 100px;
      background: #ffffff;
      border: 1px solid #f0e9eb;
      color: #888;
      font-size: 14px;
      font-weight: 400;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .filter-tab.active {
      background: linear-gradient(135deg, #d4b2b8, #b8a2a8);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 12px rgba(212, 178, 184, 0.15);
    }
    .filter-select-btn {
      width: 100%;
      padding: 16px;
      border: 1px solid #f0e9eb;
      border-radius: 20px;
      background: #fdfbfc;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #555;
    }

    .upload-area {
      padding: 0 20px 30px;
    }
    .upload-card {
      background: #fff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.02);
      border: 1px solid #f8f3f5;
    }
    .category-select-btn {
      width: 100%;
      padding: 16px;
      border: 1px solid #f0e9eb;
      border-radius: 20px;
      background: #fdfbfc;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      color: #555;
    }
    .upload-btn {
      width: 100%;
      padding: 17px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(135deg, #d4b2b8, #b8a2a8);
      color: #fff;
      font-size: 15px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .upload-btn:disabled {
      background: #f0f0f0;
      cursor: not-allowed;
    }
    #file-input { display: none; }

    .works-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 0 20px;
      min-height: 200px;
    }
    .works-grid .sortable-ghost {
      opacity: 0.4;
      background: #f0e9eb;
      border-radius: 20px;
    }
    .work-card {
      background: #fff;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 3px 18px rgba(0,0,0,0.03);
      transition: all 0.3s ease;
      cursor: grab;
    }
    .work-card:active {
      cursor: grabbing;
      transform: scale(1.02);
    }
    .media-box {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }
    .work-img, .work-video-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      /* 图片懒加载优化 */
      loading: lazy;
    }
    .video-play-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 50px;
      height: 50px;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      pointer-events: none;
    }
    .work-info { padding: 14px; text-align: center; }
    .work-tag { font-size: 13px; color: #b8a2a8; font-weight: 500; letter-spacing: 0.5px; }
    .work-operate { display: flex; margin-top: 10px; }
    .delete-btn {
      width: 100%; padding: 6px 0; border-radius: 8px; border: none;
      background: #e0a8a8; color: #fff; font-size: 11px; cursor: pointer;
    }
    /* 加载骨架屏 - 优化视觉体验 */
    .skeleton {
      background: #f5f5f5;
      border-radius: 22px;
      aspect-ratio: 1/1;
      animation: skeleton 1.5s infinite ease-in-out;
    }
    @keyframes skeleton {
      0% { opacity: 0.6; }
      50% { opacity: 0.8; }
      100% { opacity: 0.6; }
    }
    .empty-tip { text-align: center; padding: 80px 20px; color: #d0d0d0; font-size: 14px; grid-column: span 2; }

    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.88); z-index: 1000; display: none;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-content {
      background: #fff; width: 100%; max-width: 320px;
      border-radius: 28px; padding: 30px; text-align: center;
    }
    .category-item {
      padding: 15px; margin: 8px 0; border-radius: 18px;
      background: #fdfbfc; cursor: pointer; font-size: 15px; color: #666;
    }
    .category-item.active { background: linear-gradient(135deg, #d4b2b8, #b8a2a8); color: #fff; }
    .loading-modal .loading-text { margin-top: 12px; font-size: 14px; color: #666; }
    .loading-modal .loader {
      width: 40px; height: 40px; border: 4px solid #f0e9eb;
      border-top: 4px solid #d4b2b8; border-radius: 50%;
      animation: spin 1s linear infinite; margin: 0 auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    #carouselModal { background: rgba(0,0,0,0.95); }
    .carousel-content { position: relative; width: 92%; max-width: 500px; text-align: center; }
    .carousel-media { width: 100%; max-height: 80vh; object-fit: contain; }
    .carousel-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.1); color: #fff; border: none;
      width: 48px; height: 48px; border-radius: 50%; font-size: 18px; cursor: pointer; z-index: 1001;
    }
    .carousel-prev { left: 10px; }
    .carousel-next { right: 10px; }
    .carousel-close {
      position: absolute; top: 25px; right: 25px; background: transparent;
      color: #fff; border: none; font-size: 36px; cursor: pointer;
    }

    .bottom-nav {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      width: 92%; max-width: 500px; background: #ffffff;
      border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 12px 8px; display: flex; z-index: 99;
    }
    .bottom-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 6px; color: #777; font-size: 12px;
      cursor: pointer; transition: all 0.3s ease; border-radius: 16px; padding: 8px 0;
    }
    .bottom-nav-item.active {
      color: #8c6b73;
      background: linear-gradient(135deg, rgba(184,146,154,0.28), rgba(168,136,144,0.28));
    }
    .bottom-nav-item i { font-size: 18px; }
  </style>
</head>
<body>
<div class="progress" id="progress"></div>

<div class="page-header">
  <h1 class="page-title">莫凡韓式皮膚管理</h1>
  <p class="page-subtitle">Beauty Portfolio</p>
</div>

<div class="filter-nav">
  <div class="tab-group media-tabs">
    <div class="filter-tab active" data-type="all-media">全部</div>
    <div class="filter-tab" data-type="image">照片</div>
    <div class="filter-tab" data-type="video">影片</div>
  </div>
  <button class="filter-select-btn" id="filterCategoryBtn" onclick="openFilterCategoryModal()">
    <span>篩選分類：全部</span><i class="fa fa-chevron-down"></i>
  </button>
</div>

<div class="upload-area">
  <div class="upload-card">
    <button class="category-select-btn" id="categoryBtn" onclick="openCategoryModal()">
      <span>選擇分類：美甲</span><i class="fa fa-chevron-down"></i>
    </button>
    <button class="upload-btn" id="uploadBtn" onclick="triggerFile()">
      <i class="fa fa-plus"></i> 批量上傳作品（多圖/多影片）
    </button>
    <input type="file" id="file-input" accept="image/*,video/*" multiple>
  </div>
</div>

<p class="page-subtitle" style="text-align: center; margin: 0 0 20px;">點圖可放大</p>
<!-- 预加载骨架屏 -->
<div class="works-grid" id="worksList">
  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>
</div>

<!-- 分类弹窗 -->
<div class="modal" id="categoryModal">
  <div class="modal-content">
    <h3 style="margin-bottom:16px; font-size:16px;">選擇作品分類</h3>
    <div class="category-item active" data-val="nail">美甲</div>
    <div class="category-item" data-val="eyelash">美睫</div>
    <div class="category-item" data-val="eyebrow">霧眉</div>
    <div class="category-item" data-val="skin">韓式皮膚管理</div>
    <div class="category-item" data-val="exosome">外泌體育髮</div>
    <div class="category-item" data-val="private">私密粉嫩素</div>
  </div>
</div>

<div class="modal" id="filterCategoryModal">
  <div class="modal-content">
    <h3 style="margin-bottom:16px; font-size:16px;">篩選作品分類</h3>
    <div class="category-item active" data-val="all">全部</div>
    <div class="category-item" data-val="nail">美甲</div>
    <div class="category-item" data-val="eyelash">美睫</div>
    <div class="category-item" data-val="eyebrow">霧眉</div>
    <div class="category-item" data-val="skin">韓式皮膚管理</div>
    <div class="category-item" data-val="exosome">外泌體育髮</div>
    <div class="category-item" data-val="private">私密粉嫩素</div>
  </div>
</div>

<div class="modal loading-modal" id="loadingModal">
  <div class="modal-content"><div class="loader"></div><div class="loading-text">批量上傳中，請稍候...</div></div>
</div>

<div class="modal" id="carouselModal">
  <button class="carousel-close" onclick="closeCarousel()">&times;</button>
  <button class="carousel-btn carousel-prev" onclick="prevSlide()"><i class="fa fa-chevron-left"></i></button>
  <div class="carousel-content">
    <img id="carouselImg" class="carousel-media" style="display:none;">
    <video id="carouselVideo" class="carousel-media" controls style="display:none;"></video>
  </div>
  <button class="carousel-btn carousel-next" onclick="nextSlide()"><i class="fa fa-chevron-right"></i></button>
</div>

<div class="bottom-nav">
  <div class="bottom-nav-item active" id="navReserve">
    <i class="fa fa-calendar-check-o"></i><span>預約</span>
  </div>
  <div class="bottom-nav-item" id="navAddress">
    <i class="fa fa-map-marker"></i><span>地址</span>
  </div>
  <div class="bottom-nav-item" id="navShare">
    <i class="fa fa-share-alt"></i><span>分享</span>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxQl92tgurrQmQO137YtukSt18bfiY3OXNNBA-tTFOrEXXfUbxRDXmDc4qfiTXTeRk1bg/exec";
let currentMediaFilter = "all-media";
let currentCategoryFilter = "all";
let allWorksData = [];
let selectedCategory = "nail";
let currentSlideIndex = 0;
let sortable = null;
const progress = document.getElementById("progress");
const uploadBtn = document.getElementById("uploadBtn");
const listDom = document.getElementById('worksList');
const MAX_VIDEO_SIZE = 50 * 1024 * 1024;
// 本地缓存key - 加速重复加载
const CACHE_KEY = 'mofan_works_cache';
const CACHE_EXPIRE = 5 * 60 * 1000; // 缓存5分钟

// 分类映射
const categoryMap = { nail: "美甲", eyelash: "美睫", eyebrow: "霧眉", skin: "韓式皮膚管理", exosome: "外泌體育髮", private: "私密粉嫩素" };

// 绝对稳定的视频封面
const DEFAULT_VIDEO_COVER = "https://picsum.photos/id/1048/1080/1080";

// 图片压缩（优化速度）
function compressImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.src = url;
    img.onload = function() {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const maxSize = 800; // 缩小尺寸，提速加载
      canvas.width = maxSize;
      canvas.height = maxSize;
      ctx.drawImage(img, 0,0, maxSize,maxSize);
      canvas.toBlob((blob) => resolve(blob), "image/jpeg", 0.6);
      URL.revokeObjectURL(url);
    };
  });
}

function showLoading() { document.getElementById("loadingModal").style.display = "flex"; uploadBtn.disabled = true; }
function hideLoading() { document.getElementById("loadingModal").style.display = "none"; uploadBtn.disabled = false; }

// 分类选择
function openCategoryModal() { document.getElementById("categoryModal").style.display = "flex"; }
document.querySelectorAll('#categoryModal .category-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('#categoryModal .category-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    selectedCategory = item.dataset.val;
    document.getElementById("categoryBtn").innerHTML = `<span>選擇分類：${item.innerText}</span><i class="fa fa-chevron-down"></i>`;
    document.getElementById("categoryModal").style.display = "none";
  });
});

// 筛选分类
function openFilterCategoryModal() { document.getElementById("filterCategoryModal").style.display = "flex"; }
document.querySelectorAll('#filterCategoryModal .category-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('#filterCategoryModal .category-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    currentCategoryFilter = item.dataset.val;
    document.getElementById("filterCategoryBtn").innerHTML = `<span>篩選分類：${item.innerText}</span><i class="fa fa-chevron-down"></i>`;
    document.getElementById("filterCategoryModal").style.display = "none";
    renderWorks();
  });
});

// 媒体筛选
document.querySelectorAll('.media-tabs .filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.media-tabs .filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMediaFilter = tab.dataset.type;
    renderWorks();
  });
});

// 触发文件选择
function triggerFile() { document.getElementById('file-input').click(); }

// 批量上传核心
document.getElementById('file-input').onchange = async function(e) {
  const files = Array.from(e.target.files);
  if (files.length === 0) return;

  const validFiles = files.filter(file => {
    if (file.type.startsWith('video/') && file.size > MAX_VIDEO_SIZE) {
      alert(`❌ ${file.name} 超過50MB，已跳過`);
      return false;
    }
    return true;
  });

  if (validFiles.length === 0) { this.value = ''; return; }

  try {
    showLoading();
    let successCount = 0;
    const categoryName = categoryMap[selectedCategory] || '未分類';

    for (let file of validFiles) {
      let uploadFile = file;
      if (file.type.startsWith('image/')) {
        uploadFile = await compressImage(file);
      }

      await new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(uploadFile);
        reader.onload = async () => {
          try {
            const res = await fetch(GAS_URL, {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded" },
              body: new URLSearchParams({
                action: "upload",
                type: selectedCategory,
                mediaType: file.type.startsWith('image/') ? "image" : "video",
                title: `${categoryName} - 作品`,
                url: reader.result,
                cover: DEFAULT_VIDEO_COVER
              })
            });
            const result = await res.json();
            if (result.ok) successCount++;
          } catch (err) {}
          resolve();
        };
        reader.onerror = resolve;
      });
    }

    hideLoading();
    alert(`✅ 上傳完成！成功：${successCount}/${validFiles.length} 個`);
    // 上传后清除缓存，重新加载
    localStorage.removeItem(CACHE_KEY);
    await loadAllWorks();
    renderWorks();
  } catch (err) {
    hideLoading();
    alert("❌ 上傳失敗");
  }
  this.value = '';
};

// 🔥 核心优化：加载作品（本地缓存+极速请求）
async function loadAllWorks() {
  // 优先读取本地缓存，加速加载
  const cache = localStorage.getItem(CACHE_KEY);
  if (cache) {
    const { data, time } = JSON.parse(cache);
    if (Date.now() - time < CACHE_EXPIRE) {
      allWorksData = data || [];
      progress.style.width = "100%";
      setTimeout(() => progress.style.width = 0, 300);
      return;
    }
  }

  progress.style.width = "20%";
  try {
    // 极速网络请求：无冗余参数，超时兜底
    const controller = new AbortController();
    setTimeout(() => controller.abort(), 8000); // 8秒超时
    const res = await fetch(GAS_URL + "?action=load&t=" + new Date().getTime(), {
      signal: controller.signal,
      cache: 'no-store'
    });
    progress.style.width = "60%";
    const data = await res.json();
    allWorksData = Array.isArray(data.list) ? data.list : [];
    
    // 缓存数据
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      data: allWorksData,
      time: Date.now()
    }));
  } catch (e) { 
    allWorksData = []; 
  }
  progress.style.width = "100%";
  setTimeout(() => progress.style.width = 0, 300);
}

// 保存排序
function saveSortOrder(idList) {
  localStorage.setItem('works_sort', JSON.stringify(idList));
}

// 🔥 核心优化：极速渲染作品
function renderWorks() {
  let filterData = [...allWorksData];
  if (currentMediaFilter !== "all-media") filterData = filterData.filter(i => i?.mediaType === currentMediaFilter);
  if (currentCategoryFilter !== "all") filterData = filterData.filter(i => i?.category === currentCategoryFilter);

  if (filterData.length === 0) { 
    listDom.innerHTML = `<div class="empty-tip">暫無作品</div>`; 
    return; 
  }

  // 批量DOM渲染，减少重绘
  const fragment = document.createDocumentFragment();
  filterData.filter(i => i?.url).forEach((item, index) => {
    const card = document.createElement('div');
    card.className = 'work-card';
    card.dataset.id = item.id;
    card.innerHTML = `
      <div class="media-box" onclick="openCarousel(${index})">
        ${item.mediaType==="image" 
          ? `<img src="${item.url}" class="work-img">` 
          : `<img src="${DEFAULT_VIDEO_COVER}" class="work-video-cover"><div class="video-play-icon">▶</div>`}
      </div>
      <div class="work-info">
        <div class="work-tag">${categoryMap[item.category]||'未分類'}</div>
        <div class="work-operate"><button class="delete-btn" onclick="deleteWork('${item.id}')">刪除</button></div>
      </div>
    `;
    fragment.appendChild(card);
  });

  listDom.innerHTML = '';
  listDom.appendChild(fragment);
  initSortable();
}

// 拖拽排序
function initSortable() {
  if (sortable) sortable.destroy();
  sortable = new Sortable(listDom, {
    animation: 200, // 缩短动画时间，提速
    ghostClass: 'sortable-ghost',
    onEnd: () => {
      const newOrder = Array.from(listDom.children).map(i => i.dataset.id);
      saveSortOrder(newOrder);
      allWorksData.sort((a,b) => newOrder.indexOf(a.id) - newOrder.indexOf(b.id));
    }
  });
}

// 轮播
function openCarousel(index) { currentSlideIndex = index; showSlide(); document.getElementById("carouselModal").style.display = "flex"; }
function closeCarousel() { 
  document.getElementById("carouselModal").style.display = "none"; 
  const video = document.getElementById("carouselVideo");
  video.pause(); video.src = '';
}
function showSlide() {
  const item = allWorksData[currentSlideIndex];
  const img = document.getElementById("carouselImg");
  const video = document.getElementById("carouselVideo");
  img.style.display="none"; video.style.display="none";
  if (item.mediaType === "image") { img.src=item.url; img.style.display="block"; } 
  else { video.src=item.url; video.style.display="block"; video.play().catch(()=>{}); }
}
function prevSlide() { currentSlideIndex = (currentSlideIndex -1 + allWorksData.length) % allWorksData.length; showSlide(); }
function nextSlide() { currentSlideIndex = (currentSlideIndex +1) % allWorksData.length; showSlide(); }

// 删除
async function deleteWork(id) {
  if (!confirm("確定刪除？")) return;
  const res = await fetch(GAS_URL, {
    method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ action: "delete", id })
  });
  const result = await res.json();
  if (result.ok) { 
    alert("✅ 刪除成功！"); 
    localStorage.removeItem(CACHE_KEY);
    localStorage.removeItem('works_sort'); 
    await loadAllWorks(); 
    renderWorks(); 
  } else alert("❌ 刪除失敗");
}

// 底部导航
document.querySelectorAll('.bottom-nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.bottom-nav-item').forEach(nav => nav.classList.remove('active'));
    item.classList.add('active');
    const text = item.querySelector('span').innerText;
    switch(text) {
      case '預約': window.open('https://liff.line.me/2009598216-ZsS47DM8', '_blank'); break;
      case '地址': window.open('https://share.google/L5vzxJrpotDQnkWAx', '_blank'); break;
      case '分享': navigator.share?.({title:'莫凡韓式皮膚管理', url:window.location.href}).catch(()=>alert("複製連結分享")); break;
    }
  });
});

// 🔥 核心优化：页面打开立即预加载作品（不等待任何资源）
(async () => {
  await loadAllWorks();
  renderWorks();
})();

// 原有初始化（兼容）
window.addEventListener('load', () => {
  // 二次校验渲染，确保万无一失
  if (allWorksData.length === 0) {
    loadAllWorks().then(renderWorks);
  }
});
