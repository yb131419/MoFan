<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>莫凡美業 | 作品集</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }
    body {
      background: #f7f8fa;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding-bottom: 30px;
    }
    /* 顶部进度条 */
    .progress {
      height: 3px;
      background: linear-gradient(90deg, #e8a8b8, #d96b8c);
      transition: width 0.14s ease;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999;
      width: 0;
    }
    /* 页面标题 */
    .page-header {
      padding: 36px 20px 16px;
      text-align: center;
    }
    .page-title {
      font-size: 22px;
      font-weight: 600;
      color: #222;
      margin-bottom: 4px;
    }
    .page-subtitle {
      font-size: 12px;
      color: #999;
    }
    /* 第一层标签：全部 / 照片 / 影片 */
    .tab-layer-1 {
      display: flex;
      border-bottom: 1px solid #eee;
      padding: 0 20px;
      gap: 32px;
      overflow-x: auto;
      white-space: nowrap;
    }
    .tab-item-1 {
      padding: 14px 4px;
      font-size: 16px;
      color: #666;
      position: relative;
      cursor: pointer;
      border: none;
      background: transparent;
    }
    .tab-item-1.active {
      color: #222;
      font-weight: 500;
    }
    .tab-item-1.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 3px;
      background: #222;
      border-radius: 3px 3px 0 0;
    }
    /* 第二层标签：业务分类 */
    .tab-layer-2 {
      display: flex;
      padding: 16px 20px;
      gap: 10px;
      overflow-x: auto;
      white-space: nowrap;
    }
    .tag-btn {
      padding: 8px 16px;
      border-radius: 999px;
      border: none;
      background: #eee;
      color: #555;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .tag-btn.active {
      background: #d96b8c;
      color: #fff;
    }
    /* 上传区域 */
    .upload-area {
      padding: 0 20px 20px;
    }
    .upload-card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    /* 高质感分类选择按钮 */
    .category-select-btn {
      width: 100%;
      padding: 12px;
      border: 1px solid #eee;
      border-radius: 12px;
      background: #f7f8fa;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .upload-btn {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: none;
      background: #d96b8c;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .upload-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #file-input {
      display: none;
    }
    /* 作品网格 */
    .works-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 0 20px;
    }
    .work-card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 10px rgba(0,0,0,0.05);
      transition: all 0.3s ease;
    }
    .media-box {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      cursor: pointer; /* 点击放大 */
    }
    .work-img, .work-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .work-info {
      padding: 12px;
      text-align: center;
    }
    .work-tag {
      font-size: 13px;
      color: #666;
      font-weight: 500;
    }
    .work-operate {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .edit-btn {
      flex: 1;
      padding: 6px 0;
      border-radius: 8px;
      border: 1px solid #d96b8c;
      background: transparent;
      color: #d96b8c;
      font-size: 11px;
      cursor: pointer;
    }
    .delete-btn {
      flex: 1;
      padding: 6px 0;
      border-radius: 8px;
      border: none;
      background: #ee5757;
      color: #fff;
      font-size: 11px;
      cursor: pointer;
    }
    /* 空内容提示 */
    .empty-tip {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 14px;
    }
    /* -------------- 通用弹窗 -------------- */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-content {
      background: #fff;
      width: 100%;
      max-width: 320px;
      border-radius: 20px;
      padding: 24px;
      text-align: center;
    }
    /* 分类选择弹窗 */
    .category-item {
      padding: 12px;
      margin: 8px 0;
      border-radius: 12px;
      background: #f7f8fa;
      cursor: pointer;
      font-size: 14px;
    }
    .category-item.active {
      background: #d96b8c;
      color: #fff;
    }
    /* 上传加载浮窗（防呆） */
    .loading-modal .loading-text {
      margin-top: 12px;
      font-size: 14px;
      color: #666;
    }
    .loading-modal .loader {
      width: 40px;
      height: 40px;
      border: 4px solid #f0f0f0;
      border-top: 4px solid #d96b8c;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    /* 编辑弹窗 */
    .modal-item {
      margin-bottom: 16px;
      text-align: left;
    }
    .modal-label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }
    .modal-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #eee;
      border-radius: 10px;
      font-size: 14px;
    }
    .modal-btn-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .modal-cancel, .modal-save {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
    }
    .modal-cancel {
      border: 1px solid #ddd;
      background: #fff;
      color: #666;
    }
    .modal-save {
      border: none;
      background: #d96b8c;
      color: #fff;
    }

    /* -------------- 图片轮播放大样式（新增）-------------- */
    #carouselModal {
      background: rgba(0,0,0,0.9);
    }
    .carousel-content {
      position: relative;
      width: 90%;
      max-width: 500px;
      text-align: center;
    }
    .carousel-media {
      width: 100%;
      max-height: 80vh;
      object-fit: contain;
    }
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      z-index: 1001;
    }
    .carousel-prev { left: 10px; }
    .carousel-next { right: 10px; }
    .carousel-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: transparent;
      color: #fff;
      border: none;
      font-size: 30px;
      cursor: pointer;
    }
  </style>
</head>
<body>
<!-- 顶部进度条 -->
<div class="progress" id="progress"></div>

<!-- 页面标题 -->
<div class="page-header">
  <h1 class="page-title">莫凡美業</h1>
  <p class="page-subtitle">Beauty Portfolio</p>
</div>

<!-- 第一层标签：全部 / 照片 / 影片 -->
<div class="tab-layer-1">
  <button class="tab-item-1 active" data-type="all-media">全部</button>
  <button class="tab-item-1" data-type="image">照片</button>
  <button class="tab-item-1" data-type="video">影片</button>
</div>

<!-- 第二层标签：业务分类 -->
<div class="tab-layer-2">
  <button class="tag-btn active" data-category="all">全部</button>
  <button class="tag-btn" data-category="nail">美甲</button>
  <button class="tag-btn" data-category="eyelash">美睫</button>
  <button class="tag-btn" data-category="beauty">美容</button>
</div>

<!-- 上传区域 -->
<div class="upload-area">
  <div class="upload-card">
    <button class="category-select-btn" id="categoryBtn" onclick="openCategoryModal()">
      <span>選擇分類：美甲</span>
      <i class="fa fa-chevron-down"></i>
    </button>
    <button class="upload-btn" id="uploadBtn" onclick="triggerFile()">
      <i class="fa fa-plus"></i> 新增上傳作品
    </button>
    <input type="file" id="file-input" accept="image/*,video/*">
  </div>
</div>

<!-- 作品展示区 -->
<div class="works-grid" id="worksList"></div>

<!-- ============== 功能弹窗 ============== -->
<!-- 1. 分类选择弹窗 -->
<div class="modal" id="categoryModal">
  <div class="modal-content">
    <h3 style="margin-bottom:16px; font-size:16px;">選擇作品分類</h3>
    <div class="category-item active" data-val="nail">美甲</div>
    <div class="category-item" data-val="eyelash">美睫</div>
    <div class="category-item" data-val="beauty">美容</div>
  </div>
</div>

<!-- 2. 上传加载浮窗（防呆） -->
<div class="modal loading-modal" id="loadingModal">
  <div class="modal-content">
    <div class="loader"></div>
    <div class="loading-text">上傳中，請稍候...</div>
  </div>
</div>

<!-- 3. 编辑弹窗 -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <h3 style="text-align:left; margin-bottom:20px;">編輯作品</h3>
    <div class="modal-item">
      <label class="modal-label">作品標題</label>
      <input type="text" class="modal-input" id="editTitle">
    </div>
    <input type="hidden" id="editId">
    <div class="modal-btn-group">
      <button class="modal-cancel" onclick="closeEditModal()">取消</button>
      <button class="modal-save" onclick="saveEdit()">儲存</button>
    </div>
  </div>
</div>

<!-- 4. 图片轮播放大弹窗（新增） -->
<div class="modal" id="carouselModal">
  <button class="carousel-close" onclick="closeCarousel()">&times;</button>
  <button class="carousel-btn carousel-prev" onclick="prevSlide()"><i class="fa fa-chevron-left"></i></button>
  <div class="carousel-content">
    <img id="carouselImg" class="carousel-media" style="display:none;">
    <video id="carouselVideo" class="carousel-media" controls style="display:none;"></video>
  </div>
  <button class="carousel-btn carousel-next" onclick="nextSlide()"><i class="fa fa-chevron-right"></i></button>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxQl92tgurrQmQO137YtukSt18bfiY3OXNNBA-tTFOrEXXfUbxRDXmDc4qfiTXTeRk1bg/exec";

// 全局变量
let currentMediaFilter = "all-media";
let currentCategoryFilter = "all";
let allWorksData = [];
let selectedCategory = "nail";
let currentSlideIndex = 0; // 轮播索引
const progress = document.getElementById("progress");
const uploadBtn = document.getElementById("uploadBtn");

// ====================== 工具函数 ======================
// 图片压缩
function compressImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.src = url;
    img.onload = function() {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const maxSize = 900;
      canvas.width = maxSize;
      canvas.height = maxSize;
      ctx.drawImage(img, 0, 0, maxSize, maxSize);
      canvas.toBlob((blob) => resolve(blob), "image/jpeg", 0.65);
      URL.revokeObjectURL(url);
    };
  });
}
// 加载浮窗
function showLoading() {
  document.getElementById("loadingModal").style.display = "flex";
  uploadBtn.disabled = true;
}
function hideLoading() {
  document.getElementById("loadingModal").style.display = "none";
  uploadBtn.disabled = false;
}

// ====================== 分类选择 ======================
function openCategoryModal() {
  document.getElementById("categoryModal").style.display = "flex";
}
document.querySelectorAll('.category-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.category-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    selectedCategory = item.dataset.val;
    document.getElementById("categoryBtn").innerHTML = `<span>選擇分類：${item.innerText}</span><i class="fa fa-chevron-down"></i>`;
    document.getElementById("categoryModal").style.display = "none";
  });
});

// ====================== 标签筛选 ======================
document.querySelectorAll('.tab-item-1').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab-item-1').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMediaFilter = tab.dataset.type;
    renderWorks();
  });
});
document.querySelectorAll('.tag-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCategoryFilter = btn.dataset.category;
    renderWorks();
  });
});

// ====================== 上传功能 ======================
function triggerFile() {
  document.getElementById('file-input').click();
}
document.getElementById('file-input').onchange = async function(e) {
  const file = e.target.files[0];
  if (!file) return;

  try {
    showLoading();
    let uploadFile = file;
    if (file.type.startsWith('image/')) {
      uploadFile = await compressImage(file);
    }

    const reader = new FileReader();
    reader.readAsDataURL(uploadFile);
    
    reader.onload = async function() {
      const fileUrl = reader.result;
      const mediaType = file.type.startsWith('image/') ? "image" : "video";

      const res = await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ 
          action: "upload", 
          type: selectedCategory, 
          mediaType: mediaType,
          title: "作品", 
          url: fileUrl 
        })
      });

      const result = await res.json();
      hideLoading();
      if (result.ok) {
        alert("✅ 上傳成功！");
        await loadAllWorks();
        renderWorks();
      } else {
        alert("❌ 上傳失敗");
      }
    };
  } catch (err) {
    hideLoading();
    alert("❌ 上傳失敗");
  }
};

// ====================== 读取数据 ======================
async function loadAllWorks() {
  progress.style.width = "30%";
  const res = await fetch(GAS_URL + "?action=load");
  const data = await res.json();
  progress.style.width = "100%";
  allWorksData = Array.isArray(data.list) ? data.list : [];
  setTimeout(() => progress.style.width = 0, 300);
}

// ====================== 渲染作品（仅显示分类，隐藏文件名） ======================
function renderWorks() {
  let filterData = [...allWorksData];

  if (currentMediaFilter !== "all-media") {
    filterData = filterData.filter(item => item && item.mediaType === currentMediaFilter);
  }
  if (currentCategoryFilter !== "all") {
    filterData = filterData.filter(item => item && item.category === currentCategoryFilter);
  }

  const listDom = document.getElementById('worksList');
  if (filterData.length === 0) {
    listDom.innerHTML = `<div class="empty-tip">暫無作品</div>`;
    return;
  }

  const categoryMap = { nail: "美甲", eyelash: "美睫", beauty: "美容" };
  listDom.innerHTML = filterData.filter(item => item && item.url).map((item, index) => {
    let mediaHtml = item.mediaType === "image" 
      ? `<img src="${item.url}" class="work-img">`
      : `<video src="${item.url}" class="work-video" muted></video>`;

    return `
      <div class="work-card">
        <div class="media-box" onclick="openCarousel(${index})">${mediaHtml}</div>
        <div class="work-info">
          <div class="work-tag">${categoryMap[item.category]||'未分類'}</div>
          <div class="work-operate">
            <button class="edit-btn" onclick="openEditModal('${item.id}')">編輯</button>
            <button class="delete-btn" onclick="deleteWork('${item.id}')">刪除</button>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

// ====================== 图片轮播放大（新增核心功能） ======================
function openCarousel(index) {
  currentSlideIndex = index;
  showSlide();
  document.getElementById("carouselModal").style.display = "flex";
}
function closeCarousel() {
  document.getElementById("carouselModal").style.display = "none";
  const video = document.getElementById("carouselVideo");
  video.pause();
}
function showSlide() {
  const item = allWorksData[currentSlideIndex];
  const img = document.getElementById("carouselImg");
  const video = document.getElementById("carouselVideo");

  if (item.mediaType === "image") {
    img.src = item.url;
    img.style.display = "block";
    video.style.display = "none";
  } else {
    video.src = item.url;
    video.style.display = "block";
    img.style.display = "none";
  }
}
function prevSlide() {
  currentSlideIndex = (currentSlideIndex - 1 + allWorksData.length) % allWorksData.length;
  showSlide();
}
function nextSlide() {
  currentSlideIndex = (currentSlideIndex + 1) % allWorksData.length;
  showSlide();
}

// ====================== 编辑功能 ======================
function openEditModal(id) {
  document.getElementById('editId').value = id;
  document.getElementById('editTitle').value = "作品";
  document.getElementById('editModal').style.display = 'flex';
}
function closeEditModal() {
  document.getElementById('editModal').style.display = 'none';
}
async function saveEdit() {
  const id = document.getElementById('editId').value;
  const title = document.getElementById('editTitle').value.trim();
  if (!title) { alert("請輸入標題"); return; }

  const res = await fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ action: "edit", id: id, title: title })
  });
  
  const result = await res.json();
  if (result.ok) {
    alert("✅ 修改成功！");
    closeEditModal();
    loadAllWorks().then(renderWorks);
  } else {
    alert("❌ 修改失敗");
  }
}

// ====================== 删除功能（修复BUG） ======================
async function deleteWork(id) {
  if (!confirm("確定刪除？")) return;
  const res = await fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ action: "delete", id: id })
  });
  const result = await res.json();
  if (result.ok) {
    alert("✅ 刪除成功！");
    loadAllWorks().then(renderWorks);
  } else {
    alert("❌ 刪除失敗：未找到作品");
  }
}

// 初始化
loadAllWorks().then(renderWorks);
</script>
</body>
</html>
