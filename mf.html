<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>莫凡美業 作品集</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <style>
    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .progress {
      height: 3px;
      background: linear-gradient(90deg, #f472b6, #ec4899);
      transition: width 0.12s ease;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
    }
    .card-hover {
      transition: all 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px -5px rgba(236,72,153,0.2);
    }
  </style>
</head>
<body class="bg-pink-50">

<div id="progress" class="progress w-0"></div>

<!-- 頂部 -->
<div class="pt-8 pb-6 text-center">
  <h1 class="text-2xl font-bold text-pink-600 tracking-wide">莫凡美業 作品集</h1>
  <p class="text-xs text-pink-400 mt-1">Beauty Portfolio</p>
</div>

<!-- 分類 -->
<div class="flex justify-center gap-2 px-4 mb-6">
  <button onclick="load('all')" class="px-4 py-2 bg-pink-500 text-white rounded-full text-sm shadow-sm hover:bg-pink-600 transition-all">全部</button>
  <button onclick="load('美甲')" class="px-4 py-2 bg-pink-500 text-white rounded-full text-sm shadow-sm hover:bg-pink-600 transition-all">美甲</button>
  <button onclick="load('美容')" class="px-4 py-2 bg-pink-500 text-white rounded-full text-sm shadow-sm hover:bg-pink-600 transition-all">美容</button>
  <button onclick="load('美睫')" class="px-4 py-2 bg-pink-500 text-white rounded-full text-sm shadow-sm hover:bg-pink-600 transition-all">美睫</button>
</div>

<!-- 上傳 -->
<div class="px-5 mb-8">
  <div class="bg-white rounded-xl p-4 shadow-sm">
    <select id="tag" class="w-full border border-pink-100 bg-pink-50 rounded-lg p-2.5 text-sm text-gray-700 mb-2">
      <option value="美甲">美甲</option>
      <option value="美容">美容</option>
      <option value="美睫">美睫</option>
    </select>
    <button onclick="document.getElementById('file').click()" class="w-full bg-gradient-to-r from-pink-400 to-pink-600 text-white py-2.5 rounded-lg text-sm font-medium shadow hover:shadow-lg transition-all">
      <i class="fa fa-upload mr-1"></i> 上傳圖片
    </button>
    <input type="file" id="file" accept="image/*" hidden>
  </div>
</div>

<!-- 手機兩列網格 -->
<div id="list" class="px-5 grid grid-cols-2 gap-4 pb-20"></div>

<script>
// 你原本的正式 R2 上傳網址
const GAS_URL = "https://script.google.com/macros/s/AKfycbxQl92tgurrQmQO137YtukSt18bfiY3OXNNBA-tTFOrEXXfUbxRDXmDc4qfiTXTeRk1bg/exec";
const WORKER_URL = "https://mofan.yb131419.workers.dev";

let currentTag = "all";
const progress = document.getElementById("progress");

// ========== 上傳 + 真實進度 + 永久存 R2 ==========
document.getElementById("file").onchange = async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const tag = document.getElementById("tag").value;

  try {
    let percent = 0;
    const interval = setInterval(() => {
      percent += Math.random() * 8;
      if (percent > 95) percent = 95;
      progress.style.width = percent + "%";
    }, 100);

    // 上傳到 R2 (永久保存)
    const fd = new FormData();
    fd.append("file", file);

    const resR2 = await fetch(WORKER_URL, {
      method: "POST",
      mode: "cors",
      body: fd
    });

    const data = await resR2.json();
    const url = data.url;

    clearInterval(interval);
    progress.style.width = "100%";

    // 紀錄到 GAS
    await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({ action: "upload", type: tag, url: url })
    });

    alert("✅ 上傳成功！已儲存到 R2");
    load(currentTag);
  } catch (e) {
    console.error(e);
    alert("❌ 上傳失敗");
  }
  setTimeout(() => progress.style.width = 0, 600);
};

// ========== 載入作品 + 分類 ==========
async function load(tag) {
  currentTag = tag;
  progress.style.width = "30%";

  const res = await fetch(GAS_URL + "?action=load");
  const data = await res.json();
  progress.style.width = "100%";

  const mapType = { "美甲": "photos", "美容": "beautys", "美睫": "eyelashes" };
  let list = [];

  if (tag === "all") {
    list = [
      ...(data.photos ? JSON.parse(data.photos) : []),
      ...(data.beautys ? JSON.parse(data.beautys) : []),
      ...(data.eyelashes ? JSON.parse(data.eyelashes) : [])
    ];
  } else {
    const key = mapType[tag];
    list = data[key] ? JSON.parse(data[key]) : [];
  }

  document.getElementById("list").innerHTML = list.map(i => {
    return `
      <div class="bg-white rounded-xl overflow-hidden shadow card-hover">
        <div class="aspect-square w-full">
          <img src="${i.url}" class="w-full h-full object-cover">
        </div>
        <div class="p-2.5 text-center">
          <p class="text-xs text-gray-700 font-medium">${i.title}</p>
        </div>
        <button onclick="del('${i.type}','${i.id}')" class="w-full bg-red-500 text-white text-xs py-1.5">
          刪除
        </button>
      </div>
    `;
  }).join("");

  setTimeout(() => progress.style.width = 0, 300);
}

// 刪除
async function del(type, id) {
  if (!confirm("確定刪除？")) return;
  await fetch(GAS_URL + `?action=delete&type=${type}&id=${id}`);
  load(currentTag);
}

load('all');
</script>
</body>
</html>
