<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上傳測試</title>
  <style>
    .progress{height:6px;background:#d98880;width:0%;transition:0.2s;}
    .text{text-align:center;font-size:12px;padding:4px;}
  </style>
</head>
<body>

<div class="progress" id="pBar"></div>
<div class="text" id="pText">請選擇檔案上傳</div>

<button onclick="document.getElementById('file').click()">上傳照片</button>
<input type="file" id="file" accept="image/*" hidden>

<script>
const API = "https://script.google.com/macros/s/AKfycbxQl92tgurrQmQO137YtukSt18bfiY3OXNNBA-tTFOrEXXfUbxRDXmDc4qfiTXTeRk1bg/exec";
const file = document.getElementById('file');

file.onchange = async () => {
  document.getElementById('pText').innerText = "上傳中...";
  document.getElementById('pBar').style.width = "50%";
  
  const fd = new FormData();
  fd.append('file', file.files[0]);

  try {
    await fetch(API, { method:"POST", body:fd, mode:"no-cors" });
  } catch(e) {}

  document.getElementById('pBar').style.width = "100%";
  document.getElementById('pText').innerText = "✅ 上傳完成，請檢查 Google Drive";
  alert("✅ 上傳完成！");
};
</script>

</body>
</html>
