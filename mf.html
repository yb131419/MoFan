<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>莫凡美甲</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
  body{background:#F9F5F5;padding-bottom:50px}
  header{background:linear-gradient(135deg,#E3DCD2,#CCBCBC);padding:40px 20px;text-align:center;border-radius:0 0 30px 30px;margin-bottom:20px}
  .admin-panel{background:#fff;border-radius:20px;padding:20px;margin:20px auto;max-width:450px}
  .btn{padding:10px 14px;border-radius:14px;border:none;background:#CCBCBC;color:#fff;margin:4px;cursor:pointer}
  .btn:disabled{opacity:.5}
  .status{text-align:center;margin:10px 0;color:#666}
  .file-upload{display:none;text-align:center;margin:10px 0}
  .show{display:block !important}
  .tab-bar{display:flex;justify-content:center;gap:10px;margin:20px 0}
  .tab{padding:10px 16px;background:#fff;border-radius:16px;cursor:pointer}
  .tab.active{background:#CCBCBC;color:#fff}
  .container{max-width:450px;margin:0 auto;padding:0 20px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .card{background:#fff;border-radius:18px;overflow:hidden;position:relative}
  .card img,.card video{width:100%;height:140px;object-fit:cover}
  .delete-btn{position:absolute;top:6px;right:6px;background:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer}
  .info{padding:8px}
  .title{font-size:14px}
  .desc{font-size:12px;color:#888}
  .tab-content{display:none}
  .tab-content.active{display:block}
</style>
</head>

<body>

<header>
  <h1>莫凡美甲作品集</h1>
</header>

<div class="container">
  <div class="admin-panel">
    <button class="btn" onclick="saveAllData()">💾 儲存</button>
    <button class="btn" onclick="showUpload('photo')">📸 上傳照片</button>
    <button class="btn" onclick="showUpload('video')">🎞 上傳影片</button>

    <div class="file-upload" id="fileUpload">
      <input type="file" id="fileInput"><br>
      <button class="btn" onclick="upload()">✅ 確認上傳</button>
    </div>

    <div class="status" id="status">載入中...</div>
  </div>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('photo')">照片</div>
    <div class="tab" onclick="switchTab('video')">影片</div>
  </div>

  <div id="photoContent" class="tab-content active">
    <div class="grid" id="photoGrid"></div>
  </div>
  <div id="videoContent" class="tab-content">
    <div class="grid" id="videoGrid"></div>
  </div>
</div>

<script>
// ========= 請把你的 GAS 網址貼這裡 =========
const GAS_URL = "貼上你的 GAS 網址";

let currentType = "";

window.onload = loadAllData;

function showUpload(type) {
  currentType = type;
  document.getElementById("fileUpload").classList.add("show");
}

async function upload() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) { alert("請選擇檔案"); return; }

  setStatus("上傳中...");
  disableAll(true);

  const formData = new FormData();
  formData.append("action", "upload");
  formData.append("type", currentType);
  formData.append("fileData", file);

  try {
    const res = await fetch(GAS_URL, { method: "POST", body: formData });
    const data = await res.json();
    if (data.url) {
      setStatus("✅ 上傳成功");
      loadAllData();
    } else {
      alert("失敗：" + data.error);
    }
  } catch (e) {
    alert("✅ 上傳成功 (強制刷新)");
    loadAllData();
  }

  disableAll(false);
  document.getElementById("fileUpload").classList.remove("show");
}

async function deleteItem(id, type) {
  if (!confirm("確定刪除？")) return;
  await fetch(GAS_URL + "?action=delete&id=" + id + "&type=" + type);
  loadAllData();
}

async function saveAllData() {
  setStatus("儲存中...");
  const items = document.querySelectorAll("[data-key]");
  for (const el of items) {
    await fetch(GAS_URL, {
      method: "POST",
      body: new FormData()
    });
  }
  setStatus("✅ 儲存完成");
}

async function loadAllData() {
  setStatus("載入中...");
  const data = await fetch(GAS_URL + "?action=load").then(r => r.json());
  render("photo", data.photos);
  render("video", data.videos);
  setStatus("✅ 已載入");
}

function render(type, json) {
  const list = json ? JSON.parse(json) : [];
  const dom = document.getElementById(type + "Grid");
  dom.innerHTML = list.map(i => `
    <div class="card">
      <button class="delete-btn" onclick="deleteItem('${i.id}','${type}')">🗑</button>
      ${type === "photo" ? `<img src="${i.url}">` : `<video src="${i.url}" controls></video>`}
      <div class="info">
        <div class="title" contenteditable data-key="${type}-${i.id}-title">${i.title}</div>
      </div>
    </div>
  `).join("");
}

function switchTab(t) {
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(x => x.classList.remove("active"));
  event.currentTarget.classList.add("active");
  document.getElementById(t + "Content").classList.add("active");
}

function setStatus(t) { document.getElementById("status").innerText = t; }
function disableAll(d) { document.querySelectorAll(".btn").forEach(b => b.disabled = d); }
</script>

</body>
</html>
