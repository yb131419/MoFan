<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高質感美業作品集</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", sans-serif;
    }
    body{
        background:#F8F6F4;
        color:#444;
        padding-bottom:100px;
    }
    header{
        background:linear-gradient(135deg,#E3DCD2,#CCBCBC);
        padding: 50px 20px;
        text-align:center;
        border-radius:0 0 50px 50px;
        box-shadow:0 10px 30px rgba(0,0,0,0.05);
        margin-bottom: 40px;
    }
    header h1{
        font-size:26px;
        font-weight:600;
        color:#222;
    }
    header p{
        font-size:16px;
        color:#666;
        margin-top:8px;
    }
    .container{
        max-width:1000px;
        margin:0 auto;
        padding:0 20px;
    }
    .section{
        margin-bottom: 50px;
    }
    .section h2{
        font-size:20px;
        color:#222;
        margin-bottom:20px;
        padding-left:15px;
        border-left:4px solid #CCBCBC;
    }

    /* 手機 2 列 關鍵程式 */
    .grid{
        display:grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
    }
    @media (min-width: 600px) {
        .grid{ grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }
    }

    .card{
        background:#fff;
        border-radius: 20px;
        overflow:hidden;
        box-shadow:0 8px 20px rgba(0,0,0,0.04);
        transition:0.3s;
    }
    .card:hover{
        transform:translateY(-4px);
    }
    .card img,.card video{
        width:100%;
        height: 190px;
        object-fit:cover;
    }
    .info{
        padding: 12px 10px;
        text-align:center;
    }
    .info .title{
        font-size:14px;
        color:#333;
        font-weight:500;
        margin-bottom: 4px;
    }
    .info .desc{
        font-size:12px;
        color:#888;
    }
    .contact{
        background:#fff;
        padding:35px 25px;
        border-radius:25px;
        text-align:center;
        box-shadow:0 10px 25px rgba(0,0,0,0.05);
    }
    .contact h3{
        font-size:19px;
        color:#222;
        margin-bottom:15px;
    }
    .contact p{
        font-size:15px;
        color:#555;
        line-height:1.7;
    }

    /* 自動隱藏：沒照片/沒影片就不顯示 */
    .card:has(img[src=""]),
    .card:has(video[src=""]) {
        display: none !important;
    }
</style>
</head>

<body>

<header>
    <h1>高質感美業作品集</h1>
    <p>美甲・美睫・紋繡・霧眉｜專業精緻質感</p>
</header>

<div class="container">

<!-- ====================== 照片區 ====================== -->
<section class="section">
    <h2>📸 質感作品</h2>
    <div class="grid">

        <!-- 照片 1 -->
        <div class="card">
            <img src="nail01.jpg" alt="">
            <div class="info">
                <div class="title">美甲</div>
                <div class="desc">質感設計</div>
            </div>
        </div>

        <!-- 照片 2 -->
        <div class="card">
            <img src="nail02.jpg" alt="">
            <div class="info">
                <div class="title">美睫</div>
                <div class="desc">自然精緻</div>
            </div>
        </div>

        <!-- 照片 3 -->
        <div class="card">
            <img src="nail03.jpg" alt="">
            <div class="info">
                <div class="title">霧眉</div>
                <div class="desc">高級霧感</div>
            </div>
        </div>

        <!-- 照片 4 -->
        <div class="card">
            <img src="nail04.jpg" alt="">
            <div class="info">
                <div class="title">紋繡</div>
                <div class="desc">自然持久</div>
            </div>
        </div>

        <!-- 沒有照片 → 設 src="" 就會自動隱藏 -->
        <div class="card">
            <img src="" alt="">
            <div class="info">
                <div class="title">未開放</div>
                <div class="desc">未上傳</div>
            </div>
        </div>

    </div>
</section>

<!-- ====================== 影片區 ====================== -->
<section class="section">
    <h2>🎞 操作展示</h2>
    <div class="grid">

        <!-- 影片 1 -->
        <div class="card">
            <video controls src="video01.mp4"></video>
            <div class="info">
                <div class="title">美甲操作</div>
                <div class="desc">專業流程</div>
            </div>
        </div>

        <!-- 影片 2 -->
        <div class="card">
            <video controls src="video02.mp4"></video>
            <div class="info">
                <div class="title">美睫操作</div>
                <div class="desc">自然呈現</div>
            </div>
        </div>

        <!-- 沒有影片 → 自動隱藏 -->
        <div class="card">
            <video controls src=""></video>
            <div class="info">
                <div class="title">未開放</div>
                <div class="desc">未上傳</div>
            </div>
        </div>

    </div>
</section>

<!-- ====================== 聯絡資訊 ====================== -->
<section class="contact">
    <h3>預約諮詢</h3>
    <p>LINE：你的ID<br>營業時間：10:00-20:00<br>服務：美甲・美睫・紋繡・霧眉</p>
</section>

</div>
</body>
</html>
