<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>莫凡美業｜作品管理庫</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#d98880',
            bgLight: '#fdf8f8',
            borderGray: '#f0e4e2',
            textMain: '#553333',
            textGray: '#b89999'
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .scroll-hide::-webkit-scrollbar { display: none; }
      .tab-active { @apply text-primary border-b-2 border-primary font-medium; }
    }
    body { background: #fdf8f8; color: #553333; }
    video { width:100%; height:100%; object-fit:cover; }

    /* 進度條 + 百分比 */
    .progress-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 9999;
    }
    .progress-bar {
      height: 6px;
      background: #d98880;
      width: 0%;
      transition: width 0.2s ease;
    }
    .progress-text {
      text-align: center;
      font-size: 12px;
      padding: 2px 0;
      color: #553333;
      background: #fff;
    }
  </style>
</head>

<body>

  <!-- 進度條 + 百分比 -->
  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
    <div class="progress-text" id="progressText">準備上傳</div>
  </div>

  <header class="sticky top-0 bg-white px-5 py-4 flex justify-between items-center border-b border-borderGray z-40">
    <div>
      <h1 class="text-xl font-bold">莫凡美業｜作品管理</h1>
      <p class="text-sm text-textGray">mofan-beauty.com</p>
    </div>
  </header>

  <div class="bg-white px-4 overflow-x-auto scroll-hide">
    <div class="flex gap-6 min-w-max">
      <button class="tab-btn tab-active py-3 px-1" data-type="image">照片</button>
      <button class="tab-btn py-3 px-1" data-type="video">影片</button>
    </div>
  </div>

  <div class="px-5 py-4 flex flex-wrap gap-3 items-center">
    <button class="tag-active px-4 py-2 text-sm">全部</button>
    <button class="bg-bgLight px-4 py-2 rounded-full text-sm text-textGray">美甲</button>
    <button class="bg-bgLight px-4 py-2 rounded-full text-sm text-textGray">美睫</button>
    <button class="bg-bgLight px-4 py-2 rounded-full text-sm text-textGray">染燙</button>
    <button class="bg-bgLight px-4 py-2 rounded-full text-sm text-textGray">護膚</button>
    <button id="uploadBtn" class="ml-auto w-10 h-10 rounded-full bg-bgLight flex items-center justify-center text-textGray">
      <i class="fa fa-cloud-upload"></i>
    </button>
  </div>

  <input type="file" id="fileInput" accept="image/*,video/*" class="hidden" multiple>

  <main class="px-4 grid grid-cols-2 gap-4 pb-32">
    <div id="grid" class="col-span-2 grid grid-cols-2 gap-4"></div>
  </main>

  <footer class="fixed bottom-0 left-0 right-0 bg-white px-5 py-4 border-t border-borderGray">
    <div class="flex justify-around items-center">
      <button class="flex flex-col items-center gap-1 text-textGray"><i class="fa fa-sort"></i><span class="text-xs">排序</span></button>
      <button class="flex flex-col items-center gap-1 text-textGray"><i class="fa fa-refresh"></i><span class="text-xs">重新整理</span></button>
      <button class="flex flex-col items-center gap-1 text-textGray"><i class="fa fa-search"></i><span class="text-xs">搜尋</span></button>
    </div>
  </footer>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // ======================
  // 你的 GAS 網址
  // ======================
  const API = "https://script.google.com/macros/s/AKfycbxQl92tgurrQmQO137YtukSt18bfiY3OXNNBA-tTFOrEXXfUbxRDXmDc4qfiTXTeRk1bg/exec";

  const grid = document.getElementById('grid');
  const uploadBtn = document.getElementById('uploadBtn');
  const fileInput = document.getElementById('fileInput');
  const progressBar = document.getElementById('progressBar');
  const progressText = document.getElementById('progressText');
  const tabBtns = document.querySelectorAll('.tab-btn');
  
  let currentType = 'image';

  // 進度條更新
  function setProgress(percent, text) {
    progressBar.style.width = percent + "%";
    progressText.innerText = text;
  }

  // 切換圖片/影片
  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tabBtns.forEach(b => b.classList.remove('tab-active'));
      btn.classList.add('tab-active');
      currentType = btn.dataset.type;
      loadList();
    });
  });

  // 上傳
  uploadBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;

    setProgress(0, "準備上傳...");

    try {
      const total = files.length;
      for (let i = 0; i < total; i++) {
        const file = files[i];
        const form = new FormData();
        form.append('file', file);

        // 顯示目前進度
        const p = Math.floor(((i) / total) * 100);
        setProgress(p, `上傳中 ${i+1}/${total} (${p}%)`);

        await fetch(API, { method: 'POST', body: form });
      }

      setProgress(100, "✅ 上傳完成");
      alert("✅ 全部上傳完成！");
      loadList();

    } catch (err) {
      setProgress(0, "❌ 上傳失敗");
      alert("❌ 上傳失敗：" + err.message);
    }

    // 隱藏進度
    setTimeout(() => {
      setProgress(0, "");
    }, 1500);
    
    fileInput.value = '';
  });

  // 讀取列表
  async function loadList() {
    grid.innerHTML = '<div class="col-span-2 text-center py-6">讀取中...</div>';
    try {
      const res = await fetch(API + "?action=list");
      const data = await res.json();
      render(data.list || []);
    } catch (e) {
      grid.innerHTML = '<div class="col-span-2 text-center py-6">載入失敗</div>';
    }
  }

  // 畫面渲染
  function render(list) {
    grid.innerHTML = '';
    const filtered = list.filter(item => {
      if (currentType === 'image') return item.url.match(/\.(jpg|jpeg|png|webp|gif)$/i);
      if (currentType === 'video') return item.url.match(/\.(mp4|mov)$/i);
      return true;
    });

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="col-span-2 text-center py-10 text-textGray">暫無作品</div>';
      return;
    }

    filtered.forEach(item => {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-xl overflow-hidden shadow-sm';

      if (item.url.match(/\.(jpg|jpeg|png|webp|gif)$/i)) {
        card.innerHTML = `<img src="${item.url}" class="w-full aspect-[4/3] object-cover">`;
      } else {
        card.innerHTML = `<video src="${item.url}" controls loop muted playsinline class="w-full aspect-[4/3]"></video>`;
      }
      grid.appendChild(card);
    });
  }

  loadList();
});
</script>
</body>
</html>
