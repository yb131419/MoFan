<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美業作品集</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <style>
    .progress{height:4px;background:#d98880;transition:0.3s;}
  </style>
</head>
<body class="bg-gray-50">

<div id="progress" class="progress w-0 fixed top-0 left-0 z-50"></div>

<div class="py-6 text-center">
  <h1 class="text-xl font-bold">莫凡美業 作品集</h1>
</div>

<div class="flex justify-center gap-2 px-4 mb-4">
  <button onclick="load('all')">全部</button>
  <button onclick="load('美甲')">美甲</button>
  <button onclick="load('美容')">美容</button>
  <button onclick="load('美睫')">美睫</button>
</div>

<div class="px-4 mb-6">
  <select id="tag" class="border p-2 w-full">
    <option value="美甲">美甲</option>
    <option value="美容">美容</option>
    <option value="美睫">美睫</option>
  </select>
  <button onclick="document.getElementById('file').click()" class="bg-pink-500 text-white p-2 w-full mt-2">
    上傳圖片/影片
  </button>
  <input type="file" id="file" accept="image/*,video/*" hidden>
</div>

<div id="list" class="px-4 grid grid-cols-2 gap-3"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxQl92tgurrQmQO137YtukSt18bfiY3OXNNBA-tTFOrEXXfUbxRDXmDc4qfiTXTeRk1bg/exec";
let currentTag = "all";
const progress = document.getElementById("progress");

document.getElementById("file").onchange = async function(e){
  const file = e.target.files[0];
  if(!file) return;
  
  progress.style.width = "50%";
  const tag = document.getElementById("tag").value;
  const name = tag + "_" + file.name;
  
  const fd = new FormData();
  fd.append("file", file);
  fd.append("name", name);

  try {
    await fetch(API, {
      method: "POST",
      body: fd,
      mode: "no-cors"
    });
  }catch(e){}

  progress.style.width = "100%";
  alert("✅ 上傳成功");
  load(currentTag);
  setTimeout(()=>progress.style.width=0,600);
};

async function load(tag){
  currentTag = tag;
  const r = await fetch(API);
  const d = await r.json();
  const list = d.list || [];
  const filter = tag==="all"?list:list.filter(i=>i.tag===tag);
  
  document.getElementById("list").innerHTML = filter.map(i=>`
    <div class="bg-white rounded-lg overflow-hidden">
      ${i.type==="image"?`<img src="${i.url}" class="w-full aspect-square">`:`<video src="${i.url}" class="w-full aspect-square"></video>`}
      <div class="p-2 text-center">${i.tag}</div>
      <button onclick="del('${i.id}')" class="bg-red-500 text-white text-xs p-1 w-full">刪除</button>
    </div>
  `).join("");
}

async function del(id){
  if(!confirm("刪除？"))return;
  await fetch(API+"?id="+id,{method:"DELETE"});
  load(currentTag);
}

load('all');
</script>
</body>
</html>
