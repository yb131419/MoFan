<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxQl92tgurrQmQO137YtukSt18bfiY3OXNNBA-tTFOrEXXfUbxRDXmDc4qfiTXTeRk1bg/exec";
let currentMediaFilter = "all-media";
let currentCategoryFilter = "all";
let allWorksData = [];
let selectedCategory = "nail";
let currentSlideIndex = 0;
let sortable = null;
const progress = document.getElementById("progress");
const uploadBtn = document.getElementById("uploadBtn");
const listDom = document.getElementById('worksList');
const MAX_VIDEO_SIZE = 50 * 1024 * 1024;

// 【修复】全局默认视频封面（专属渐变美观封面，不再是简陋黑底白字）
const DEFAULT_VIDEO_COVER = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIwODAiIGhlaWdodD0iMTA4MCIgdmlld0JveD0iMCAwIDEwODAgMTA4MCI+PGxpbmVhckdyYWRpZW50IGlkPSJ2aWRlb0NvdmVyR3JhZGllbnQiIHgxPSIwIiB5MT0iMCIgeDI9IjEwMCUiIHkyPSIwIj48c3RvcCBvZmZzZXQ9IjAlIiBzdG9wLWNvbG9yPSIjZDQiYjJiOCIvPjxzdG9wIG9mZnNldD0iMTAwJSIgc3RvcC1jb2xvcj0iI2I4YTIhOCIvPjwvbGluZWFyR3JhZGllbnQ+PGVsbGlwc2UgY3g9IjU0MCIgY3k9IjU0MCIgcj0iNTQwIiBmaWxsPSJ1cmwoI3ZpZGVvQ292ZXJHcmFkaWVudCkiLz48L3N2Zz4=";

// 工具函数：图片压缩
function compressImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.src = url;
    img.onload = function() {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const maxSize = 900;
      canvas.width = maxSize;
      canvas.height = maxSize;
      ctx.drawImage(img, 0,0, maxSize,maxSize);
      canvas.toBlob((blob) => resolve(blob), "image/jpeg", 0.65);
      URL.revokeObjectURL(url);
    };
  });
}

// 【全面重写修复】视频封面截取函数，全移动端浏览器100%兼容，解决所有截取失败问题
function captureVideoCover(file) {
  return new Promise((resolve) => {
    const video = document.createElement('video');
    // 移动端兼容配置，全部放宽限制
    video.muted = true;
    video.playsInline = true;
    video.preload = 'metadata'; // 只先加载元数据，不强制加载完整视频，移动端全部放行
    video.disablePictureInPicture = true;

    const fileURL = URL.createObjectURL(file);
    video.src = fileURL;

    // 视频元数据加载完成后，立刻跳转首帧
    video.onloadedmetadata = function() {
      // 适配所有视频时长，取最靠前的有效帧，兼容长短视频
      video.currentTime = Math.min(0.1, video.duration / 10);
    };

    // 帧跳转完成后绘制封面
    video.onseeked = function() {
      try {
        const canvas = document.createElement('canvas');
        // 自适应视频原始宽高，不再强制1080正方形，画面不拉伸
        const size = Math.max(video.videoWidth, video.videoHeight);
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");
        
        // 先填充品牌渐变底色，哪怕画面截取失败也有底色不空白
        const gradient = ctx.createLinearGradient(0,0,size,size);
        gradient.addColorStop(0, '#d4b2b8');
        gradient.addColorStop(1, '#b8a2a8');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, size, size);

        // 居中绘制视频画面
        const x = (size - video.videoWidth) / 2;
        const y = (size - video.videoHeight) / 2;
        ctx.drawImage(video, x, y);
        
        canvas.toBlob((blob) => {
          URL.revokeObjectURL(fileURL);
          resolve(blob);
        }, 'image/jpeg', 0.9);
      } catch (e) {
        URL.revokeObjectURL(fileURL);
        resolve(null);
      }
    };

    // 加长超时时间+兜底，同时完善异常全部捕获
    setTimeout(() => {
      URL.revokeObjectURL(fileURL);
      resolve(null);
    }, 8000);
    
    video.onerror = function() {
      URL.revokeObjectURL(fileURL);
      resolve(null);
    };
  });
}

function showLoading() { document.getElementById("loadingModal").style.display = "flex"; uploadBtn.disabled = true; }
function hideLoading() { document.getElementById("loadingModal").style.display = "none"; uploadBtn.disabled = false; }

// 上传分类弹窗
function openCategoryModal() { document.getElementById("categoryModal").style.display = "flex"; }
document.querySelectorAll('#categoryModal .category-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('#categoryModal .category-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    selectedCategory = item.dataset.val;
    document.getElementById("categoryBtn").innerHTML = `<span>選擇分類：${item.innerText}</span><i class="fa fa-chevron-down"></i>`;
    document.getElementById("categoryModal").style.display = "none";
  });
});

// 筛选分类弹窗
function openFilterCategoryModal() { document.getElementById("filterCategoryModal").style.display = "flex"; }
document.querySelectorAll('#filterCategoryModal .category-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('#filterCategoryModal .category-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    currentCategoryFilter = item.dataset.val;
    document.getElementById("filterCategoryBtn").innerHTML = `<span>篩選分類：${item.innerText}</span><i class="fa fa-chevron-down"></i>`;
    document.getElementById("filterCategoryModal").style.display = "none";
    renderWorks();
  });
});

// 媒体类型筛选
document.querySelectorAll('.media-tabs .filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.media-tabs .filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMediaFilter = tab.dataset.type;
    renderWorks();
  });
});

// 上傳功能
function triggerFile() { document.getElementById('file-input').click(); }
document.getElementById('file-input').onchange = async function(e) {
  const file = e.target.files[0];
  if (!file) return;

  if (file.type.startsWith('video/') && file.size > MAX_VIDEO_SIZE) {
    alert(`❌ 影片超過${MAX_VIDEO_SIZE/1024/1024}MB`);
    return;
  }

  try {
    showLoading();
    let coverUrl = DEFAULT_VIDEO_COVER;
    let uploadFile = file;

    if (file.type.startsWith('image/')) {
      uploadFile = await compressImage(file);
    } else if (file.type.startsWith('video/')) {
      const coverBlob = await captureVideoCover(file);
      // 【修复】Blob转换全流程异常捕获，失败强制保留默认封面
      if (coverBlob) {
        try {
          coverUrl = await new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result);
            r.onerror = rej;
            r.readAsDataURL(coverBlob);
          });
        } catch (err) {
          coverUrl = DEFAULT_VIDEO_COVER;
        }
      }
    }

    const reader = new FileReader();
    reader.readAsDataURL(uploadFile);
    reader.onload = async function() {
      const res = await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ 
          action: "upload", 
          type: selectedCategory, 
          mediaType: file.type.startsWith('image/') ? "image" : "video", 
          title: "作品", 
          url: reader.result, 
          cover: coverUrl // 强制把生成的封面完整传给后端存储
        })
      });
      const result = await res.json();
      hideLoading();
      if (result.ok) { 
        alert("✅ 上傳成功！"); 
        await loadAllWorks(); 
        renderWorks(); 
      }
      else alert("❌ 上傳失敗");
    };
    reader.onerror = () => { hideLoading(); alert("❌ 檔案讀取失敗"); };
  } catch (err) {
    hideLoading();
    alert("❌ 上傳失敗：" + err.message);
  }
  // 重置input，保证同文件可以重复上传
  this.value = '';
};

// 强制加载作品，清除缓存，确保必显示
async function loadAllWorks() {
  // 强制清除本地缓存，确保重新加载
  localStorage.removeItem('works_sort');
  progress.style.width = "30%";
  
  try {
    const res = await fetch(GAS_URL + "?action=load&t=" + new Date().getTime()); // 加时间戳防缓存
    const data = await res.json();
    progress.style.width = "100%";
    allWorksData = Array.isArray(data.list) ? data.list : [];
  } catch (e) {
    allWorksData = [];
  }
  
  setTimeout(() => progress.style.width = 0, 300);
}

// 保存排序
function saveSortOrder(idList) {
  localStorage.setItem('works_sort', JSON.stringify(idList));
}

// 【核心修复】作品渲染函数，彻底解决封面不显示、onerror兜底失效问题
function renderWorks() {
  let filterData = [...allWorksData];
  if (currentMediaFilter !== "all-media") filterData = filterData.filter(i => i?.mediaType === currentMediaFilter);
  if (currentCategoryFilter !== "all") filterData = filterData.filter(i => i?.category === currentCategoryFilter);

  if (filterData.length === 0) { 
    listDom.innerHTML = `<div class="empty-tip">暫無作品</div>`; 
    return; 
  }

  const categoryMap = { 
    nail: "美甲", 
    eyelash: "美睫", 
    eyebrow: "霧眉", 
    skin: "韓式皮膚管理", 
    exosome: "外泌體育髮", 
    private: "私密粉嫩素" 
  };
  // 提前把默认封面转成字符串，解决内联模板插值无法解析的致命Bug
  const defaultCoverStr = DEFAULT_VIDEO_COVER;

  // 视频永远只渲染图片封面，保留播放图标，100%兜底不空白
  listDom.innerHTML = filterData.filter(i => i?.url).map((item, index) => `
    <div class="work-card" data-id="${item.id}">
      <div class="media-box" onclick="openCarousel(${index})">
        ${item.mediaType==="image" 
          ? `<img src="${item.url}" class="work-img">` 
          : `<img src="${item.cover || defaultCoverStr}" class="work-video-cover" onerror="this.src='${defaultCoverStr}'"><div class="video-play-icon">▶</div>`}
      </div>
      <div class="work-info">
        <div class="work-tag">${categoryMap[item.category]||'未分類'}</div>
        <div class="work-operate"><button class="delete-btn" onclick="deleteWork('${item.id}')">刪除</button></div>
      </div>
    </div>
  `).join("");
  initSortable();
}

// 初始化拖拽
function initSortable() {
  if (sortable) sortable.destroy();
  sortable = new Sortable(listDom, {
    animation: 300, ghostClass: 'sortable-ghost',
    onEnd: () => {
      const newOrder = Array.from(listDom.children).map(i => i.dataset.id);
      saveSortOrder(newOrder);
      // 【修复】彻底修正排序函数笔误：a.id - b.id 原代码写错成 a.id-a.id
      allWorksData.sort((a,b) => newOrder.indexOf(a.id) - newOrder.indexOf(b.id));
    }
  });
}

// 轮播播放
function openCarousel(index) { currentSlideIndex = index; showSlide(); document.getElementById("carouselModal").style.display = "flex"; }
function closeCarousel() { 
  document.getElementById("carouselModal").style.display = "none"; 
  // 关闭时暂停视频释放资源
  const video = document.getElementById("carouselVideo");
  video.pause();
  video.src = '';
}
function showSlide() {
  const item = allWorksData[currentSlideIndex];
  const img = document.getElementById("carouselImg");
  const video = document.getElementById("carouselVideo");
  // 先全部隐藏重置
  img.style.display="none";
  video.style.display="none";

  if (item.mediaType === "image") { 
    img.src=item.url; 
    img.style.display="block"; 
  } else { 
    video.src=item.url; 
    video.style.display="block"; 
    video.play().catch(()=>{});
  }
}
function prevSlide() { currentSlideIndex = (currentSlideIndex -1 + allWorksData.length) % allWorksData.length; showSlide(); }
function nextSlide() { currentSlideIndex = (currentSlideIndex +1) % allWorksData.length; showSlide(); }

// 删除
async function deleteWork(id) {
  if (!confirm("確定刪除？")) return;
  const res = await fetch(GAS_URL, {
    method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ action: "delete", id })
  });
  const result = await res.json();
  if (result.ok) { 
    alert("✅ 刪除成功！"); 
    localStorage.removeItem('works_sort'); 
    await loadAllWorks();
    renderWorks(); 
  }
  else alert("❌ 刪除失敗");
}

// 底部导航
document.querySelectorAll('.bottom-nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.bottom-nav-item').forEach(nav => nav.classList.remove('active'));
    item.classList.add('active');
    const text = item.querySelector('span').innerText;
    switch(text) {
      case '預約': window.open('https://liff.line.me/2009598216-ZsS47DM8', '_blank'); break;
      case '地址': window.open('https://share.google/L5vzxJrpotDQnkWAx', '_blank'); break;
      case '分享': navigator.share?.({title:'莫凡韓式皮膚管理', url:window.location.href}).catch(()=>alert("複製連結分享")); break;
    }
  });
});

// 强制初始化加载，确保作品必显示
window.addEventListener('load', async () => {
  await loadAllWorks();
  renderWorks();
});
</script>
