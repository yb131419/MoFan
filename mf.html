<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高質感美業作品集</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    }

    body{
        background-color: #F8F6F4;
        color: #444;
        padding-bottom: 100px;
    }

    /* 頂部高質感設計 */
    header{
        background: linear-gradient(135deg, #E3DCD2, #CCBCBC);
        padding: 50px 20px;
        text-align:center;
        border-radius: 0 0 50px 50px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        margin-bottom: 50px;
    }

    header h1{
        font-size: 26px;
        font-weight: 600;
        color: #222;
        margin-bottom: 10px;
    }

    header p{
        font-size: 16px;
        color: #666;
        letter-spacing: 1px;
    }

    /* 網頁容器 */
    .container{
        max-width: 1000px;
        margin: 0 auto;
        padding: 0 20px;
    }

    /* 區塊標題 */
    .section{
        margin-bottom: 50px;
    }

    .section h2{
        font-size: 20px;
        font-weight: 500;
        color: #222;
        margin-bottom: 25px;
        padding-left: 15px;
        border-left: 4px solid #CCBCBC;
    }

    /* 照片/影片 網格 */
    .grid{
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 18px;
    }

    /* 高質感卡片 */
    .card{
        background: #fff;
        border-radius: 22px;
        overflow: hidden;
        box-shadow: 0 8px 20px rgba(0,0,0,0.04);
        transition: all 0.3s ease;
    }

    .card:hover{
        transform: translateY(-6px);
        box-shadow: 0 12px 25px rgba(0,0,0,0.08);
    }

    .card img, .card video{
        width: 100%;
        height: 200px;
        object-fit: cover;
        display:block;
    }

    /* 卡片文字 */
    .info{
        padding: 12px 10px;
        text-align:center;
    }

    .info .title{
        font-size: 14px;
        font-weight: 500;
        color: #333;
        margin-bottom: 4px;
    }

    .info .desc{
        font-size: 12px;
        color: #888;
    }

    /* 聯絡我們 高質感區塊 */
    .contact{
        background: #fff;
        padding: 35px 25px;
        border-radius: 25px;
        text-align:center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        border: 1px solid #eee;
        margin-top: 20px;
    }

    .contact h3{
        font-size: 19px;
        font-weight: 500;
        color: #222;
        margin-bottom: 15px;
    }

    .contact p{
        font-size: 15px;
        color: #555;
        line-height: 1.7;
    }

</style>
</head>

<body>

<header>
    <h1>高質感美業作品集</h1>
    <p>美甲・美睫・紋繡・霧眉・美容｜專業・精緻・質感</p>
</header>

<div class="container">

<!-- ====================== 照片區 ====================== -->
<section class="section">
    <h2>📸 質感作品</h2>
    <div class="grid">

        <!-- 照片 1 -->
        <div class="card">
            <img src="照片1.jpg" alt="作品">
            <div class="info">
                <div class="title">美甲</div>
                <div class="desc">質感設計</div>
            </div>
        </div>

        <!-- 照片 2 -->
        <div class="card">
            <img src="照片2.jpg" alt="作品">
            <div class="info">
                <div class="title">美睫</div>
                <div class="desc">自然精緻</div>
            </div>
        </div>

        <!-- 照片 3 -->
        <div class="card">
            <img src="照片3.jpg" alt="作品">
            <div class="info">
                <div class="title">霧眉</div>
                <div class="desc">高級霧感</div>
            </div>
        </div>

        <!-- 照片 4 -->
        <div class="card">
            <img src="照片4.jpg" alt="作品">
            <div class="info">
                <div class="title">紋繡</div>
                <div class="desc">自然持久</div>
            </div>
        </div>

        <!-- 照片 5 -->
        <div class="card">
            <img src="照片5.jpg" alt="作品">
            <div class="info">
                <div class="title">美容</div>
                <div class="desc">肌膚管理</div>
            </div>
        </div>

        <!-- 要繼續加照片 → 複製上面這一組即可 -->

    </div>
</section>

<!-- ====================== 影片區 ====================== -->
<section class="section">
    <h2>🎞 操作展示</h2>
    <div class="grid">

        <!-- 影片 1 -->
        <div class="card">
            <video controls src="影片1.mp4"></video>
            <div class="info">
                <div class="title">美甲操作</div>
                <div class="desc">專業流程</div>
            </div>
        </div>

        <!-- 影片 2 -->
        <div class="card">
            <video controls src="影片2.mp4"></video>
            <div class="info">
                <div class="title">美睫成果</div>
                <div class="desc">質感呈現</div>
            </div>
        </div>

        <!-- 要繼續加影片 → 複製上面這一組即可 -->

    </div>
</section>

<!-- ====================== 聯絡我們 ====================== -->
<section class="contact">
    <h3>預約諮詢</h3>
    <p>LINE：你的ID<br>營業時間：10:00-20:00<br>服務項目：美甲・美睫・紋繡・霧眉・美容</p>
</section>

</div>
</body>
</html>
