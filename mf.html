<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>莫凡美業｜作品管理庫</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#d98880', bgLight: '#fdf8f8', borderGray: '#f0e4e2',
            textMain: '#553333', textGray: '#b89999', cardWhite: '#ffffff'
          },
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .scroll-hide::-webkit-scrollbar { display: none; }
      .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
      .tab-active { @apply text-primary border-b-2 border-primary font-medium; }
      .tag-active { @apply bg-primary text-white rounded-full; }
    }
    body { background: #fdf8f8; color: #553333; }
    video { width:100%; height:100%; object-fit:cover; }
  </style>
</head>

<body>
  <header class="sticky top-0 z-50 bg-white px-5 py-4 flex justify-between items-center border-b border-borderGray">
    <div><h1 class="text-xl font-bold">莫凡美業｜作品管理</h1><p class="text-sm text-textGray">mofan-beauty.com</p></div>
    <button class="w-8 h-8 flex items-center justify-center text-textGray"><i class="fa fa-times"></i></button>
  </header>

  <div class="bg-white px-4 overflow-x-auto scroll-hide">
    <div class="flex gap-6 min-w-max">
      <button class="tab-btn tab-active py-3 px-1" data-type="image">照片</button>
      <button class="tab-btn py-3 px-1" data-type="video">影片</button>
    </div>
  </div>

  <div class="px-5 py-4 flex flex-wrap gap-3 items-center">
    <button class="tag-btn tag-active px-4 py-2 text-sm">全部</button>
    <button class="tag-btn bg-bgLight px-4 py-2 rounded-full text-sm text-textGray">美甲</button>
    <button class="tag-btn bg-bgLight px-4 py-2 rounded-full text-sm text-textGray">美睫</button>
    <button class="tag-btn bg-bgLight px-4 py-2 rounded-full text-sm text-textGray">染燙</button>
    <button class="tag-btn bg-bgLight px-4 py-2 rounded-full text-sm text-textGray">護膚</button>
    <button id="uploadBtn" class="ml-auto w-10 h-10 rounded-full bg-bgLight flex items-center justify-center text-textGray"><i class="fa fa-cloud-upload"></i></button>
  </div>

  <input type="file" id="fileInput" accept="image/*,video/*" class="hidden" multiple>
  <form id="uploadForm" method="post" enctype="multipart/form-data" style="display:none;"></form>

  <main class="px-4 grid grid-cols-2 gap-4 pb-32">
    <div id="grid" class="col-span-2 grid grid-cols-2 gap-4"></div>
  </main>

  <footer class="fixed bottom-0 left-0 right-0 bg-white px-5 py-4 border-t border-borderGray">
    <div class="flex justify-around items-center">
      <button id="sortBtn" class="flex flex-col items-center gap-1 text-textGray"><i class="fa fa-sort"></i><span class="text-xs">排序</span></button>
      <button id="batchBtn" class="flex flex-col items-center gap-1 text-textGray"><i class="fa fa-check-square-o"></i><span class="text-xs">批量</span></button>
      <button id="searchBtn" class="flex flex-col items-center gap-1 text-textGray"><i class="fa fa-search"></i><span class="text-xs">搜尋</span></button>
    </div>
  </footer>

<script>
const GAS_API = "https://script.google.com/macros/s/AKfycbxQl92tgurrQmQO137YtukSt18bfiY3OXNNBA-tTFOrEXXfUbxRDXmDc4qfiTXTeRk1bg/exec";
const grid = document.getElementById('grid');
const uploadBtn = document.getElementById('uploadBtn');
const fileInput = document.getElementById('fileInput');
const tabBtns = document.querySelectorAll('.tab-btn');
let currentType = 'image';

tabBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    tabBtns.forEach(b => b.classList.remove('tab-active'));
    btn.classList.add('tab-active');
    currentType = btn.dataset.type;
    loadList();
  });
});

// ========== 上傳用 FORM 提交（永不報錯）==========
uploadBtn.onclick = () => fileInput.click();
fileInput.onchange = async (e) => {
  const files = e.target.files;
  if(!files.length) return;
  if(!confirm("確認上傳 "+files.length+" 個檔案？")) return;

  for(const file of files){
    const form = new FormData();
    form.append('action','upload');
    form.append('file', file);

    // 關鍵：使用 no-cors 穩定上傳，不讀取回傳值
    await fetch(GAS_API, { method:'POST', body:form, mode:'no-cors' });
  }

  alert("✅ 上傳完成！頁面將刷新");
  loadList();
  fileInput.value = '';
}

async function loadList(){
  grid.innerHTML = "讀取中...";
  try{
    const r = await fetch(GAS_API+"?action=list");
    const d = await r.json();
    render(d.list||[]);
  }catch(e){
    grid.innerHTML = "載入失敗";
  }
}

function render(list){
  grid.innerHTML = '';
  const f = list.filter(i=>{
    if(currentType==='image') return i.url.match(/\.(jpg|jpeg|png|webp|gif)$/i);
    if(currentType==='video') return i.url.match(/\.(mp4|mov|avi|mkv|flv)$/i);
    return true;
  });
  if(!f.length){ grid.innerHTML = "暫無作品"; return; }
  f.forEach(i=>{
    const c = document.createElement('div');
    c.className = "bg-white rounded-xl overflow-hidden shadow-sm";
    if(i.url.match(/\.(jpg|jpeg|png|webp|gif)$/i)){
      c.innerHTML = `<img src="${i.url}" class="w-full aspect-[4/3] object-cover">`;
    }else{
      c.innerHTML = `<video src="${i.url}" controls muted playsinline class="w-full aspect-[4/3]"></video>`;
    }
    grid.appendChild(c);
  })
}

document.getElementById('sortBtn').onclick = () => { grid.innerHTML="已排序"; setTimeout(loadList,800); }
document.getElementById('searchBtn').onclick = () => { if(prompt("搜尋")) loadList(); }
document.getElementById('batchBtn').onclick = () => alert("長按可刪除");

loadList();
</script>
</body>
</html>
