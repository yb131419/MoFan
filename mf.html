<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>莫凡韓式皮膚管理 | 作品集</title>
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    * {
      margin: 0;
      padding: 0; 
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }
    body {
      background: #fdfbfc;
      font-family: 'PingFang SC', 'Helvetica Neue', 'Noto Sans TC', sans-serif;
      padding-bottom: 120px;
      color: #2a2a2a;
    }

    .loader-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(253,251,252,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    .loader-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .loader-ring {
      width: 50px;
      height: 50px;
      border: 2px solid transparent;
      border-top: 2px solid #d4b2b8;
      border-right: 2px solid #b8929a;
      border-radius: 50%;
      animation: loader-spin 1.2s linear infinite;
    }
    .loader-text {
      font-size: 15px;
      color: #b8929a;
      letter-spacing: 2px;
      font-weight: 300;
    }
    @keyframes loader-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .page-header {
      padding: 60px 20px 40px;
      text-align: center;
      position: relative;
    }
    .page-header::before,
    .page-header::after {
      content: "";
      display: block;
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, #d4b2b8, #e8c8d0);
      margin: 0 auto 12px;
      opacity: 0.8;
    }
    .page-title {
      font-size: 32px;
      font-weight: 600;
      background: linear-gradient(135deg, #b8929a, #d4b2b8, #a88890);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      letter-spacing: 3px;
      box-shadow: 0 2px 4px rgba(212,178,184,0.1);
    }
    .page-subtitle {
      font-size: 13px;
      color: #b0b0b0;
      letter-spacing: 2px;
      font-weight: 300;
      position: relative;
      padding: 0 15px;
    }
    .page-subtitle::before,
    .page-subtitle::after {
      content: "·";
      position: absolute;
      top: 0;
      color: #d4b2b8;
    }
    .page-subtitle::before { left: 0; }
    .page-subtitle::after { right: 0; }

    .mode-switch {
      display: none;
      justify-content: center;
      gap: 10px;
      padding: 0 20px 24px;
    }
    .mode-btn {
      padding: 10px 20px;
      border-radius: 100px;
      border: 1px solid #f0e9eb;
      background: #ffffff;
      color: #888;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .mode-btn.active {
      background: linear-gradient(135deg, #d4b2b8, #b8a2a8);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 12px rgba(212, 178, 184, 0.15);
    }

    .filter-nav {
      padding: 0 20px 30px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .tab-group {
      display: flex;
      justify-content: center;
      gap: 10px;
      overflow-x: auto;
      padding: 4px;
    }
    .tab-group::-webkit-scrollbar { display: none; }
    .filter-tab {
      padding: 12px 24px;
      border-radius: 100px;
      background: #ffffff;
      border: 1px solid #f0e9eb;
      color: #888;
      font-size: 14px;
      font-weight: 400;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .filter-tab.active {
      background: linear-gradient(135deg, #d4b2b8, #b8a2a8);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 12px rgba(212, 178, 184, 0.15);
    }
    .filter-select-btn {
      width: 100%;
      padding: 16px;
      border: 1px solid #f0e9eb;
      border-radius: 20px;
      background: #fdfbfc;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #555;
    }

    /* 作品數量統計列 */
    .works-count {
      text-align: center;
      font-size: 12px;
      color: #c4b2b6;
      letter-spacing: 1.5px;
      padding-bottom: 18px;
      font-weight: 300;
    }
    .works-count b {
      color: #b8929a;
      font-weight: 600;
      font-size: 14px;
      margin: 0 3px;
    }

    .upload-area {
      padding: 0 20px 30px;
      display: none;
    }
    .upload-card {
      background: #fff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.02);
      border: 1px solid #f8f3f5;
    }
    .category-select-btn {
      width: 100%;
      padding: 16px;
      border: 1px solid #f0e9eb;
      border-radius: 20px;
      background: #fdfbfc;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      color: #555;
    }
    .upload-btn {
      width: 100%;
      padding: 17px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(135deg, #d4b2b8, #b8a2a8);
      color: #fff;
      font-size: 15px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .upload-btn:disabled {
      background: #f0f0f0;
      cursor: not-allowed;
    }
    #file-input { display: none; }

    /* ==============================
       🎨 作品卡片 全新升級版
       ============================== */
    .works-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 0 20px;
    }
    .work-card {
      background: #ffffff;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(212, 178, 184, 0.14);
      box-shadow:
        0 1px 2px rgba(140, 107, 115, 0.04),
        0 8px 24px rgba(140, 107, 115, 0.07);
      transition: transform 0.35s cubic-bezier(0.34, 1.4, 0.64, 1), box-shadow 0.35s ease;
      cursor: default;
      opacity: 0;
      transform: translateY(14px);
      animation: card-enter 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    /* 進場動畫：交錯漸入，前12張依序延遲，之後統一 */
    .work-card:nth-child(1)  { animation-delay: 0.02s; }
    .work-card:nth-child(2)  { animation-delay: 0.07s; }
    .work-card:nth-child(3)  { animation-delay: 0.12s; }
    .work-card:nth-child(4)  { animation-delay: 0.17s; }
    .work-card:nth-child(5)  { animation-delay: 0.22s; }
    .work-card:nth-child(6)  { animation-delay: 0.27s; }
    .work-card:nth-child(7)  { animation-delay: 0.32s; }
    .work-card:nth-child(8)  { animation-delay: 0.37s; }
    .work-card:nth-child(9)  { animation-delay: 0.42s; }
    .work-card:nth-child(10) { animation-delay: 0.47s; }
    .work-card:nth-child(11) { animation-delay: 0.52s; }
    .work-card:nth-child(12) { animation-delay: 0.57s; }
    @keyframes card-enter {
      to { opacity: 1; transform: translateY(0); }
    }
    /* 按壓回饋（手機上點擊時的微縮效果） */
    .work-card:active {
      transform: scale(0.97);
      box-shadow:
        0 1px 2px rgba(140, 107, 115, 0.05),
        0 4px 12px rgba(140, 107, 115, 0.09);
    }

    .media-box {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: #f2ecee;
    }
    .work-img, .work-video-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.4s ease, transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .work-img.loaded, .work-video-cover.loaded {
      opacity: 1;
    }
    .media-box:active .work-img,
    .media-box:active .work-video-cover {
      transform: scale(1.05);
    }

    /* 影片時長角標（右上角小標示） */
    .card-type-icon {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(42, 42, 42, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 10px;
      z-index: 2;
      pointer-events: none;
    }

    /* 圖片底部漸層薄紗（讓標籤與圖片過渡更柔和） */
    .media-box::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 34%;
      background: linear-gradient(to top, rgba(140, 107, 115, 0.16), transparent);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .media-box.media-loaded::after {
      opacity: 1;
    }

    .img-skeleton {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(100deg, #f2ecee 30%, #faf6f7 50%, #f2ecee 70%);
      background-size: 200% 100%;
      animation: skeleton-shine 1.4s ease-in-out infinite;
    }
    .img-skeleton::after {
      content: "\2740"; /* 花朵符號，讓等待畫面更有品牌感 */
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 22px;
      color: rgba(212, 178, 184, 0.5);
    }
    .img-skeleton.hidden { display: none; }
    @keyframes skeleton-shine {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .video-play-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 52px;
      height: 52px;
      background: rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      padding-left: 4px; /* 視覺置中：播放三角形往右偏一點 */
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.22);
      z-index: 2;
    }

    /* ==============================
       🎨 卡片資訊區 全新升級版：
       淡玫瑰漸層底 + 兩側花瓣飾線 + 漸層字色
       ============================== */
    .work-info {
      padding: 14px 14px 15px;
      text-align: center;
      position: relative;
      background: linear-gradient(180deg, #ffffff 0%, #fdf7f8 100%);
      border-top: 1px solid rgba(212, 178, 184, 0.14);
    }
    .work-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #a88890, #c99aa3, #8c6b73);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: #9d848b; /* 不支援漸層字的舊瀏覽器備援色 */
    }
    /* 兩側精緻飾線：由中心向外淡出的髮絲線 */
    .work-tag::before,
    .work-tag::after {
      content: "";
      display: inline-block;
      width: 16px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #d4b2b8);
      flex-shrink: 0;
    }
    .work-tag::after {
      background: linear-gradient(90deg, #d4b2b8, transparent);
    }
    .work-operate { display: flex; margin-top: 10px; }

    /* 刪除按鈕：改為柔和外框樣式，避免搶走作品風采 */
    .delete-btn {
      width: 100%;
      padding: 8px 0;
      border-radius: 12px;
      border: 1px solid rgba(224, 130, 130, 0.45);
      background: rgba(224, 130, 130, 0.07);
      color: #cf7f7f;
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      display: none;
      transition: all 0.25s ease;
    }
    .delete-btn:active {
      background: #e0a8a8;
      color: #fff;
      border-color: transparent;
    }

    .empty-tip {
      text-align: center;
      padding: 80px 20px;
      color: #d0d0d0;
      font-size: 14px;
      grid-column: span 2;
    }
    .empty-tip i {
      display: block;
      font-size: 34px;
      margin-bottom: 14px;
      color: rgba(212, 178, 184, 0.55);
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      display: none;
      align-items: center !important;
      justify-content: center !important;
      padding: 20px;
    }
    .modal-content {
      background: #fff;
      width: 100%;
      max-width: 320px;
      border-radius: 28px;
      padding: 30px;
      text-align: center;
      margin: 0 auto;
    }
    .category-item {
      padding: 15px; margin: 8px 0; border-radius: 18px;
      background: #fdfbfc; cursor: pointer; font-size: 15px; color: #666;
    }
    .category-item.active { background: linear-gradient(135deg, #d4b2b8, #b8a2a8); color: #fff; }
    .loading-modal .loading-text { margin-top: 12px; font-size: 14px; color: #666; }
    .loading-modal .loader {
      width: 40px; height: 40px; border: 4px solid #f0e9eb;
      border-top: 4px solid #d4b2b8; border-radius: 50%;
      animation: spin 1s linear infinite; margin: 0 auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    #carouselModal { background: rgba(0,0,0,0.95); }
    .carousel-content { position: relative; width: 92%; max-width: 500px; text-align: center; margin: 0 auto; }
    .carousel-media { width: 100%; max-height: 80vh; object-fit: contain; border-radius: 12px; }
    .carousel-loading { color: #fff; font-size: 14px; letter-spacing: 1px; }
    .carousel-counter {
      position: absolute;
      top: -38px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.8);
      font-size: 13px;
      letter-spacing: 2px;
    }
    .carousel-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,250,0.1); color: #fff; border: none;
      width: 48px; height: 48px; border-radius: 50%; font-size: 18px; cursor: pointer; z-index: 1001;
    }
    .carousel-prev { left: 10px; }
    .carousel-next { right: 10px; }
    .carousel-close {
      position: absolute; top: 25px; right: 25px; background: transparent;
      color: #fff; border: none; font-size: 36px; cursor: pointer;
    }

    .bottom-nav {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      width: 92%; max-width: 500px; background: #ffffff;
      border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 12px 8px; display: flex; z-index: 99;
    }
    .bottom-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 6px; color: #777; font-size: 12px;
      cursor: pointer; transition: all 0.3s ease; border-radius: 16px; padding: 8px 0;
    }
    .bottom-nav-item.active {
      color: #8c6b73;
      background: linear-gradient(135deg, rgba(184,146,154,0.28), rgba(168,136,144,0.28));
    }
    .bottom-nav-item i { font-size: 18px; }
  </style>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<div class="loader-overlay" id="loaderOverlay">
  <div class="loader-container">
    <div class="loader-ring"></div>
    <div class="loader-text">作品載入中</div>
  </div>
</div>

<div class="page-header">
  <h1 class="page-title">莫凡<br>韓式皮膚管理</h1>
  <p class="page-subtitle">Beauty Portfolio</p>
</div>

<div class="mode-switch" id="modeSwitch">
  <button class="mode-btn active" id="modeUserBtn" onclick="setViewMode('user')">
    <i class="fa fa-eye"></i> 使用介面
  </button>
  <button class="mode-btn" id="modeAdminBtn" onclick="setViewMode('admin')">
    <i class="fa fa-cog"></i> 管理介面
  </button>
</div>

<div class="filter-nav">
  <div class="tab-group media-tabs">
    <div class="filter-tab active" data-type="all-media">全部</div>
    <div class="filter-tab" data-type="image">照片</div>
    <div class="filter-tab" data-type="video">影片</div>
  </div>
  <button class="filter-select-btn" id="filterCategoryBtn" onclick="openFilterCategoryModal()">
    <span>篩選作品分類：全部</span><i class="fa fa-chevron-down"></i>
  </button>
</div>

<div class="upload-area" id="uploadArea">
  <div class="upload-card">
    <button class="category-select-btn" id="categoryBtn" onclick="openCategoryModal()">
      <span>選擇上傳分類：美甲</span><i class="fa fa-chevron-down"></i>
    </button>
    <button class="upload-btn" id="uploadBtn" onclick="triggerFile()">
      <i class="fa fa-plus"></i> 批量上傳作品（多圖/多影片）
    </button>
    <input type="file" id="file-input" accept="image/*,video/*" multiple>
  </div>
</div>

<div class="works-count" id="worksCount"></div>
<p class="page-subtitle" style="text-align: center; margin: 0 0 20px;">點圖可放大</p>
<div class="works-grid" id="worksList"></div>

<div class="modal" id="categoryModal">
  <div class="modal-content">
    <h3 style="margin-bottom:16px; font-size:16px;">選擇作品分類</h3>
    <div class="category-item active" data-val="nail">美甲</div>
    <div class="category-item" data-val="eyelash">美睫</div>
    <div class="category-item" data-val="eyebrow">霧眉/霧唇</div>
    <div class="category-item" data-val="skin">韓式皮膚管理</div>
    <div class="category-item" data-val="exosome">外泌體育髮</div>
    <div class="category-item" data-val="private">私密粉嫩術</div>
  </div>
</div>

<div class="modal" id="filterCategoryModal">
  <div class="modal-content">
    <h3 style="margin-bottom:16px; font-size:16px;">篩選作品分類</h3>
    <div class="category-item active" data-val="all">全部</div>
    <div class="category-item" data-val="nail">美甲</div>
    <div class="category-item" data-val="eyelash">美睫</div>
    <div class="category-item" data-val="eyebrow">霧眉/霧唇</div>
    <div class="category-item" data-val="skin">韓式皮膚管理</div>
    <div class="category-item" data-val="exosome">外泌體育髮</div>
    <div class="category-item" data-val="private">私密粉嫩術</div>
  </div>
</div>

<div class="modal loading-modal" id="loadingModal">
  <div class="modal-content"><div class="loader"></div><div class="loading-text">批量上傳中，請稍候...</div></div>
</div>

<div class="modal" id="carouselModal">
  <button class="carousel-close" onclick="closeCarousel()">&times;</button>
  <button class="carousel-btn carousel-prev" onclick="prevSlide()"><i class="fa fa-chevron-left"></i></button>
  <div class="carousel-content">
    <div class="carousel-counter" id="carouselCounter"></div>
    <div class="carousel-loading" id="carouselLoading" style="display:none;">載入中...</div>
    <img id="carouselImg" class="carousel-media" style="display:none;">
    <video id="carouselVideo" class="carousel-media" controls style="display:none;"></video>
  </div>
  <button class="carousel-btn carousel-next" onclick="nextSlide()"><i class="fa fa-chevron-right"></i></button>
</div>

<div class="bottom-nav">
  <div class="bottom-nav-item active" id="navAddress">
    <i class="fa fa-map-marker"></i><span>地址</span>
  </div>
  <div class="bottom-nav-item" id="navShare">
    <i class="fa fa-share-alt"></i><span>分享</span>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxQl92tgurrQmQO137YtukSt18bfiY3OXNNBA-tTFOrEXXfUbxRDXmDc4qfiTXTeRk1bg/exec";
const CONFIG = {
  LIFF_ID: "2009598216-hGqsxRN9"
};

let currentMediaFilter = "all-media";
let currentCategoryFilter = "all";
let allWorksData = [];
let filteredWorksData = [];
let selectedCategory = "nail";
let currentSlideIndex = 0;
const uploadBtn = document.getElementById("uploadBtn");
const listDom = document.getElementById('worksList');
const loaderOverlay = document.getElementById('loaderOverlay');
const uploadArea = document.getElementById('uploadArea');
const MAX_VIDEO_SIZE = 50 * 1024 * 1024;

let LINE_USER_ID = "guest_" + Date.now();
let LINE_USER_NAME = "LINE使用者";
let isAdmin = false;

// 'user'＝使用介面（一般顧客畫面）、'admin'＝管理介面（可上傳/刪除）
let viewMode = 'user';

const categoryMap = { nail: "美甲", eyelash: "美睫", eyebrow: "霧眉/霧唇", skin: "韓式皮膚管理", exosome: "外泌體育髮", private: "私密粉嫩術" };
const DEFAULT_VIDEO_COVER = "https://picsum.photos/id/1048/1080/1080";

const imageDataCache = new Map();
let gridObserver = null;

function checkAdminByBackend() {
  const encodedId = encodeURIComponent(LINE_USER_ID);
  const script = document.createElement('script');
  script.src = `${GAS_URL}?action=checkAdmin&lineId=${encodedId}&callback=onAdminCheck&_=${Date.now()}`;
  document.body.appendChild(script);
}

window.onAdminCheck = function(res) {
  isAdmin = res?.isAdmin === true;
  if (isAdmin) {
    document.getElementById('modeSwitch').style.display = 'flex';
    console.log("✅ 管理员登录成功");
  } else {
    console.log("❌ 非管理员");
  }
  applyViewMode();
};

function setViewMode(mode) {
  if (!isAdmin) return;
  viewMode = mode;
  document.getElementById('modeUserBtn').classList.toggle('active', mode === 'user');
  document.getElementById('modeAdminBtn').classList.toggle('active', mode === 'admin');
  applyViewMode();
}

function applyViewMode() {
  const showAdminUI = isAdmin && viewMode === 'admin';
  uploadArea.style.display = showAdminUI ? 'block' : 'none';
  renderWorks();
}

async function initLiff() {
  try {
    await liff.init({ liffId: CONFIG.LIFF_ID });
    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }
    const p = await liff.getProfile();
    LINE_USER_ID = p.userId;
    LINE_USER_NAME = p.displayName;
  } catch (e) {
    console.log("LIFF 初始化完成");
  } finally {
    checkAdminByBackend();
  }
}

function blobToBase64(blob) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(blob);
  });
}

// 置中裁切（cover）後再縮放，維持原始比例、避免變形
function compressImage(file, maxSize, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.src = url;
    img.onload = function() {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = maxSize;
      canvas.height = maxSize;

      const srcW = img.naturalWidth;
      const srcH = img.naturalHeight;
      const srcRatio = srcW / srcH;

      let sx, sy, sw, sh;
      if (srcRatio > 1) {
        sh = srcH; sw = srcH; sx = (srcW - sw) / 2; sy = 0;
      } else {
        sw = srcW; sh = srcW; sx = 0; sy = (srcH - sh) / 2;
      }

      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, maxSize, maxSize);
      canvas.toBlob((blob) => resolve(blob), "image/jpeg", quality);
      URL.revokeObjectURL(url);
    };
  });
}

// 確保壓縮後的圖片絕對塞得進 Google Sheets 單一儲存格 50,000 字元上限
const SHEET_CELL_SAFE_LIMIT = 48000;
async function compressImageSafe(file) {
  let maxSize = 1080;
  let quality = 0.75;
  let blob = await compressImage(file, maxSize, quality);
  let base64 = await blobToBase64(blob);
  let attempts = 0;

  while (base64.length > SHEET_CELL_SAFE_LIMIT && attempts < 6) {
    if (quality > 0.35) {
      quality = Math.max(0.35, quality - 0.1);
    } else {
      maxSize = Math.round(maxSize * 0.8);
    }
    blob = await compressImage(file, maxSize, quality);
    base64 = await blobToBase64(blob);
    attempts++;
  }

  return { base64, tooLarge: base64.length > SHEET_CELL_SAFE_LIMIT };
}

function showLoading() { document.getElementById("loadingModal").style.display = "flex"; uploadBtn.disabled = true; }
function hideLoading() { document.getElementById("loadingModal").style.display = "none"; uploadBtn.disabled = false; }

function openCategoryModal() { 
  document.getElementById("categoryModal").style.display = "flex"; 
}
document.querySelectorAll('#categoryModal .category-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('#categoryModal .category-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    selectedCategory = item.dataset.val;
    document.getElementById("categoryBtn").innerHTML = `<span>選擇分類：${item.innerText}</span><i class="fa fa-chevron-down"></i>`;
    document.getElementById("categoryModal").style.display = "none";
  });
});

function openFilterCategoryModal() { 
  document.getElementById("filterCategoryModal").style.display = "flex"; 
}
document.querySelectorAll('#filterCategoryModal .category-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('#filterCategoryModal .category-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    currentCategoryFilter = item.dataset.val;
    document.getElementById("filterCategoryBtn").innerHTML = `<span>篩選分類：${item.innerText}</span><i class="fa fa-chevron-down"></i>`;
    document.getElementById("filterCategoryModal").style.display = "none";
    renderWorks();
  });
});

document.querySelectorAll('.media-tabs .filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.media-tabs .filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMediaFilter = tab.dataset.type;
    renderWorks();
  });
});

function triggerFile() { 
  document.getElementById('file-input').click(); 
}

document.getElementById('file-input').onchange = async function(e) {
  const files = Array.from(e.target.files);
  if (files.length === 0) return;

  const validFiles = files.filter(file => {
    if (file.type.startsWith('video/') && file.size > MAX_VIDEO_SIZE) {
      alert(`❌ ${file.name} 超過50MB`);
      return false;
    }
    return true;
  });

  if (validFiles.length === 0) { this.value = ''; return; }

  try {
    showLoading();
    let successCount = 0;
    let tooLargeCount = 0;
    const categoryName = categoryMap[selectedCategory] || '未分類';

    for (let file of validFiles) {
      try {
        const isImage = file.type.startsWith('image/');
        let base64;

        if (isImage) {
          const result = await compressImageSafe(file);
          if (result.tooLarge) {
            tooLargeCount++;
            continue;
          }
          base64 = result.base64;
        } else {
          base64 = await blobToBase64(file);
        }

        const res = await fetch(GAS_URL, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({
            action: "upload",
            lineId: LINE_USER_ID,
            type: selectedCategory,
            mediaType: isImage ? "image" : "video",
            title: `${categoryName} - 作品`,
            url: base64
          })
        });

        const result = await res.json();
        if (result.ok) successCount++;
        else if (result.error === "image_too_large") tooLargeCount++;
      } catch (err) {}
    }

    hideLoading();
    let msg = `✅ 上傳完成：${successCount}/${validFiles.length} 個`;
    if (tooLargeCount > 0) msg += `\n⚠️ ${tooLargeCount} 張圖片壓縮後仍過大，已略過`;
    alert(msg);
    await loadAllWorks();
    renderWorks();
  } catch (err) {
    hideLoading();
    alert("❌ 上傳失敗");
  }
  this.value = '';
};

async function loadAllWorks() {
  try {
    const res = await fetch(GAS_URL + "?t=" + new Date().getTime());
    const data = await res.json();
    allWorksData = Array.isArray(data.list) ? data.list : [];
    allWorksData.reverse();
  } catch (e) { 
    allWorksData = []; 
  }
}

async function fetchImageContent(id) {
  if (imageDataCache.has(id)) return imageDataCache.get(id);
  try {
    const res = await fetch(`${GAS_URL}?action=getImage&id=${encodeURIComponent(id)}&t=${Date.now()}`);
    const data = await res.json();
    const url = data.url || "";
    imageDataCache.set(id, url);
    return url;
  } catch (e) {
    return "";
  }
}

function setupLazyImageObserver() {
  if (gridObserver) gridObserver.disconnect();

  gridObserver = new IntersectionObserver((entries, observer) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const el = entry.target;
      observer.unobserve(el);
      const id = el.dataset.id;
      fetchImageContent(id).then(url => {
        if (!url) return;
        el.src = url;
        el.classList.add('loaded');
        const box = el.closest('.media-box');
        if (box) box.classList.add('media-loaded');
        const skeleton = el.parentElement.querySelector('.img-skeleton');
        if (skeleton) skeleton.classList.add('hidden');
      });
    });
  }, { rootMargin: "200px 0px" });

  document.querySelectorAll('.lazy-img').forEach(el => gridObserver.observe(el));
}

// 更新作品數量統計列（依目前篩選結果顯示）
function updateWorksCount() {
  const countDom = document.getElementById('worksCount');
  const total = filteredWorksData.length;
  if (total === 0) {
    countDom.innerHTML = "";
    return;
  }
  const imgCount = filteredWorksData.filter(i => i.mediaType === "image").length;
  const vidCount = total - imgCount;
  let parts = [];
  if (imgCount > 0) parts.push(`照片<b>${imgCount}</b>`);
  if (vidCount > 0) parts.push(`影片<b>${vidCount}</b>`);
  countDom.innerHTML = `— 共<b>${total}</b>件作品 · ${parts.join(' · ')} —`;
}

function renderWorks() {
  filteredWorksData = [...allWorksData];
  if (currentMediaFilter !== "all-media") filteredWorksData = filteredWorksData.filter(i => i?.mediaType === currentMediaFilter);
  if (currentCategoryFilter !== "all") filteredWorksData = filteredWorksData.filter(i => i?.category === currentCategoryFilter);

  updateWorksCount();

  if (filteredWorksData.length === 0) { 
    listDom.innerHTML = `<div class="empty-tip"><i class="fa fa-picture-o"></i>暫無作品</div>`; 
    return; 
  }

  const showDelete = isAdmin && viewMode === 'admin';
  const deleteBtnDisplay = showDelete ? "block" : "none";

  listDom.innerHTML = filteredWorksData.map((item, index) => `
    <div class="work-card" data-id="${item.id}">
      <div class="media-box" onclick="openCarousel(${index})">
        ${item.mediaType === "image"
          ? `<span class="card-type-icon"><i class="fa fa-camera"></i></span>
             <div class="img-skeleton"></div><img data-id="${item.id}" class="work-img lazy-img" loading="lazy">`
          : `<span class="card-type-icon"><i class="fa fa-video-camera"></i></span>
             <img src="${DEFAULT_VIDEO_COVER}" class="work-video-cover loaded" loading="lazy"><div class="video-play-icon">▶</div>`}
      </div>
      <div class="work-info">
        <div class="work-tag">${categoryMap[item.category] || '未分類'}</div>
        <div class="work-operate">
          <button class="delete-btn" onclick="deleteWork('${item.id}')" style="display:${deleteBtnDisplay}"><i class="fa fa-trash-o"></i> 刪除作品</button>
        </div>
      </div>
    </div>
  `).join("");

  setupLazyImageObserver();
}

async function openCarousel(index) {
  currentSlideIndex = index;
  document.getElementById("carouselModal").style.display = "flex";
  await showSlide();
}
function closeCarousel() { 
  document.getElementById("carouselModal").style.display = "none"; 
  const video = document.getElementById("carouselVideo");
  video.pause(); 
  video.src = '';
}
async function showSlide() {
  if (filteredWorksData.length === 0) return;
  const item = filteredWorksData[currentSlideIndex];
  const img = document.getElementById("carouselImg");
  const video = document.getElementById("carouselVideo");
  const loading = document.getElementById("carouselLoading");
  // 頁碼指示：目前第幾張 / 總共幾張
  document.getElementById("carouselCounter").innerText = `${currentSlideIndex + 1} / ${filteredWorksData.length}`;
  img.style.display = "none";
  video.style.display = "none";

  if (item.mediaType === "image") {
    loading.style.display = "block";
    const url = await fetchImageContent(item.id);
    loading.style.display = "none";
    if (!url) return;
    img.src = url;
    img.style.display = "block";
  } else {
    video.src = item.fullUrl;
    video.style.display = "block";
    video.play().catch(() => {});
  }
}
function prevSlide() { 
  currentSlideIndex = (currentSlideIndex -1 + filteredWorksData.length) % filteredWorksData.length; 
  showSlide(); 
}
function nextSlide() { 
  currentSlideIndex = (currentSlideIndex +1) % filteredWorksData.length; 
  showSlide(); 
}

async function deleteWork(id) {
  if (!isAdmin || viewMode !== 'admin') {
    alert("❌ 您無權限執行此操作");
    return;
  }
  if (!confirm("確定刪除？")) return;
  
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({ 
        action: "delete", 
        lineId: LINE_USER_ID,
        id: id 
      })
    });
    const result = await res.json();
    if (result.ok) { 
      imageDataCache.delete(id);
      alert("✅ 刪除成功！"); 
      await loadAllWorks(); 
      renderWorks(); 
    } else {
      alert("❌ 刪除失敗");
    }
  } catch (e) {
    alert("❌ 刪除失敗");
  }
}
