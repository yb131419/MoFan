<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>莫凡美甲作品集</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
    body{background:#F9F5F5;color:#333;padding-bottom:60px}
    header{background:linear-gradient(135deg,#E3DCD2,#CCBCBC);padding:40px 20px;text-align:center;border-radius:0 0 30px 30px;margin-bottom:24px}
    header h1{font-size:26px;margin-bottom:8px}
    .admin-panel{background:#fff;border-radius:20px;padding:16px;margin:0 auto 20px;max-width:420px}
    .btn{padding:10px 14px;border-radius:14px;border:none;background:#CCBCBC;color:#fff;cursor:pointer}
    .btn-success{background:#a89699}
    .btn-warning{background:#d4b2b2}
    .btn:disabled{opacity:.5}
    .admin-row{display:flex;gap:8px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
    .admin-status{text-align:center;font-size:14px;margin-top:8px;color:#666}
    .file-upload{display:none;text-align:center;margin:12px 0}
    .file-upload.show{display:block}
    .file-name{font-size:12px;margin:6px 0;color:#666}
    .preview-img{max-width:80px;max-height:80px;border-radius:10px;margin:6px auto;object-fit:cover;display:none}
    .progress-container{width:100%;height:5px;background:#eee;border-radius:3px;margin:10px 0;display:none}
    .progress-bar{height:100%;width:0%;background:#CCBCBC;transition:.2s}
    .tab-bar{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
    .tab{padding:10px 16px;background:#fff;border-radius:16px;cursor:pointer}
    .tab.active{background:#CCBCBC;color:#fff}
    .container{max-width:420px;margin:0 auto;padding:0 16px}
    .section{margin-bottom:30px}
    .section h2{font-size:18px;margin-bottom:12px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .card{background:#fff;border-radius:18px;overflow:hidden;position:relative}
    .card img,.card video{width:100%;height:140px;object-fit:cover}
    .delete-btn{position:absolute;top:6px;right:6px;background:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer}
    .info{padding:8px}
    .title{font-size:14px;margin-bottom:4px}
    .desc{font-size:12px;color:#888}
    .contact{background:#fff;border-radius:20px;padding:16px;margin-top:20px}
    [contenteditable]{border-bottom:1px dashed #ccc;padding:2px 4px;border-radius:4px}
    .tab-content{display:none}
    .tab-content.active{display:block}
</style>
</head>
<body>

<header>
  <h1>莫凡美甲作品集</h1>
  <p>專業美甲・美睫・紋繡</p>
</header>

<div class="container">
  <div class="admin-panel">
    <div class="admin-row">
      <button class="btn btn-success" onclick="saveAllData()">💾 儲存修改</button>
    </div>
    <div class="admin-row">
      <button class="btn" onclick="showUpload('photo')">📸 新增圖片</button>
      <button class="btn" onclick="showUpload('video')">🎞 新增影片</button>
    </div>

    <div class="file-upload" id="fileUpload">
      <input type="file" id="fileInput" accept="image/*,video/*">
      <img class="preview-img" id="previewImg">
      <div class="file-name" id="fileName"></div>
      <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <button class="btn btn-warning" onclick="startUpload()">✅ 確認上傳</button>
    </div>

    <div class="admin-status" id="status">載入中...</div>
  </div>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('photo')">圖片作品</div>
    <div class="tab" onclick="switchTab('video')">影片展示</div>
  </div>

  <div id="photoContent" class="tab-content active">
    <section class="section">
      <h2>📸 精選美甲作品</h2>
      <div class="grid" id="photoGrid"></div>
    </section>
  </div>

  <div id="videoContent" class="tab-content">
    <section class="section">
      <h2>🎞 操作流程影片</h2>
      <div class="grid" id="videoGrid"></div>
    </section>
  </div>

  <div class="contact">
    <h3 contenteditable data-key="contact-title">預約諮詢</h3>
    <p contenteditable data-key="contact-info">LINE：mofan123</p>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxQl92tgurrQmQO137YtukSt18bfiY3OXNNBA-tTFOrEXXfUbxRDXmDc4qfiTXTeRk1bg/exec";
const AUTH_TOKEN = "mofan123";

let currentType = "";
let selectedFile = null;

window.onload = loadAllData;

function showUpload(type) {
  currentType = type;
  selectedFile = null;
  document.getElementById("fileUpload").classList.add("show");
  document.getElementById("fileInput").value = "";
  document.getElementById("previewImg").style.display = "none";
  document.getElementById("fileName").innerText = "";
}

document.getElementById("fileInput").addEventListener("change", (e) => {
  const f = e.target.files[0];
  if (!f) return;
  selectedFile = f;
  document.getElementById("fileName").innerText = "已選取：" + f.name;
  if (f.type.startsWith("image/")) {
    document.getElementById("previewImg").src = URL.createObjectURL(f);
    document.getElementById("previewImg").style.display = "block";
  } else {
    document.getElementById("previewImg").style.display = "none";
  }
});

// 上傳流程（Presigned，超穩）
async function startUpload() {
  if (!selectedFile) { alert("請選擇檔案"); return; }
  setStatus("⬆️ 取得上傳憑證...");
  disableAll(true);

  const ext = selectedFile.name.split(".").pop();
  const contentType = selectedFile.type;

  try {
    // 1. 取得上傳網址
    const u = await fetch(GAS_URL, {
      method: "POST",
      body: new URLSearchParams({
        token: AUTH_TOKEN,
        action: "getUploadUrl",
        ext, type: contentType
      })
    }).then(r => r.json());

    // 2. 直接上傳到 R2
    setStatus("⬆️ 上傳中，請稍後...");
    document.getElementById("progressContainer").style.display = "block";

    await fetch(u.uploadUrl.split("?")[0], {
      method: "PUT",
      body: selectedFile,
      headers: { "Content-Type": contentType }
    });

    // 3. 通知完成
    await fetch(GAS_URL, {
      method: "POST",
      body: new URLSearchParams({
        token: AUTH_TOKEN,
        action: "uploadDone",
        type: currentType,
        publicUrl: u.publicUrl,
        fileKey: u.fileKey,
        fileName: selectedFile.name
      })
    });

    setStatus("✅ 上傳成功");
    loadAllData();
  } catch (err) {
    alert("❌ 上傳失敗：" + err.message);
    setStatus("❌ 上傳失敗");
  } finally {
    disableAll(false);
    document.getElementById("fileUpload").classList.remove("show");
  }
}

// 其餘功能
async function deleteItem(id, type) {
  if (!confirm("確定刪除？")) return;
  await fetch(GAS_URL, {
    method: "POST",
    body: new URLSearchParams({ token: AUTH_TOKEN, action: "delete", id, type })
  });
  loadAllData();
}

async function saveAllData() {
  setStatus("💾 儲存中...");
  const items = document.querySelectorAll("[data-key]");
  for (const el of items) {
    await fetch(GAS_URL, {
      method: "POST",
      body: new URLSearchParams({
        token: AUTH_TOKEN,
        action: "save",
        key: el.dataset.key,
        val: el.innerText.trim()
      })
    });
  }
  setStatus("✅ 儲存完成");
}

async function loadAllData() {
  setStatus("🔄 載入中...");
  const data = await fetch(GAS_URL + "?action=load").then(r => r.json());

  document.querySelectorAll("[data-key]").forEach(el => {
    if (data[el.dataset.key]) el.innerText = data[el.dataset.key];
  });

  renderList("photo", data.photos);
  renderList("video", data.videos);
  setStatus("✅ 已載入");
}

function renderList(type, json) {
  const list = json ? JSON.parse(json) : [];
  const dom = document.getElementById(type + "Grid");
  dom.innerHTML = list.map(i => `
    <div class="card">
      <button class="delete-btn" onclick="deleteItem('${i.id}','${type}')">🗑</button>
      ${type === "photo" ? `<img src="${i.url}">` : `<video src="${i.url}" controls></video>`}
      <div class="info">
        <div class="title" contenteditable data-key="${type}-${i.id}-title">${i.title}</div>
        <div class="desc">${i.desc}</div>
      </div>
    </div>
  `).join("");
}

function switchTab(t) {
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(x => x.classList.remove("active"));
  event.currentTarget.classList.add("active");
  document.getElementById(t + "Content").classList.add("active");
}

function setStatus(t) { document.getElementById("status").innerText = t; }
function disableAll(d) { document.querySelectorAll(".btn").forEach(b => b.disabled = d); }
</script>
</body>
</html>
