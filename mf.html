<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>莫凡韓式皮膚管理 | 作品集</title>
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+TC:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ==============================================
       🎨 設計系統：全站統一色彩／字體變數
       porcelain 瓷白底 × morandi rose 玫瑰棕 × 宋體標題
       ============================================== */
    :root {
      --bg: #FBF8F6;            /* 瓷白底 */
      --card: #FFFFFF;          /* 卡片白 */
      --ink: #3D3236;           /* 深玫瑰炭（主文字） */
      --ink-soft: #7A6A6E;      /* 次要文字 */
      --ink-faint: #B3A4A8;     /* 弱化文字 */
      --rose: #B98A93;          /* 主玫瑰棕 */
      --rose-deep: #8C6B73;     /* 深玫瑰棕 */
      --rose-mist: #F3E9EA;     /* 玫瑰霧粉（淡底） */
      --line: #ECE0E1;          /* 髮絲分隔線 */
      --shadow-sm: 0 1px 2px rgba(96, 72, 78, 0.05);
      --shadow-md: 0 2px 6px rgba(96, 72, 78, 0.05), 0 12px 32px rgba(96, 72, 78, 0.08);
      --serif: 'Noto Serif TC', serif;
      --sans: 'Noto Sans TC', 'PingFang TC', 'Helvetica Neue', sans-serif;
      --latin-serif: 'Cormorant Garamond', 'Noto Serif TC', serif;
    }

    * {
      margin: 0;
      padding: 0; 
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: var(--bg);
      font-family: var(--sans);
      font-weight: 300;
      padding-bottom: 120px;
      color: var(--ink);
    }

    /* ============ 開場載入 ============ */
    .loader-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    .loader-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }
    .loader-ring {
      width: 46px;
      height: 46px;
      border: 1px solid var(--line);
      border-top: 1px solid var(--rose);
      border-radius: 50%;
      animation: loader-spin 1.2s linear infinite;
    }
    .loader-text {
      font-family: var(--serif);
      font-size: 14px;
      color: var(--rose);
      letter-spacing: 6px;
      text-indent: 6px;
      font-weight: 400;
    }
    @keyframes loader-spin {
      to { transform: rotate(360deg); }
    }

    /* ============ 頁首：宋體直式氣質排版 ============ */
    .page-header {
      padding: 64px 20px 34px;
      text-align: center;
      position: relative;
    }
    .header-eyebrow {
      font-family: var(--latin-serif);
      font-size: 13px;
      font-style: italic;
      color: var(--rose);
      letter-spacing: 4px;
      margin-bottom: 16px;
    }
    .page-title {
      font-family: var(--serif);
      font-size: 30px;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: 8px;
      text-indent: 8px;
      line-height: 1.55;
      margin-bottom: 18px;
    }
    .header-rule {
      width: 1px;
      height: 26px;
      background: linear-gradient(180deg, var(--rose), transparent);
      margin: 0 auto 14px;
    }
    .page-subtitle {
      font-size: 12px;
      color: var(--ink-faint);
      letter-spacing: 5px;
      text-indent: 5px;
      font-weight: 300;
    }

    /* ============ 管理／使用介面切換 ============ */
    .mode-switch {
      display: none;
      justify-content: center;
      padding: 0 20px 26px;
    }
    .mode-switch-inner {
      display: flex;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 100px;
      padding: 4px;
      box-shadow: var(--shadow-sm);
    }
    .mode-btn {
      padding: 9px 22px;
      border-radius: 100px;
      border: none;
      background: transparent;
      color: var(--ink-faint);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.35s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .mode-btn.active {
      background: var(--rose-deep);
      color: #fff;
    }

    /* ============ 篩選列 ============ */
    .filter-nav {
      padding: 0 20px 26px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .tab-group {
      display: flex;
      justify-content: center;
      gap: 8px;
      overflow-x: auto;
      padding: 2px;
    }
    .tab-group::-webkit-scrollbar { display: none; }
    .filter-tab {
      padding: 10px 24px;
      border-radius: 100px;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--ink-soft);
      font-size: 13.5px;
      font-weight: 400;
      letter-spacing: 2px;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .filter-tab.active {
      background: var(--rose-deep);
      color: #fff;
      border-color: var(--rose-deep);
      box-shadow: 0 6px 16px rgba(140, 107, 115, 0.22);
    }
    .filter-select-btn {
      width: 100%;
      padding: 15px 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      font-family: var(--sans);
      font-size: 13.5px;
      letter-spacing: 1px;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--ink-soft);
      box-shadow: var(--shadow-sm);
      transition: border-color 0.3s ease;
    }
    .filter-select-btn i {
      color: var(--rose);
      font-size: 12px;
    }

    /* ============ 作品統計 ============ */
    .works-count {
      text-align: center;
      font-family: var(--latin-serif);
      font-size: 13px;
      color: var(--ink-faint);
      letter-spacing: 2px;
      padding-bottom: 6px;
      font-weight: 400;
    }
    .works-count b {
      font-family: var(--serif);
      color: var(--rose-deep);
      font-weight: 500;
      font-size: 15px;
      margin: 0 3px;
    }
    .grid-hint {
      text-align: center;
      font-size: 11.5px;
      color: var(--ink-faint);
      letter-spacing: 3px;
      text-indent: 3px;
      margin: 0 0 22px;
    }

    /* ============ 上傳區（管理介面） ============ */
    .upload-area {
      padding: 0 20px 30px;
      display: none;
    }
    .upload-card {
      background: var(--card);
      border-radius: 20px;
      padding: 22px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--line);
    }
    .category-select-btn {
      width: 100%;
      padding: 15px 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--bg);
      font-family: var(--sans);
      font-size: 13.5px;
      letter-spacing: 1px;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      color: var(--ink-soft);
    }
    .category-select-btn i { color: var(--rose); font-size: 12px; }
    .upload-btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: var(--rose-deep);
      color: #fff;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 16px rgba(140, 107, 115, 0.22);
    }
    .upload-btn:active { transform: scale(0.98); }
    .upload-btn:disabled {
      background: #E9E2E3;
      color: #B7ABAE;
      box-shadow: none;
      cursor: not-allowed;
    }
    #file-input { display: none; }

    /* ==============================================
       🖼️ 作品卡片：藝廊裱框式設計（本次質感升級核心）
       每件作品如同裱在畫框中的攝影作品：
       白框留邊（裱框 mat）＋ 髮絲內線 ＋ 宋體標籤說明卡
       ============================================== */
    .works-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px 14px;
      padding: 0 20px;
    }
    .work-card {
      background: var(--card);
      border-radius: 6px; /* 畫框式的小圓角，比大圓角更沉穩高級 */
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: var(--shadow-md);
      padding: 8px 8px 0; /* 裱框留邊：圖片四周留出白色框邊 */
      transition: transform 0.35s cubic-bezier(0.34, 1.3, 0.64, 1), box-shadow 0.35s ease;
      cursor: default;
      opacity: 0;
      transform: translateY(14px);
      animation: card-enter 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .work-card:nth-child(1)  { animation-delay: 0.02s; }
    .work-card:nth-child(2)  { animation-delay: 0.08s; }
    .work-card:nth-child(3)  { animation-delay: 0.14s; }
    .work-card:nth-child(4)  { animation-delay: 0.20s; }
    .work-card:nth-child(5)  { animation-delay: 0.26s; }
    .work-card:nth-child(6)  { animation-delay: 0.32s; }
    .work-card:nth-child(7)  { animation-delay: 0.38s; }
    .work-card:nth-child(8)  { animation-delay: 0.44s; }
    .work-card:nth-child(9)  { animation-delay: 0.50s; }
    .work-card:nth-child(10) { animation-delay: 0.56s; }
    .work-card:nth-child(11) { animation-delay: 0.62s; }
    .work-card:nth-child(12) { animation-delay: 0.68s; }
    @keyframes card-enter {
      to { opacity: 1; transform: translateY(0); }
    }
    .work-card:active {
      transform: scale(0.975);
      box-shadow: var(--shadow-sm);
    }

    .media-box {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: var(--rose-mist);
      border-radius: 3px; /* 框內照片的極小圓角 */
    }
    /* 裱框髮絲內線：照片邊緣一圈極細的內框線 */
    .media-box::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid rgba(140, 107, 115, 0.10);
      border-radius: 3px;
      z-index: 3;
      pointer-events: none;
    }
    .work-img, .work-video-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .work-img.loaded, .work-video-cover.loaded {
      opacity: 1;
    }
    .media-box:active .work-img,
    .media-box:active .work-video-cover {
      transform: scale(1.04);
    }

    /* 右上角媒材小標（照片/影片） */
    .card-type-icon {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(61, 50, 54, 0.42);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.92);
      font-size: 9.5px;
      z-index: 2;
      pointer-events: none;
    }

    /* 骨架載入：品牌花飾 */
    .img-skeleton {
      position: absolute;
      inset: 0;
      background: linear-gradient(100deg, var(--rose-mist) 30%, #FAF3F4 50%, var(--rose-mist) 70%);
      background-size: 200% 100%;
      animation: skeleton-shine 1.5s ease-in-out infinite;
    }
    .img-skeleton::after {
      content: "\2740";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px;
      color: rgba(185, 138, 147, 0.45);
    }
    .img-skeleton.hidden { display: none; }
    @keyframes skeleton-shine {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .video-play-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 48px;
      height: 48px;
      background: rgba(255, 255, 255, 0.24);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 15px;
      padding-left: 4px;
      pointer-events: none;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.2);
      z-index: 2;
    }

    /* 說明卡：如裱框下方的作品名牌，宋體置中 */
    .work-info {
      padding: 12px 6px 13px;
      text-align: center;
      position: relative;
    }
    .work-tag {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      font-family: var(--serif);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-indent: 1.5px;
      color: var(--rose-deep);
      /* 🔧 修正：長分類名（如「韓式皮膚管理」）禁止換行，
         窄卡片時由兩側飾線自動收縮讓位，文字永遠保持單行 */
      white-space: nowrap;
    }
    .work-tag::before,
    .work-tag::after {
      content: "";
      display: inline-block;
      flex: 1 1 4px;      /* 可伸縮：空間不夠時自動縮短，空間充裕時撐開 */
      max-width: 16px;    /* 最長不超過16px，維持精緻比例 */
      min-width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--rose));
      opacity: 0.7;
    }
    .work-tag::after {
      background: linear-gradient(90deg, var(--rose), transparent);
    }
    .work-operate { display: flex; margin-top: 10px; padding: 0 2px; }

    .delete-btn {
      width: 100%;
      padding: 8px 0;
      border-radius: 8px;
      border: 1px solid rgba(196, 121, 121, 0.4);
      background: transparent;
      color: #C47979;
      font-family: var(--sans);
      font-size: 11.5px;
      font-weight: 400;
      letter-spacing: 2px;
      cursor: pointer;
      display: none;
      transition: all 0.25s ease;
    }
    .delete-btn:active {
      background: #C47979;
      color: #fff;
      border-color: transparent;
    }

    .empty-tip {
      text-align: center;
      padding: 80px 20px;
      color: var(--ink-faint);
      font-size: 13px;
      letter-spacing: 3px;
      grid-column: span 2;
    }
    .empty-tip i {
      display: block;
      font-size: 30px;
      margin-bottom: 16px;
      color: var(--rose);
      opacity: 0.4;
    }

    /* ============ 彈窗 ============ */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(43, 34, 37, 0.75);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: center !important;
      justify-content: center !important;
      padding: 20px;
    }
    .modal-content {
      background: var(--card);
      width: 100%;
      max-width: 320px;
      border-radius: 22px;
      padding: 28px 24px;
      text-align: center;
      margin: 0 auto;
      box-shadow: 0 24px 64px rgba(43, 34, 37, 0.3);
    }
    .modal-content h3 {
      font-family: var(--serif);
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 3px;
      text-indent: 3px;
      color: var(--ink);
      margin-bottom: 18px;
    }
    .category-item {
      padding: 14px;
      margin: 8px 0;
      border-radius: 14px;
      background: var(--bg);
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 14px;
      letter-spacing: 2px;
      color: var(--ink-soft);
      transition: all 0.25s ease;
    }
    .category-item.active {
      background: var(--rose-deep);
      color: #fff;
      box-shadow: 0 6px 16px rgba(140, 107, 115, 0.25);
    }
    .loading-modal .loading-text {
      margin-top: 14px;
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--ink-soft);
    }
    .loading-modal .loader {
      width: 38px; height: 38px;
      border: 1px solid var(--line);
      border-top: 1px solid var(--rose);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============ 放大檢視 ============ */
    #carouselModal {
      background: rgba(28, 22, 24, 0.96);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .carousel-content { position: relative; width: 92%; max-width: 500px; text-align: center; margin: 0 auto; }
    .carousel-media {
      width: 100%;
      max-height: 78vh;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
    }
    .carousel-loading {
      color: rgba(255, 255, 255, 0.75);
      font-size: 13px;
      letter-spacing: 4px;
      font-family: var(--serif);
    }
    .carousel-counter {
      position: absolute;
      top: -42px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.7);
      font-family: var(--latin-serif);
      font-size: 14px;
      letter-spacing: 4px;
    }
    .carousel-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: #fff;
      width: 46px; height: 46px; border-radius: 50%; font-size: 15px; cursor: pointer; z-index: 1001;
      transition: background 0.25s ease;
    }
    .carousel-prev { left: 8px; }
    .carousel-next { right: 8px; }
    .carousel-close {
      position: absolute; top: 22px; right: 22px; background: transparent;
      color: rgba(255, 255, 255, 0.85); border: none; font-size: 34px; cursor: pointer;
      font-weight: 300;
    }

    /* ============ 底部導覽：霧面玻璃 ============ */
    .bottom-nav {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      width: 92%; max-width: 500px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(236, 224, 225, 0.9);
      border-radius: 22px;
      box-shadow: 0 10px 36px rgba(96, 72, 78, 0.14);
      padding: 10px 8px; display: flex; z-index: 99;
    }
    .bottom-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 5px;
      color: var(--ink-faint);
      font-size: 11.5px;
      letter-spacing: 2px;
      cursor: pointer; transition: all 0.3s ease; border-radius: 15px; padding: 9px 0;
    }
    .bottom-nav-item.active {
      color: var(--rose-deep);
      background: var(--rose-mist);
    }
    .bottom-nav-item i { font-size: 17px; }

    @media (prefers-reduced-motion: reduce) {
      .work-card { animation: none; opacity: 1; transform: none; }
      .img-skeleton { animation: none; }
    }
  </style>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<div class="loader-overlay" id="loaderOverlay">
  <div class="loader-container">
    <div class="loader-ring"></div>
    <div class="loader-text">作品載入中</div>
  </div>
</div>

<div class="page-header">
  <p class="header-eyebrow">Beauty Portfolio</p>
  <h1 class="page-title">莫凡<br>韓式皮膚管理</h1>
  <div class="header-rule"></div>
  <p class="page-subtitle">專業 · 精緻 · 客製化</p>
</div>

<div class="mode-switch" id="modeSwitch">
  <div class="mode-switch-inner">
    <button class="mode-btn active" id="modeUserBtn" onclick="setViewMode('user')">
      <i class="fa fa-eye"></i> 使用介面
    </button>
    <button class="mode-btn" id="modeAdminBtn" onclick="setViewMode('admin')">
      <i class="fa fa-cog"></i> 管理介面
    </button>
  </div>
</div>

<div class="filter-nav">
  <div class="tab-group media-tabs">
    <div class="filter-tab active" data-type="all-media">全部</div>
    <div class="filter-tab" data-type="image">照片</div>
    <div class="filter-tab" data-type="video">影片</div>
  </div>
  <button class="filter-select-btn" id="filterCategoryBtn" onclick="openFilterCategoryModal()">

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxQl92tgurrQmQO137YtukSt18bfiY3OXNNBA-tTFOrEXXfUbxRDXmDc4qfiTXTeRk1bg/exec";
const CONFIG = {
  LIFF_ID: "2009598216-hGqsxRN9"
};

let currentMediaFilter = "all-media";
let currentCategoryFilter = "all";
let allWorksData = [];
let filteredWorksData = [];
let selectedCategory = "nail";
let currentSlideIndex = 0;
const uploadBtn = document.getElementById("uploadBtn");
const listDom = document.getElementById('worksList');
const loaderOverlay = document.getElementById('loaderOverlay');
const uploadArea = document.getElementById('uploadArea');
const MAX_VIDEO_SIZE = 50 * 1024 * 1024;

let LINE_USER_ID = "guest_" + Date.now();
let LINE_USER_NAME = "LINE使用者";
let isAdmin = false;

// 'user'＝使用介面（一般顧客畫面）、'admin'＝管理介面（可上傳/刪除）
let viewMode = 'user';

const categoryMap = { nail: "美甲", eyelash: "美睫", eyebrow: "霧眉/霧唇", skin: "韓式皮膚管理", exosome: "外泌體育髮", private: "私密粉嫩術" };
const DEFAULT_VIDEO_COVER = "https://picsum.photos/id/1048/1080/1080";

const imageDataCache = new Map();
let gridObserver = null;

function checkAdminByBackend() {
  const encodedId = encodeURIComponent(LINE_USER_ID);
  const script = document.createElement('script');
  script.src = `${GAS_URL}?action=checkAdmin&lineId=${encodedId}&callback=onAdminCheck&_=${Date.now()}`;
  document.body.appendChild(script);
}

window.onAdminCheck = function(res) {
  isAdmin = res?.isAdmin === true;
  if (isAdmin) {
    document.getElementById('modeSwitch').style.display = 'flex';
    console.log("✅ 管理员登录成功");
  } else {
    console.log("❌ 非管理员");
  }
  applyViewMode();
};

function setViewMode(mode) {
  if (!isAdmin) return;
  viewMode = mode;
  document.getElementById('modeUserBtn').classList.toggle('active', mode === 'user');
  document.getElementById('modeAdminBtn').classList.toggle('active', mode === 'admin');
  applyViewMode();
}

function applyViewMode() {
  const showAdminUI = isAdmin && viewMode === 'admin';
  uploadArea.style.display = showAdminUI ? 'block' : 'none';
  renderWorks();
}

async function initLiff() {
  try {
    await liff.init({ liffId: CONFIG.LIFF_ID });
    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }
    const p = await liff.getProfile();
    LINE_USER_ID = p.userId;
    LINE_USER_NAME = p.displayName;
  } catch (e) {
    console.log("LIFF 初始化完成");
  } finally {
    checkAdminByBackend();
  }
}

function blobToBase64(blob) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(blob);
  });
}

// 置中裁切（cover）後再縮放，維持原始比例、避免變形
function compressImage(file, maxSize, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.src = url;
    img.onload = function() {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = maxSize;
      canvas.height = maxSize;

      const srcW = img.naturalWidth;
      const srcH = img.naturalHeight;
      const srcRatio = srcW / srcH;

      let sx, sy, sw, sh;
      if (srcRatio > 1) {
        sh = srcH; sw = srcH; sx = (srcW - sw) / 2; sy = 0;
      } else {
        sw = srcW; sh = srcW; sx = 0; sy = (srcH - sh) / 2;
      }

      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, maxSize, maxSize);
      canvas.toBlob((blob) => resolve(blob), "image/jpeg", quality);
      URL.revokeObjectURL(url);
    };
  });
}

// 確保壓縮後的圖片絕對塞得進 Google Sheets 單一儲存格 50,000 字元上限
const SHEET_CELL_SAFE_LIMIT = 48000;
async function compressImageSafe(file) {
  let maxSize = 1080;
  let quality = 0.75;
  let blob = await compressImage(file, maxSize, quality);
  let base64 = await blobToBase64(blob);
  let attempts = 0;

  while (base64.length > SHEET_CELL_SAFE_LIMIT && attempts < 6) {
    if (quality > 0.35) {
      quality = Math.max(0.35, quality - 0.1);
    } else {
      maxSize = Math.round(maxSize * 0.8);
    }
    blob = await compressImage(file, maxSize, quality);
    base64 = await blobToBase64(blob);
    attempts++;
  }

  return { base64, tooLarge: base64.length > SHEET_CELL_SAFE_LIMIT };
}

function showLoading() { document.getElementById("loadingModal").style.display = "flex"; uploadBtn.disabled = true; }
function hideLoading() { document.getElementById("loadingModal").style.display = "none"; uploadBtn.disabled = false; }

function openCategoryModal() { 
  document.getElementById("categoryModal").style.display = "flex"; 
}
document.querySelectorAll('#categoryModal .category-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('#categoryModal .category-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    selectedCategory = item.dataset.val;
    document.getElementById("categoryBtn").innerHTML = `<span>選擇分類：${item.innerText}</span><i class="fa fa-chevron-down"></i>`;
    document.getElementById("categoryModal").style.display = "none";
  });
});

function openFilterCategoryModal() { 
  document.getElementById("filterCategoryModal").style.display = "flex"; 
}
document.querySelectorAll('#filterCategoryModal .category-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('#filterCategoryModal .category-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    currentCategoryFilter = item.dataset.val;
    document.getElementById("filterCategoryBtn").innerHTML = `<span>篩選分類：${item.innerText}</span><i class="fa fa-chevron-down"></i>`;
    document.getElementById("filterCategoryModal").style.display = "none";
    renderWorks();
  });
});

document.querySelectorAll('.media-tabs .filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.media-tabs .filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMediaFilter = tab.dataset.type;
    renderWorks();
  });
});

function triggerFile() { 
  document.getElementById('file-input').click(); 
}

document.getElementById('file-input').onchange = async function(e) {
  const files = Array.from(e.target.files);
  if (files.length === 0) return;

  const validFiles = files.filter(file => {
    if (file.type.startsWith('video/') && file.size > MAX_VIDEO_SIZE) {
      alert(`❌ ${file.name} 超過50MB`);
      return false;
    }
    return true;
  });

  if (validFiles.length === 0) { this.value = ''; return; }

  try {
    showLoading();
    let successCount = 0;
    let tooLargeCount = 0;
    const categoryName = categoryMap[selectedCategory] || '未分類';

    for (let file of validFiles) {
      try {
        const isImage = file.type.startsWith('image/');
        let base64;

        if (isImage) {
          const result = await compressImageSafe(file);
          if (result.tooLarge) {
            tooLargeCount++;
            continue;
          }
          base64 = result.base64;
        } else {
          base64 = await blobToBase64(file);
        }

        const res = await fetch(GAS_URL, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({
            action: "upload",
            lineId: LINE_USER_ID,
            type: selectedCategory,
            mediaType: isImage ? "image" : "video",
            title: `${categoryName} - 作品`,
            url: base64
          })
        });

        const result = await res.json();
        if (result.ok) successCount++;
        else if (result.error === "image_too_large") tooLargeCount++;
      } catch (err) {}
    }

    hideLoading();
    let msg = `✅ 上傳完成：${successCount}/${validFiles.length} 個`;
    if (tooLargeCount > 0) msg += `\n⚠️ ${tooLargeCount} 張圖片壓縮後仍過大，已略過`;
    alert(msg);
    await loadAllWorks();
    renderWorks();
  } catch (err) {
    hideLoading();
    alert("❌ 上傳失敗");
  }
  this.value = '';
};

async function loadAllWorks() {
  try {
    const res = await fetch(GAS_URL + "?t=" + new Date().getTime());
    const data = await res.json();
    allWorksData = Array.isArray(data.list) ? data.list : [];
    allWorksData.reverse();
  } catch (e) { 
    allWorksData = []; 
  }
}

async function fetchImageContent(id) {
  if (imageDataCache.has(id)) return imageDataCache.get(id);
  try {
    const res = await fetch(`${GAS_URL}?action=getImage&id=${encodeURIComponent(id)}&t=${Date.now()}`);
    const data = await res.json();
    const url = data.url || "";
    imageDataCache.set(id, url);
    return url;
  } catch (e) {
    return "";
  }
}

function setupLazyImageObserver() {
  if (gridObserver) gridObserver.disconnect();

  gridObserver = new IntersectionObserver((entries, observer) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const el = entry.target;
      observer.unobserve(el);
      const id = el.dataset.id;
      fetchImageContent(id).then(url => {
        if (!url) return;
        el.src = url;
        el.classList.add('loaded');
        const skeleton = el.parentElement.querySelector('.img-skeleton');
        if (skeleton) skeleton.classList.add('hidden');
      });
    });
  }, { rootMargin: "200px 0px" });

  document.querySelectorAll('.lazy-img').forEach(el => gridObserver.observe(el));
}

// 更新作品數量統計列（依目前篩選結果顯示）
function updateWorksCount() {
  const countDom = document.getElementById('worksCount');
  const total = filteredWorksData.length;
  if (total === 0) {
    countDom.innerHTML = "";
    return;
  }
  const imgCount = filteredWorksData.filter(i => i.mediaType === "image").length;
  const vidCount = total - imgCount;
  let parts = [];
  if (imgCount > 0) parts.push(`照片<b>${imgCount}</b>`);
  if (vidCount > 0) parts.push(`影片<b>${vidCount}</b>`);
  countDom.innerHTML = `共<b>${total}</b>件作品 · ${parts.join(' · ')}`;
}

function renderWorks() {
  filteredWorksData = [...allWorksData];
  if (currentMediaFilter !== "all-media") filteredWorksData = filteredWorksData.filter(i => i?.mediaType === currentMediaFilter);
  if (currentCategoryFilter !== "all") filteredWorksData = filteredWorksData.filter(i => i?.category === currentCategoryFilter);

  updateWorksCount();

  if (filteredWorksData.length === 0) { 
    listDom.innerHTML = `<div class="empty-tip"><i class="fa fa-picture-o"></i>暫無作品</div>`; 
    return; 
  }

  const showDelete = isAdmin && viewMode === 'admin';
  const deleteBtnDisplay = showDelete ? "block" : "none";

  listDom.innerHTML = filteredWorksData.map((item, index) => `
    <div class="work-card" data-id="${item.id}">
      <div class="media-box" onclick="openCarousel(${index})">
        ${item.mediaType === "image"
          ? `<span class="card-type-icon"><i class="fa fa-camera"></i></span>
             <div class="img-skeleton"></div><img data-id="${item.id}" class="work-img lazy-img" loading="lazy">`
          : `<span class="card-type-icon"><i class="fa fa-video-camera"></i></span>
             <img src="${DEFAULT_VIDEO_COVER}" class="work-video-cover loaded" loading="lazy"><div class="video-play-icon">▶</div>`}
      </div>
      <div class="work-info">
        <div class="work-tag">${categoryMap[item.category] || '未分類'}</div>
        <div class="work-operate">
          <button class="delete-btn" onclick="deleteWork('${item.id}')" style="display:${deleteBtnDisplay}"><i class="fa fa-trash-o"></i> 刪除作品</button>
        </div>
      </div>
    </div>
  `).join("");

  setupLazyImageObserver();
}

async function openCarousel(index) {
  currentSlideIndex = index;
  document.getElementById("carouselModal").style.display = "flex";
  await showSlide();
}
function closeCarousel() { 
  document.getElementById("carouselModal").style.display = "none"; 
  const video = document.getElementById("carouselVideo");
  video.pause(); 
  video.src = '';
}
async function showSlide() {
  if (filteredWorksData.length === 0) return;
  const item = filteredWorksData[currentSlideIndex];
  const img = document.getElementById("carouselImg");
  const video = document.getElementById("carouselVideo");
  const loading = document.getElementById("carouselLoading");
  document.getElementById("carouselCounter").innerText = `${currentSlideIndex + 1} / ${filteredWorksData.length}`;
  img.style.display = "none";
  video.style.display = "none";

  if (item.mediaType === "image") {
    loading.style.display = "block";
    const url = await fetchImageContent(item.id);
    loading.style.display = "none";
    if (!url) return;
    img.src = url;
    img.style.display = "block";
  } else {
    video.src = item.fullUrl;
    video.style.display = "block";
    video.play().catch(() => {});
  }
}
function prevSlide() { 
  currentSlideIndex = (currentSlideIndex -1 + filteredWorksData.length) % filteredWorksData.length; 
  showSlide(); 
}
function nextSlide() { 
  currentSlideIndex = (currentSlideIndex +1) % filteredWorksData.length; 
  showSlide(); 
}

async function deleteWork(id) {
  if (!isAdmin || viewMode !== 'admin') {
    alert("❌ 您無權限執行此操作");
    return;
  }
  if (!confirm("確定刪除？")) return;
  
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({ 
        action: "delete", 
        lineId: LINE_USER_ID,
        id: id 
      })
    });
    const result = await res.json();
    if (result.ok) { 
      imageDataCache.delete(id);
      alert("✅ 刪除成功！"); 
      await loadAllWorks(); 
      renderWorks(); 
    } else {
      alert("❌ 刪除失敗");
    }
  } catch (e) {
    alert("❌ 刪除失敗");
  }
}

document.querySelectorAll('.bottom-nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.bottom-nav-item').forEach(nav => nav.classList.remove('active'));
    item.classList.add('active');
    const text = item.querySelector('span').innerText;
    switch(text) {
      case '地址': window.open('https://share.google/L5vzxJrpotDQnkWAx', '_blank'); break;
      case '分享': window.open('line://nv/recommendOA/@997zfvfm', '_blank'); break;
    }
  });
});

window.addEventListener('load', async () => {
  uploadBtn.disabled = true;
  await initLiff();
  await loadAllWorks();
  uploadBtn.disabled = false;
  loaderOverlay.classList.add('hidden');
  renderWorks();
});
</script>
</body>
